      <span class="ao-ico" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></span>
      <span class="ao-txt">Foto aufnehmen<small>Kamera am Gerät öffnen</small></span>
    </button>
    <button class="attach-opt" type="button" data-pick="library">
      <span class="ao-ico" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>
      <span class="ao-txt">Aus Mediathek<small>Bereits hochgeladenes Bild wählen</small></span>
    </button>
  </div>
</div>

<!-- Vorschau-Lightbox (Bild groß / Datei-Infos) -->
<div class="wl-lightbox" id="wlLightbox" role="dialog" aria-modal="true" aria-label="Vorschau">
  <div class="wl-lightbox-inner" id="wlLightboxInner"></div>
</div>

<script id="wl-media">
(function(){ "use strict";
  if (window.__wlMediaInit) return;
  window.__wlMediaInit = true;

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function toast(m){ if (window.showToast) window.showToast(m); }

  var DB_NAME = 'werkleih', STORE = 'files', DB_VER = 1;
  var MAX_THUMB = 220, TEXT_MAX = 100*1024, PAGE = 50;
  var IMG_EXT = { PNG:1, JPG:1, JPEG:1, GIF:1, WEBP:1, BMP:1, SVG:1, HEIC:1, HEIF:1, AVIF:1 };

  /* ---- In-Memory-Fallback (falls IndexedDB fehlt) + Cache der Metadaten ---- */
  var memStore = [];      // benutzt, wenn kein IndexedDB verfügbar
  var useMem = false;
  var fileCache = [];     // gespiegelte Metadaten für schnelles Re-Render (ohne große Blobs erneut zu lesen)

  /* ---- Format-Helfer ---- */
  function extOf(name){
    var s = String(name||''); var i = s.lastIndexOf('.');
    return (i >= 0 ? s.slice(i+1) : '').toUpperCase().slice(0,5) || 'DAT';
  }
  function isImageType(type, mime){
    return !!IMG_EXT[String(type||'').toUpperCase()] || /^image\//i.test(mime||'');
  }
  function sizeLabel(bytes){
    bytes = +bytes || 0;
    if (bytes >= 1048576) return (Math.round(bytes/1048576*10)/10) + ' MB';
    if (bytes >= 1024) return Math.round(bytes/1024) + ' KB';
    return bytes + ' B';
  }
  function fid(){ return 'f_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function deDate(ts){ try { return new Date(ts).toLocaleString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' }); } catch(e){ return ''; } }

  /* ---- IndexedDB ---- */
  function openDb(){
    return new Promise(function(resolve, reject){
      if (!('indexedDB' in window) || !window.indexedDB){ reject(new Error('no-idb')); return; }
      var req;
      try { req = window.indexedDB.open(DB_NAME, DB_VER); }
      catch(e){ reject(e); return; }
      req.onupgradeneeded = function(){
        var db = req.result;
        if (!db.objectStoreNames.contains(STORE)){
          var os = db.createObjectStore(STORE, { keyPath:'id' });
          try { os.createIndex('addedTs', 'addedTs', { unique:false }); } catch(e){}
        }
      };
      req.onsuccess = function(){ resolve(req.result); };
      req.onerror = function(){ reject(req.error || new Error('idb-open')); };
    });
  }

  // Liefert immer ein Array (Metadaten + Blob), notfalls aus dem Mem-Fallback.
  function idbAll(){
    if (useMem) return Promise.resolve(memStore.slice());
    return openDb().then(function(db){
      return new Promise(function(resolve, reject){
        var tx = db.transaction(STORE, 'readonly');
        var req = tx.objectStore(STORE).getAll();
        req.onsuccess = function(){ resolve(req.result || []); };
        req.onerror = function(){ reject(req.error); };
      });
    }).catch(function(){ useMem = true; return memStore.slice(); });
  }
  function idbPut(rec){
    if (useMem){ memStore = memStore.filter(function(r){ return r.id !== rec.id; }); memStore.push(rec); return Promise.resolve(); }
    return openDb().then(function(db){
      return new Promise(function(resolve, reject){
        var tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).put(rec);
        tx.oncomplete = function(){ resolve(); };
        tx.onerror = function(){ reject(tx.error); };
      });
    }).catch(function(){ useMem = true; memStore = memStore.filter(function(r){ return r.id !== rec.id; }); memStore.push(rec); });
  }
  function idbDel(id){
    if (useMem){ memStore = memStore.filter(function(r){ return r.id !== id; }); return Promise.resolve(); }
    return openDb().then(function(db){
      return new Promise(function(resolve, reject){
        var tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).delete(id);
        tx.oncomplete = function(){ resolve(); };
        tx.onerror = function(){ reject(tx.error); };
      });
    }).catch(function(){ useMem = true; memStore = memStore.filter(function(r){ return r.id !== id; }); });
  }

  /* ---- Datei → Datenmodell (Thumb für Bilder, Text-Content für kleine Textdateien) ---- */
  function readText(file){
    return new Promise(function(resolve){
      if (file.size > TEXT_MAX || !/^text\//i.test(file.type||'')){ resolve(null); return; }
      try {
        var r = new FileReader();
        r.onload = function(){ resolve(String(r.result||'').slice(0, TEXT_MAX)); };
        r.onerror = function(){ resolve(null); };
        r.readAsText(file);
      } catch(e){ resolve(null); }
    });
  }
  function makeThumb(file){
    return new Promise(function(resolve){
      if (!/^image\//i.test(file.type||'') || /svg/i.test(file.type||'')){ resolve(null); return; }
      var url = null;
      try { url = URL.createObjectURL(file); } catch(e){ resolve(null); return; }
      var img = new Image();
      img.onload = function(){
        try {
          var w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
          var scale = Math.min(1, MAX_THUMB / Math.max(w, h) || 1);
          var cw = Math.max(1, Math.round(w*scale)), ch = Math.max(1, Math.round(h*scale));
          var cv = document.createElement('canvas'); cv.width = cw; cv.height = ch;
          var ctx = cv.getContext('2d'); ctx.drawImage(img, 0, 0, cw, ch);
          var data = cv.toDataURL('image/jpeg', 0.7);
          URL.revokeObjectURL(url);
          resolve(data);
        } catch(e){ try { URL.revokeObjectURL(url); } catch(e2){} resolve(null); }
      };
      img.onerror = function(){ try { URL.revokeObjectURL(url); } catch(e){} resolve(null); };
      img.src = url;
    });
  }

  // Erzeugt das Metadaten-Objekt (inkl. Blob) aus einer File. Demo-Einträge nutzen toRecordFromMeta.
  function fileToRecord(file){
    return Promise.all([ makeThumb(file), readText(file) ]).then(function(arr){
      var thumb = arr[0], content = arr[1];
      var ts = Date.now();
      var ext = extOf(file.name);
      return {
        id: fid(),
        name: file.name || ('Datei.' + ext.toLowerCase()),
        type: ext,
        mime: file.type || '',
        size: file.size || 0,
        sizeLabel: sizeLabel(file.size || 0),
        addedTs: ts,
        addedAt: deDate(ts),
        thumb: thumb || null,
        content: content || null,
        blob: file,            // echter Blob (IndexedDB-tauglich)
        demo: false
      };
    });
  }

  /* ============================ ATTACH-MENÜ + CHIPS ============================ */
  var attachLastFocus = null;
  window.WL_openAttachMenu = function(){
    var bd = document.getElementById('wlAttachBackdrop'); if (!bd) return;
    attachLastFocus = document.activeElement;
    bd.classList.add('open');
    var btn = document.getElementById('wlAttachBtn'); if (btn) btn.setAttribute('aria-expanded','true');
    document.addEventListener('keydown', attachTrap);
    var first = bd.querySelector('.attach-opt'); if (first) setTimeout(function(){ first.focus(); }, 40);
  };
  window.WL_closeAttachMenu = function(){
    var bd = document.getElementById('wlAttachBackdrop'); if (!bd) return;
    bd.classList.remove('open');
    var btn = document.getElementById('wlAttachBtn'); if (btn) btn.setAttribute('aria-expanded','false');
    document.removeEventListener('keydown', attachTrap);
    if (attachLastFocus && attachLastFocus.focus) try { attachLastFocus.focus(); } catch(e){}
  };
  function attachTrap(e){
    var bd = document.getElementById('wlAttachBackdrop'); if (!bd || !bd.classList.contains('open')) return;
    if (e.key === 'Escape'){ e.preventDefault(); window.WL_closeAttachMenu(); return; }
    if (e.key !== 'Tab') return;
    var f = bd.querySelectorAll('button, [tabindex]:not([tabindex="-1"])'); if (!f.length) return;
    var first = f[0], last = f[f.length-1];
    if (e.shiftKey && document.activeElement === first){ e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last){ e.preventDefault(); first.focus(); }
  }

  function pickFile(mode){
    var id = mode === 'gallery' ? 'wlFileGallery' : (mode === 'camera' ? 'wlFileCamera' : 'wlFileAny');
    var inp = document.getElementById(id); if (!inp) return;
    try { inp.value = ''; } catch(e){}
    inp.click();
  }
  window.WL_pickFile = pickFile;

  // Chips über der Textarea: zeigt gewählte Dateien an, Referenz am DOM-Node.
  function addChip(rec){
    var wrap = document.getElementById('wlAttachments'); if (!wrap) return;
    var chip = document.createElement('div'); chip.className = 'attachment-chip';
    var isImg = isImageType(rec.type, rec.mime);
    var icoInner = (isImg && rec.thumb) ? '<img src="'+rec.thumb+'" alt="">' : iconSvg(rec.type, 15);
    var shortName = rec.name.length > 26 ? (rec.name.slice(0,23) + '…') : rec.name;
    chip.innerHTML = '<span class="ac-ico" aria-hidden="true">'+icoInner+'</span>'+
      '<span class="ac-body"><span class="ac-name">'+esc(shortName)+'</span><span class="ac-size">'+esc(rec.type)+' · '+esc(rec.sizeLabel)+'</span></span>'+
      '<button class="ac-x" type="button" aria-label="Anhang entfernen"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>';
    chip._fileRef = rec;
    chip.querySelector('.ac-x').addEventListener('click', function(){ chip.remove(); syncAttachVisible(); });
    wrap.appendChild(chip); syncAttachVisible();
  }
  function syncAttachVisible(){
    var wrap = document.getElementById('wlAttachments'); if (!wrap) return;
    wrap.classList.toggle('has', wrap.children.length > 0);
  }
  function currentChips(){
    var wrap = document.getElementById('wlAttachments'); if (!wrap) return [];
    return Array.prototype.slice.call(wrap.querySelectorAll('.attachment-chip'));
  }
  function clearChips(){
    var wrap = document.getElementById('wlAttachments'); if (!wrap) return;
    wrap.innerHTML = ''; syncAttachVisible();
  }

  // Datei-Auswahl verarbeiten → Chip + sofort in die Mediathek (IndexedDB) übernehmen.
  function handleFilePick(fileList, opts){
    opts = opts || {};
    var files = Array.prototype.slice.call(fileList || []);
    if (!files.length) return Promise.resolve([]);
    return files.reduce(function(chain, file){
      return chain.then(function(acc){
        return fileToRecord(file).then(function(rec){
          return idbPut(rec).then(function(){
            // Cache-Metadaten (ohne Blob) für schnelles Grid-Render
            cachePush(rec);
            if (opts.asChip !== false) addChip(rec);
            acc.push(rec);
            return acc;
          });
        });
      });
    }, Promise.resolve([])).then(function(recs){
      updateCounts();
      if (recs.length) toast(recs.length + (recs.length===1?' Datei':' Dateien')+' hinzugefügt');
      // offenes Mediathek-Panel live aktualisieren
      if (isMediaPanelOpen()) renderMediaGrid();
      return recs;
    });
  }
  window.WL_handleFilePick = handleFilePick;

  function cachePush(rec){
    fileCache = fileCache.filter(function(r){ return r.id !== rec.id; });
    fileCache.push(metaOf(rec));
  }
  function metaOf(rec){
    return { id:rec.id, name:rec.name, type:rec.type, mime:rec.mime, size:rec.size, sizeLabel:rec.sizeLabel,
      addedTs:rec.addedTs, addedAt:rec.addedAt, thumb:rec.thumb||null, content:rec.content||null, demo:!!rec.demo, hasBlob:!!rec.blob };
  }

  /* ============================ ICON-MAPPING (EXT → SVG) ============================ */
  function iconSvg(ext, size){
    size = size || 28;
    var e = String(ext||'').toUpperCase();
    var open = '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">';
    var close = '</svg>';
    if (IMG_EXT[e]){ return open + '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/>' + close; }
    if (e==='XLS' || e==='XLSX' || e==='CSV'){ return open + '<rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/>' + close; }
    if (e==='ZIP' || e==='RAR' || e==='7Z' || e==='TAR' || e==='GZ'){ return open + '<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>' + close; }
    // PDF/DOC/DOCX/TXT/RTF/… → Dokument
    return open + '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="14" y2="17"/>' + close;
  }

  /* ============================ DEMO-EINTRÄGE (Metadaten, keine echten Blobs) ============================ */
  function demoSeed(){
    var base = Date.now();
    var seeds = [
      { name:'Kalibrierzeugnis_Hazet.pdf', size:248*1024, ageDays:3 },
      { name:'Werkstatt-Foto.jpg', size:1.8*1048576, ageDays:9, img:true },
      { name:'Werkzeug-Inventar.xlsx', size:42*1024, ageDays:14 },
      { name:'Schadensbild_Injektor.png', size:980*1024, ageDays:1, img:true },
      { name:'Pruefprotokoll_DSG.pdf', size:512*1024, ageDays:21 }
    ];
    return seeds.map(function(s){
      var ts = base - s.ageDays*86400000;
      var ext = extOf(s.name);
      var thumb = s.img ? demoThumb(s.name) : null;
      return {
        id:'f_demo_'+ext.toLowerCase()+'_'+s.ageDays, name:s.name, type:ext, mime: s.img?'image/jpeg':'application/octet-stream',
        size:Math.round(s.size), sizeLabel:sizeLabel(Math.round(s.size)),
        addedTs:ts, addedAt:deDate(ts), thumb:thumb, content:null, demo:true, hasBlob:false
      };
    });
  }
  // dezenter Platzhalter-Thumb (Canvas, Glass-Tokens) — kein echtes Foto nötig.
  function demoThumb(label){
    try {
      var cv = document.createElement('canvas'); cv.width = 220; cv.height = 165;
      var ctx = cv.getContext('2d');
      var cs = getComputedStyle(document.documentElement);
      var soft = (cs.getPropertyValue('--accent-soft')||'').trim() || 'rgba(20,109,171,0.14)';
      var acc = (cs.getPropertyValue('--accent')||'').trim() || '#146DAB';
      ctx.fillStyle = soft; ctx.fillRect(0,0,220,165);
      ctx.strokeStyle = acc; ctx.lineWidth = 2; ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.arc(70, 70, 18, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(30,140); ctx.lineTo(95,90); ctx.lineTo(140,120); ctx.lineTo(190,75); ctx.stroke();
      ctx.globalAlpha = 1;
      return cv.toDataURL('image/jpeg', 0.6);
    } catch(e){ return null; }
  }
  function maybeSeedDemo(){
    var seen = '0'; try { seen = localStorage.getItem('wl-media-demo-seeded') || '0'; } catch(e){}
    return idbAll().then(function(all){
      if (all && all.length) return all;
      if (seen === '1') return all; // Nutzer hat alles gelöscht → nicht neu säen
      var demos = demoSeed();
      return demos.reduce(function(ch, rec){
        return ch.then(function(){ return idbPut(rec); });
      }, Promise.resolve()).then(function(){
        try { localStorage.setItem('wl-media-demo-seeded','1'); } catch(e){}
        return idbAll();
      });
    });
  }

  /* ============================ MEDIATHEK-PANEL ============================ */
  var mediaState = { filter:'alle', q:'', limit:PAGE };

  function isMediaPanelOpen(){
    var p = document.getElementById('panel'); var t = document.getElementById('panelTitle');
    return !!(p && p.classList.contains('open') && t && (t.textContent||'').indexOf('Mediathek') === 0);
  }

  function loadCache(){
    return idbAll().then(function(all){
      fileCache = (all||[]).map(metaOf);
      return fileCache;
    });
  }

  function filteredFiles(){
    var q = (mediaState.q||'').toLowerCase().trim();
    var arr = fileCache.filter(function(f){
      if (mediaState.filter === 'fotos' && !isImageType(f.type, f.mime)) return false;
      if (mediaState.filter === 'dokumente' && isImageType(f.type, f.mime)) return false;
      if (q && String(f.name||'').toLowerCase().indexOf(q) < 0) return false;
      return true;
    });
    arr.sort(function(a,b){ return (b.addedTs||0) - (a.addedTs||0); });
    return arr;
  }

  function tileHtml(f){
    var isImg = isImageType(f.type, f.mime);
    var thumb = (isImg && f.thumb) ? '<img loading="lazy" src="'+f.thumb+'" alt="'+esc(f.name)+'">'
      : '<span class="ft-ico" aria-hidden="true">'+iconSvg(f.type, 34)+'</span>';
    return '<div class="wl-file-tile" data-fid="'+esc(f.id)+'" tabindex="0" role="button" aria-label="'+esc(f.name)+', '+esc(f.sizeLabel)+'">'+
      '<button class="wl-file-del" type="button" data-del="'+esc(f.id)+'" aria-label="Datei löschen" title="Löschen"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>'+
      '<div class="wl-file-thumb">'+thumb+'<span class="wl-file-ext">'+esc(f.type)+'</span>'+(f.demo?'<span class="wl-file-demo">Demo</span>':'')+'</div>'+
      '<div class="wl-file-meta"><div class="wl-file-name">'+esc(f.name)+'</div><div class="wl-file-sub">'+esc(f.sizeLabel)+' · '+esc(f.addedAt)+'</div></div>'+
    '</div>';
  }

  function renderMediaGrid(){
    var grid = document.getElementById('wlMediaGrid'); if (!grid) return;
    var all = filteredFiles();
    var total = fileCache.length;
    var shown = Math.min(mediaState.limit, all.length);
    var slice = all.slice(0, shown);
    grid.className = 'wl-grid-files' + (mediaState.filter === 'fotos' ? ' is-photos' : '');

    var more = document.getElementById('wlMediaMoreWrap'); if (more) more.remove();

    if (!slice.length){
      grid.classList.remove('wl-grid-files','is-photos');
      grid.innerHTML = '<div class="wl-empty"><div class="em-mark">🖼</div>'+(mediaState.q||mediaState.filter!=='alle' ? 'Keine Treffer für die aktuellen Filter.' : 'Noch keine Dateien. Tippe „Hochladen" oder ziehe Dateien hierher.')+'</div>';
    } else {
      grid.innerHTML = slice.map(tileHtml).join('');
    }

    // Treffer-Zähler aktualisieren
    var cnt = document.getElementById('wlMediaCount'); if (cnt) cnt.textContent = all.length + ' von ' + total;

    // „Mehr laden"
    if (shown < all.length){
      var mw = document.createElement('div'); mw.id = 'wlMediaMoreWrap'; mw.className = 'wl-loadmore';
      mw.innerHTML = '<button class="btn btn-outline" id="wlMediaMore">Mehr laden ('+(all.length - shown)+' weitere)</button>';
      grid.parentNode.appendChild(mw);
      var mb = document.getElementById('wlMediaMore');
      if (mb) mb.addEventListener('click', function(){ mediaState.limit += PAGE; renderMediaGrid(); });
    }

    // Tile-Events: Klick → Lightbox, Löschen → Bestätigung
    Array.prototype.forEach.call(grid.querySelectorAll('.wl-file-tile'), function(tile){
      var id = tile.getAttribute('data-fid');
      tile.addEventListener('click', function(e){ if (e.target.closest && e.target.closest('[data-del]')) return; openLightbox(id); });
      tile.addEventListener('keydown', function(e){ if (e.key==='Enter' || e.key===' '){ e.preventDefault(); openLightbox(id); } });
    });
    Array.prototype.forEach.call(grid.querySelectorAll('[data-del]'), function(b){
      b.addEventListener('click', function(e){ e.stopPropagation(); confirmDelete(b.getAttribute('data-del')); });
    });
  }

  async function buildMediathek(inner, actions){
    if (actions) actions.innerHTML = '<button class="btn" id="wlMediaUpload"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12"/><polyline points="8 7 12 3 16 7"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>Hochladen</button>';

    await loadCache();
    updateCounts();
    var photos = fileCache.filter(function(f){ return isImageType(f.type, f.mime); }).length;

    inner.innerHTML = '<div class="panel-wrap wl-media-drop" id="wlMediaDrop">'+
      '<div class="wl-media-head"><div class="mh-body">'+
        '<div class="wl-media-sub" id="wlMediaSummary">'+fileCache.length+' Dateien · '+photos+' Fotos</div>'+
      '</div></div>'+
      '<div class="wl-ptools"><div class="wl-ptools-row">'+
        '<input class="wl-psearch" id="wlMediaSearch" placeholder="Datei suchen…" autocomplete="off" aria-label="Mediathek durchsuchen" value="'+esc(mediaState.q)+'">'+
        '<span class="wl-pcount" id="wlMediaCount">0 von 0</span>'+
      '</div>'+
      '<div class="wl-ptools-row"><div class="wl-chips" role="group" aria-label="Filter">'+
        '<button class="wl-chip'+(mediaState.filter==='alle'?' is-on':'')+'" data-mfilter="alle" aria-pressed="'+(mediaState.filter==='alle'?'true':'false')+'">Alle</button>'+
        '<button class="wl-chip'+(mediaState.filter==='fotos'?' is-on':'')+'" data-mfilter="fotos" aria-pressed="'+(mediaState.filter==='fotos'?'true':'false')+'">Fotos</button>'+
        '<button class="wl-chip'+(mediaState.filter==='dokumente'?' is-on':'')+'" data-mfilter="dokumente" aria-pressed="'+(mediaState.filter==='dokumente'?'true':'false')+'">Dokumente</button>'+
      '</div></div></div>'+
      '<div id="wlMediaGrid" class="wl-grid-files"></div>'+
    '</div>';

    renderMediaGrid();

    var up = document.getElementById('wlMediaUpload'); if (up) up.addEventListener('click', function(){ pickFile('any'); });

    var search = document.getElementById('wlMediaSearch');
    if (search){
      var st = null;
      search.addEventListener('input', function(){
        if (st) clearTimeout(st); var v = this.value;
        st = setTimeout(function(){
          mediaState.q = v; mediaState.limit = PAGE; renderMediaGrid();
          var ss = document.getElementById('wlMediaSearch'); if (ss){ ss.focus(); var vv = ss.value; ss.value=''; ss.value=vv; }
        }, 200);
      });
    }
    Array.prototype.forEach.call(inner.querySelectorAll('[data-mfilter]'), function(b){
      b.addEventListener('click', function(){
        mediaState.filter = b.getAttribute('data-mfilter'); mediaState.limit = PAGE;
        Array.prototype.forEach.call(inner.querySelectorAll('[data-mfilter]'), function(x){
          var on = x.getAttribute('data-mfilter') === mediaState.filter;
          x.classList.toggle('is-on', on); x.setAttribute('aria-pressed', on?'true':'false');
        });
        renderMediaGrid();
      });
    });

    // Drag & Drop auf das Panel
    var drop = document.getElementById('wlMediaDrop');
    if (drop){
      ['dragenter','dragover'].forEach(function(ev){ drop.addEventListener(ev, function(e){ e.preventDefault(); e.stopPropagation(); drop.classList.add('dragover'); }); });
      ['dragleave','dragend'].forEach(function(ev){ drop.addEventListener(ev, function(e){ e.preventDefault(); if (e.target===drop) drop.classList.remove('dragover'); }); });
      drop.addEventListener('drop', function(e){
        e.preventDefault(); e.stopPropagation(); drop.classList.remove('dragover');
        var dt = e.dataTransfer; if (!dt || !dt.files || !dt.files.length) return;
        handleFilePick(dt.files, { asChip:false });
      });
    }
  }

  function updateSummary(){
    var sum = document.getElementById('wlMediaSummary'); if (!sum) return;
    var photos = fileCache.filter(function(f){ return isImageType(f.type, f.mime); }).length;
    sum.textContent = fileCache.length + ' Dateien · ' + photos + ' Fotos';
  }

  function confirmDelete(id){
    var f = fileCache.filter(function(x){ return x.id===id; })[0]; if (!f) return;
    if (!window.confirm('Datei „'+f.name+'" wirklich löschen?')) return;
    idbDel(id).then(function(){
      fileCache = fileCache.filter(function(x){ return x.id !== id; });
      updateCounts(); updateSummary(); renderMediaGrid(); toast('Datei gelöscht');
    });
  }

  /* ============================ LIGHTBOX ============================ */
  var lightLastFocus = null;
  function openLightbox(id){
    // vollen Record (inkl. Blob) holen — für „Herunterladen" + Großbild
    idbAll().then(function(all){
      var rec = (all||[]).filter(function(r){ return r.id===id; })[0] || fileCache.filter(function(r){ return r.id===id; })[0];
      if (!rec) return;
      var lb = document.getElementById('wlLightbox'); var inner = document.getElementById('wlLightboxInner'); if (!lb || !inner) return;
      lightLastFocus = document.activeElement;
      var isImg = isImageType(rec.type, rec.mime);
      var bodyHtml, objUrl = null;
      if (isImg){
        var src = null;
        if (rec.blob){ try { src = URL.createObjectURL(rec.blob); objUrl = src; } catch(e){} }
        if (!src) src = rec.thumb || '';
        bodyHtml = src ? '<div class="wl-lightbox-body"><img src="'+src+'" alt="'+esc(rec.name)+'"></div>'
          : '<div class="wl-lightbox-info"><div class="li-mark" aria-hidden="true">'+iconSvg(rec.type,30)+'</div><div class="li-name">'+esc(rec.name)+'</div><div class="li-meta">Vorschau nicht verfügbar</div></div>';
      } else {
        bodyHtml = '<div class="wl-lightbox-info"><div class="li-mark" aria-hidden="true">'+iconSvg(rec.type,30)+'</div>'+
          '<div class="li-name">'+esc(rec.name)+'</div>'+
          '<div class="li-meta">'+esc(rec.type)+' · '+esc(rec.sizeLabel)+' · hinzugefügt '+esc(rec.addedAt)+'</div>'+
          (rec.content ? '<div style="text-align:left;margin-top:16px;padding:13px 14px;background:var(--code-bg);border:1px solid var(--code-border);border-radius:10px;font-family:var(--font-mono);font-size:12px;line-height:1.5;white-space:pre-wrap;max-height:40vh;overflow:auto">'+esc(rec.content.slice(0,4000))+'</div>' : '')+
          '</div>';
      }
      var canDownload = !!rec.blob;
      inner.innerHTML = '<div class="wl-lightbox-bar">'+
          '<span class="lb-title">'+esc(rec.name)+'</span>'+
          (canDownload ? '<button class="btn" id="wlLbDownload"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12"/><polyline points="8 11 12 15 16 11"/><path d="M4 19h16"/></svg>Herunterladen</button>' : '<span class="wl-pill warn">Demo — kein Download</span>')+
          '<button class="btn btn-outline" id="wlLbDel" style="padding:9px 12px" aria-label="Löschen"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>'+
          '<button class="mdl-close" id="wlLbClose" aria-label="Schließen">&#10005;</button>'+
        '</div>'+ bodyHtml;
      inner.__objUrl = objUrl;
      lb.classList.add('open');
      document.addEventListener('keydown', lightboxTrap);
      lb.addEventListener('mousedown', lightboxBackdrop);
      var dl = document.getElementById('wlLbDownload');
      if (dl) dl.addEventListener('click', function(){ downloadRecord(rec); });
      var del = document.getElementById('wlLbDel');
      if (del) del.addEventListener('click', function(){ closeLightbox(); confirmDelete(rec.id); });
      var cl = document.getElementById('wlLbClose'); if (cl){ cl.addEventListener('click', closeLightbox); setTimeout(function(){ cl.focus(); }, 40); }
    });
  }
  function closeLightbox(){
    var lb = document.getElementById('wlLightbox'); var inner = document.getElementById('wlLightboxInner'); if (!lb) return;
    lb.classList.remove('open');
    document.removeEventListener('keydown', lightboxTrap);
    lb.removeEventListener('mousedown', lightboxBackdrop);
    if (inner && inner.__objUrl){ try { URL.revokeObjectURL(inner.__objUrl); } catch(e){} inner.__objUrl = null; }
    if (lightLastFocus && lightLastFocus.focus) try { lightLastFocus.focus(); } catch(e){}
  }
  function lightboxBackdrop(e){ if (e.target && e.target.id === 'wlLightbox') closeLightbox(); }
  function lightboxTrap(e){
    var lb = document.getElementById('wlLightbox'); if (!lb || !lb.classList.contains('open')) return;
    if (e.key === 'Escape'){ e.preventDefault(); closeLightbox(); return; }
    if (e.key !== 'Tab') return;
    var f = lb.querySelectorAll('button, [href], [tabindex]:not([tabindex="-1"])'); if (!f.length) return;
    var first = f[0], last = f[f.length-1];
    if (e.shiftKey && document.activeElement === first){ e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last){ e.preventDefault(); first.focus(); }
  }
  function downloadRecord(rec){
    if (!rec || !rec.blob){ toast('Demo-Eintrag — kein echter Download'); return; }
    try {
      var a = document.createElement('a'); a.href = URL.createObjectURL(rec.blob); a.download = rec.name || 'datei';
      document.body.appendChild(a); a.click();
      setTimeout(function(){ try { URL.revokeObjectURL(a.href); } catch(e){} a.remove(); }, 200);
      toast('Download gestartet');
    } catch(e){ toast('Download fehlgeschlagen'); }
  }

  /* ============================ COUNTS ============================ */
  function updateCounts(){
    var n = fileCache.length;
    var a = document.getElementById('cntMedia'); if (a) a.textContent = n;
    var b = document.getElementById('cntRailMedia'); if (b) b.textContent = n;
  }

  /* ---- Composer-Galerie aus Mediathek (Option „Aus Mediathek") ---- */
  function openLibraryPicker(){
    window.WL_closeAttachMenu();
    loadCache().then(function(){
      var imgs = fileCache.filter(function(f){ return isImageType(f.type, f.mime); });
      var bd = document.getElementById('wlAttachBackdrop'); var menu = document.getElementById('wlAttachMenu'); if (!bd || !menu) return;
      var grid = imgs.length ? '<div class="wl-grid-files is-photos" style="margin-top:6px">'+ imgs.slice(0,30).map(function(f){
          var thumb = f.thumb ? '<img loading="lazy" src="'+f.thumb+'" alt="'+esc(f.name)+'">' : '<span class="ft-ico" aria-hidden="true">'+iconSvg(f.type,30)+'</span>';
          return '<div class="wl-file-tile" data-libpick="'+esc(f.id)+'" tabindex="0" role="button" aria-label="'+esc(f.name)+'"><div class="wl-file-thumb">'+thumb+'<span class="wl-file-ext">'+esc(f.type)+'</span></div><div class="wl-file-meta"><div class="wl-file-name">'+esc(f.name)+'</div></div></div>';
        }).join('') + '</div>'
        : '<div class="wl-empty" style="padding:30px 10px"><div class="em-mark">🖼</div>Noch keine Bilder in der Mediathek.</div>';
      menu.innerHTML = '<div class="attach-grip" aria-hidden="true"></div>'+
        '<h3 class="attach-title">Aus Mediathek wählen</h3>'+ grid;
      // erneut öffnen-Status sicherstellen
      bd.classList.add('open');
      Array.prototype.forEach.call(menu.querySelectorAll('[data-libpick]'), function(t){
        function go(){ var id = t.getAttribute('data-libpick'); var rec = fileCache.filter(function(x){ return x.id===id; })[0]; if (rec){ addChip(rec); toast('Aus Mediathek angehängt'); } window.WL_closeAttachMenu(); rebuildAttachMenu(); }
        t.addEventListener('click', go);
        t.addEventListener('keydown', function(e){ if (e.key==='Enter'||e.key===' '){ e.preventDefault(); go(); } });
      });
    });
  }
  // Attach-Menü auf Default-Inhalt zurücksetzen (nach Mediathek-Auswahl)
  function rebuildAttachMenu(){
    var menu = document.getElementById('wlAttachMenu'); if (!menu || menu.__defaultHtml == null) return;
    menu.innerHTML = menu.__defaultHtml;
    wireAttachOptions();
  }

  function wireAttachOptions(){
    var bd = document.getElementById('wlAttachBackdrop'); if (!bd) return;
    bd.addEventListener('mousedown', function(e){ if (e.target === bd) window.WL_closeAttachMenu(); });
    Array.prototype.forEach.call(bd.querySelectorAll('.attach-opt[data-pick]'), function(b){
      if (b.__wired) return; b.__wired = true;
      b.addEventListener('click', function(){
        var mode = b.getAttribute('data-pick');
        if (mode === 'library'){ openLibraryPicker(); return; }
        window.WL_closeAttachMenu();
        pickFile(mode);
      });
    });
  }

  /* ============================ HOOKS ============================ */
  // Hidden-Inputs verkabeln
  function wireInputs(){
    ['wlFileAny','wlFileGallery','wlFileCamera'].forEach(function(id){
      var inp = document.getElementById(id); if (!inp || inp.__wired) return; inp.__wired = true;
      inp.addEventListener('change', function(){ if (this.files && this.files.length) handleFilePick(this.files); });
    });
  }

  // sendMessage wrappen: angehängte Dateien anzeigen + in Mediathek übernehmen, dann Chips leeren.
  function wrapSend(){
    if (typeof window.sendMessage !== 'function' || window.sendMessage.__wlMediaHook) return;
    var orig = window.sendMessage;
    window.sendMessage = function(){
      var chips = currentChips();
      if (chips.length){
        var box = document.getElementById('chatMessages');
        var inp = document.getElementById('chatInput');
        var hasText = inp && (inp.value||'').trim();
        // Angehängte Dateien als eigene User-Karte zeigen (offline: nur Anzeige, kein echter Upload).
        if (box){
          if (window.WL_clearWelcome) window.WL_clearWelcome();
          var m = document.createElement('div'); m.className = 'message message-user';
          var inner = '<div class="bubble"><div style="display:flex;flex-wrap:wrap;gap:8px">';
          chips.forEach(function(ch){
            var rec = ch._fileRef || {};
            var isImg = isImageType(rec.type, rec.mime);
            var ico = (isImg && rec.thumb)
              ? '<img src="'+rec.thumb+'" alt="" style="width:34px;height:34px;border-radius:8px;object-fit:cover;display:block">'
              : '<span style="display:flex;width:34px;height:34px;border-radius:8px;align-items:center;justify-content:center;background:rgba(255,255,255,0.18)">'+iconSvg(rec.type,18)+'</span>';
            inner += '<span style="display:inline-flex;align-items:center;gap:8px;padding:6px 10px 6px 6px;background:rgba(255,255,255,0.14);border-radius:10px">'+ico+'<span style="font-size:12.5px;font-weight:600">'+esc(rec.name||'Datei')+'</span></span>';
          });
          inner += '</div></div>';
          m.innerHTML = inner; box.appendChild(m);
          if (typeof window.__xdabScrollToEnd === 'function') window.__xdabScrollToEnd();
        }
        clearChips();
        // bereits in Mediathek (bei Auswahl gespeichert); Counts/Panel ggf. aktualisieren
        updateCounts(); if (isMediaPanelOpen()) renderMediaGrid();
        // Wenn kein Text: nicht ins Backend/Offline-Antwort laufen lassen.
        if (!hasText) return;
      }
      return orig.apply(this, arguments);
    };
    window.sendMessage.__wlMediaHook = true;
  }

  // openPanel wrappen: 'mediathek' → eigener Renderer (analog wl-paneltools).
  function wrapOpen(){
    if (typeof window.openPanel !== 'function' || window.openPanel.__wlMediaHook) return;
    var orig = window.openPanel;
    window.openPanel = function(name){
      if (name === 'mediathek'){
        var panel = document.getElementById('panel'); var inner = document.getElementById('panelInner');
        var titleEl = document.getElementById('panelTitle'); var actions = document.getElementById('panelActions');
        if (!panel || !inner) return orig.apply(this, arguments);
        if (window.closeMenu) window.closeMenu();
        if (titleEl) titleEl.textContent = 'Mediathek';
        if (actions) actions.innerHTML = '';
        inner.innerHTML = '<div class="panel-wrap"><div class="wl-empty"><div class="spinner" style="margin:0 auto 12px"></div>Lade…</div></div>';
        panel.classList.add('open'); panel.setAttribute('aria-hidden','false');
        panel.scrollTop = 0; inner.scrollTop = 0;
        if (window.WL_rememberPanel) window.WL_rememberPanel('mediathek');
        if (window.WL_setActiveNav) window.WL_setActiveNav('mediathek');
        if (window.WL_syncTabbar) window.WL_syncTabbar('mediathek');
        (async function(){
          try { await buildMediathek(inner, actions); }
          catch(e){ inner.innerHTML = '<div class="panel-wrap"><div class="wl-empty"><div class="em-mark">⚠</div>Mediathek-Fehler: '+esc(e&&e.message||e)+'</div></div>'; }
        })();
        return;
      }
      return orig.apply(this, arguments);
    };
    window.openPanel.__wlMediaHook = true;
    if (orig.__wlNavHook) window.openPanel.__wlNavHook = true;
    if (orig.__wlScaledHook) window.openPanel.__wlScaledHook = true;
  }

  function boot(){
    wireInputs(); wrapSend(); wrapOpen();
    var menu = document.getElementById('wlAttachMenu');
    if (menu && menu.__defaultHtml == null) menu.__defaultHtml = menu.innerHTML;
    wireAttachOptions();
    // Demo-Seed + Cache + Counts (best effort, einmalig)
    maybeSeedDemo().then(function(){ return loadCache(); }).then(function(){ updateCounts(); if (isMediaPanelOpen()) renderMediaGrid(); }).catch(function(){});
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot); else boot();
  setTimeout(boot, 1500); setTimeout(boot, 4000);
})();
</script>

</body>
</html>
