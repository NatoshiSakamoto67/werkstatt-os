.mdl-pill > svg { flex-shrink:0; color:var(--accent-fg); }
.mdl-pill:hover { background:var(--glass-hover); border-color:var(--accent-fg); }
.mdl-pill:active { transform:scale(0.97); }
.mdl-pill[aria-expanded="true"] { border-color:var(--accent-fg); background:var(--accent-soft); }
.mdl-pill:focus-visible { outline:none; border-color:var(--accent-fg); box-shadow:0 0 0 2px var(--accent-glow); }
.mdl-pill-model { font-weight:600; overflow:hidden; text-overflow:ellipsis; }
.mdl-pill-mode { color:var(--accent-fg); font-weight:600; overflow:hidden; text-overflow:ellipsis; }
.mdl-backdrop { display:none; position:fixed; inset:0; z-index:2000; background:var(--overlay); align-items:flex-end; justify-content:center; }
.mdl-backdrop.open { display:flex; }
body.mdl-lock { overflow:hidden; }
.mdl-sheet { width:100%; max-width:640px; max-height:86vh; overflow-y:auto; -webkit-overflow-scrolling:touch; box-sizing:border-box; padding:8px 18px calc(20px + env(safe-area-inset-bottom,0px)); background:var(--glass-3); border:1px solid var(--glass-border); border-bottom:none; border-radius:16px 16px 0 0; box-shadow:var(--glass-shadow-strong); color:var(--text); font-family:var(--font-ui); animation:mdlSlideUp 0.22s ease; }
@keyframes mdlSlideUp { from{transform:translateY(14px); opacity:0;} to{transform:translateY(0); opacity:1;} }
.mdl-grip { width:40px; height:4px; margin:4px auto 12px; border-radius:2px; background:var(--glass-border-strong); }
.mdl-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:4px; }
.mdl-title { margin:0; font-size:17px; font-weight:600; letter-spacing:-0.01em; color:var(--text); }
.mdl-close { display:inline-flex; align-items:center; justify-content:center; width:32px; height:32px; flex-shrink:0; background:var(--glass-2); color:var(--text-muted); border:1px solid var(--glass-border); border-radius:8px; cursor:pointer; }
.mdl-note { margin:8px 0 14px; padding:10px 12px; background:var(--glass-2); border:1px solid var(--glass-border-soft); border-radius:8px; color:var(--text-muted); font-size:12px; line-height:1.5; }
.mdl-grp-title { margin:16px 0 8px; color:var(--accent-fg); font-size:10.5px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; }
.mdl-list { display:flex; flex-direction:column; gap:6px; }
.mdl-row,.mdl-mode { display:flex; align-items:center; gap:12px; width:100%; box-sizing:border-box; padding:11px 13px; background:var(--glass-2); color:var(--text); border:1px solid var(--glass-border); border-radius:10px; cursor:pointer; }
.mdl-row.is-on,.mdl-mode.is-on { background:var(--accent-soft); border-color:var(--accent-fg); }

.xdab-agent-run { border:1px solid var(--glass-border); border-radius:12px; background:var(--glass-2); padding:14px; margin:4px 0; }
.xdab-agent-head { display:flex; align-items:center; gap:9px; font-weight:700; font-size:13.5px; margin-bottom:10px; color:var(--text); }
.xdab-agent-spin { width:13px; height:13px; border:2px solid var(--glass-border); border-top-color:var(--accent-fg); border-radius:50%; animation:spin .8s linear infinite; flex-shrink:0; }
.xdab-agent-steps { display:flex; flex-direction:column; gap:9px; }
.xdab-agent-step { border-left:2px solid var(--accent); padding:2px 0 2px 11px; }
.xdab-agent-step-label { font-size:11px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; color:var(--accent-fg); }
.xdab-agent-step-text { font-size:13px; color:var(--text); white-space:pre-wrap; margin-top:3px; line-height:1.45; }
.xdab-agent-answer { margin-top:12px; padding-top:12px; border-top:1px solid var(--glass-border); font-size:14.5px; line-height:1.55; white-space:pre-wrap; color:var(--text); }
.xdab-agent-note { font-size:12px; color:var(--text-muted); margin-top:9px; }
.xdab-agent-done .xdab-agent-spin { display:none; }

.orch-badge { font-size:10px; font-weight:800; padding:2px 7px; border-radius:6px; flex:none; letter-spacing:.02em; }
.orch-badge-read { background:rgba(59,130,246,.16); color:#3b82f6; }
.orch-badge-write { background:var(--warning-soft); color:var(--warning-soft-text); }
.orch-badge-send { background:var(--danger-soft); color:var(--danger-soft-text); }
.xdab-orch-gate { display:flex; gap:8px; margin-top:2px; flex-wrap:wrap; }
.xdab-orch-ok { background:var(--accent); color:var(--accent-text); border-color:var(--accent-fg); }

.proc-sources { margin:10px 0 2px; padding:10px 12px; background:var(--glass-2); border:1px solid var(--glass-border); border-radius:10px; font-size:12.5px; color:var(--text); display:flex; flex-wrap:wrap; gap:8px; }
.proc-src-link { display:flex; align-items:center; gap:9px; padding:7px 9px; border-radius:8px; text-decoration:none; color:var(--text); background:var(--glass-3); border:1px solid var(--glass-border-soft); transition:border-color .15s ease, background .15s ease; }
.proc-src-link:hover { border-color:var(--accent-fg); }
.proc-src-ico { width:18px; height:18px; border-radius:5px; overflow:hidden; flex-shrink:0; background:#fff; display:flex; align-items:center; justify-content:center; }
.proc-src-favicon { width:100%; height:100%; object-fit:cover; display:block; }
.proc-src-meta { font-size:11.5px; color:var(--text-muted); font-family:var(--font-mono,monospace); }

.wl-result-card { display:flex; gap:14px; padding:14px 16px; background:var(--glass-3); backdrop-filter:blur(40px) saturate(200%); border:1px solid var(--glass-border); border-radius:14px; box-shadow:var(--glass-shadow), inset 0 1px 0 var(--glass-highlight-top); transition:all .15s; cursor:pointer; }
.wl-result-card:hover { border-color:var(--accent-fg); transform:translateY(-1px); }
.wl-pill { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; font-size:11.5px; font-weight:600; background:var(--accent-soft); color:var(--accent-soft-text); border:1px solid var(--glass-border-soft); }
.wl-pill.ok { background:var(--success-soft); color:var(--success-soft-text); }
.wl-pill.warn { background:var(--warning-soft); color:var(--warning-soft-text); }
.wl-pill.danger { background:var(--danger-soft); color:var(--danger-soft-text); }

.wl-map { width:100%; height:420px; border-radius:14px; overflow:hidden; border:1px solid var(--glass-border); box-shadow:var(--glass-shadow); }
.leaflet-popup-content { font-family:var(--font-ui); font-size:13px; }

.btn:focus-visible, .icon-btn:focus-visible, .send-btn:focus-visible, .menu-item:focus-visible, .input-btn:focus-visible { outline:none; box-shadow:0 0 0 3px var(--accent-glow); }

/* ============================================================================
   WERKLEIH — ZUSATZ-CSS (Welcome, Panels, Autocomplete, Tabellen, Forms)
   Nutzt dieselbe Glass-Sprache; ergänzt nur, was das Design-System nicht hat.
   ============================================================================ */
.welcome { max-width:760px; margin:0 auto; padding:40px 8px 16px; text-align:center; }
.welcome-mark { width:84px; height:84px; margin:0 auto 22px; border-radius:22px; background:var(--gradient-brand); color:#fff; display:flex; align-items:center; justify-content:center; box-shadow:0 14px 40px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.3); }
.welcome-mark .brand-x { width:62%; height:62%; }
.welcome h1 { font-size:30px; font-weight:800; letter-spacing:-0.03em; color:var(--text); margin-bottom:10px; line-height:1.15; }
.welcome p { font-size:15px; color:var(--text-muted); line-height:1.6; margin-bottom:26px; }
.welcome-suggestions { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; text-align:left; }

.panel { position:fixed; inset:0; z-index:70; background:var(--bg-base); transform:translateX(100%); transition:transform 0.32s cubic-bezier(0.32,0.72,0,1); display:flex; flex-direction:column; visibility:hidden; }
.panel.open { transform:translateX(0); visibility:visible; }
@media (prefers-reduced-motion: reduce){ .panel, .slide-menu { transition:none; } }
.panel-bar { position:relative; z-index:2; display:flex; align-items:center; gap:12px; padding:14px 18px; border-bottom:1px solid var(--glass-border); background:color-mix(in srgb, var(--bg-base) 92%, transparent); }
.panel-bar h2 { font-size:18px; font-weight:800; letter-spacing:-0.02em; color:var(--text); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.panel-inner { position:relative; z-index:1; flex:1; overflow-y:auto; padding:22px 18px 60px; }
.panel-wrap { max-width:980px; margin:0 auto; }
.panel-sub { color:var(--text-muted); font-size:13.5px; line-height:1.6; margin-bottom:18px; }

.wl-search-hero { background:var(--glass-3); backdrop-filter:blur(50px) saturate(220%); border:1px solid var(--glass-border); border-radius:18px; padding:20px; box-shadow:var(--glass-shadow-strong), inset 0 1px 0 var(--glass-highlight-top); margin-bottom:22px; position:relative; }
.wl-search-hero h3 { font-size:16px; font-weight:700; margin-bottom:4px; letter-spacing:-0.01em; }
.wl-search-hero .hint { font-size:12.5px; color:var(--text-faint); margin-bottom:14px; }
.wl-ac { position:relative; }
.wl-input { width:100%; box-sizing:border-box; padding:13px 15px; background:var(--glass-2); color:var(--text); border:1px solid var(--glass-border); border-radius:12px; font-size:16px; font-family:inherit; font-weight:500; box-shadow:inset 0 1px 0 var(--glass-highlight-top); }
.wl-input:focus { outline:none; border-color:var(--accent-fg); box-shadow:0 0 0 3px var(--accent-glow); }
.wl-ac-list { position:absolute; left:0; right:0; top:calc(100% + 6px); z-index:40; background:var(--glass-3); backdrop-filter:blur(40px) saturate(200%); border:1px solid var(--glass-border); border-radius:12px; box-shadow:var(--glass-shadow-strong); max-height:280px; overflow-y:auto; display:none; }
.wl-ac-list.open { display:block; }
.wl-ac-item { padding:10px 14px; cursor:pointer; font-size:13.5px; display:flex; flex-direction:column; gap:2px; border-bottom:1px solid var(--glass-border-soft); }
.wl-ac-item:last-child { border-bottom:none; }
.wl-ac-item:hover, .wl-ac-item.active { background:var(--accent-soft); }
.wl-ac-item .veh-main { font-weight:600; color:var(--text); }
.wl-ac-item .veh-sub { font-size:11.5px; color:var(--text-faint); }

.wl-result-card .rc-icon { width:44px; height:44px; flex-shrink:0; border-radius:12px; background:var(--accent-soft); color:var(--accent-soft-text); display:flex; align-items:center; justify-content:center; }
.wl-result-card .rc-body { flex:1; min-width:0; }
.wl-result-card .rc-title { font-weight:700; font-size:14.5px; color:var(--text); letter-spacing:-0.01em; }
.wl-result-card .rc-meta { font-size:12.5px; color:var(--text-muted); margin-top:2px; }
.wl-result-card .rc-pills { display:flex; flex-wrap:wrap; gap:7px; margin-top:9px; }
.wl-result-card .rc-action { align-self:center; flex-shrink:0; }

.wl-grid { display:grid; gap:14px; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); }
.wl-card { background:var(--glass-3); backdrop-filter:blur(40px) saturate(200%); border:1px solid var(--glass-border); border-radius:14px; padding:16px; box-shadow:var(--glass-shadow), inset 0 1px 0 var(--glass-highlight-top); }
.wl-card .c-head { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
.wl-card .c-title { font-weight:700; font-size:14.5px; letter-spacing:-0.01em; }
.wl-card .c-meta { font-size:12.5px; color:var(--text-muted); margin-top:4px; line-height:1.5; }
.wl-card .c-foot { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; align-items:center; }

.wl-table { width:100%; border-collapse:collapse; font-size:13px; }
.wl-table thead th { text-align:left; padding:10px 12px; font-size:10.5px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-faint); border-bottom:1px solid var(--glass-border); }
.wl-table tbody td { padding:11px 12px; border-bottom:1px solid var(--glass-border-soft); color:var(--text); vertical-align:middle; }
.wl-table tbody tr:hover { background:var(--glass-2); }
.wl-table-wrap { background:var(--glass-3); backdrop-filter:blur(40px) saturate(200%); border:1px solid var(--glass-border); border-radius:14px; overflow:hidden; box-shadow:var(--glass-shadow), inset 0 1px 0 var(--glass-highlight-top); }

.wl-toolbar-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
.wl-toolbar-row .grow { flex:1; min-width:160px; }

.wl-empty { text-align:center; padding:46px 18px; color:var(--text-faint); font-size:13.5px; }
.wl-empty .em-mark { font-size:30px; opacity:0.5; margin-bottom:10px; }

.wl-offline { display:inline-flex; align-items:center; gap:7px; padding:4px 11px; border-radius:999px; font-size:11px; font-weight:600; background:var(--warning-soft); color:var(--warning-soft-text); border:1px solid var(--glass-border-soft); }
.wl-offline .dot { width:7px; height:7px; border-radius:50%; background:var(--warning); }
.wl-online { display:inline-flex; align-items:center; gap:7px; padding:4px 11px; border-radius:999px; font-size:11px; font-weight:600; background:var(--success-soft); color:var(--success-soft-text); border:1px solid var(--glass-border-soft); }
.wl-online .dot { width:7px; height:7px; border-radius:50%; background:var(--success); box-shadow:0 0 7px var(--success); }

.wl-form { display:flex; flex-direction:column; gap:13px; }
.wl-field { display:flex; flex-direction:column; gap:5px; }
.wl-field label { font-size:11.5px; font-weight:700; color:var(--text-muted); letter-spacing:0.02em; }
.wl-field input, .wl-field select, .wl-field textarea { padding:10px 12px; background:var(--glass-2); color:var(--text); border:1px solid var(--glass-border); border-radius:10px; font-family:inherit; font-size:14px; box-shadow:inset 0 1px 0 var(--glass-highlight-top); }
.wl-field input:focus, .wl-field select:focus, .wl-field textarea:focus { outline:none; border-color:var(--accent-fg); box-shadow:0 0 0 2px var(--accent-glow); }
.wl-form-grid { display:grid; grid-template-columns:1fr 1fr; gap:13px; }
@media (max-width:560px){ .wl-form-grid { grid-template-columns:1fr; } }

.wl-map-ph { width:100%; height:420px; border-radius:14px; border:1px dashed var(--glass-border-strong); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; text-align:center; color:var(--text-faint); font-size:13px; background:var(--glass-2); padding:20px; }
.wl-map-ph .ph-mark { font-size:28px; opacity:0.6; }

/* Modal (Werkzeug add/edit + Export) — Glass-Dialog */
.wl-modal-bd { display:none; position:fixed; inset:0; z-index:2200; background:var(--overlay); align-items:center; justify-content:center; padding:18px; }
.wl-modal-bd.open { display:flex; }
.wl-modal { width:100%; max-width:520px; max-height:88vh; overflow-y:auto; background:var(--glass-3); backdrop-filter:blur(60px) saturate(220%); border:1px solid var(--glass-border); border-radius:18px; box-shadow:var(--glass-shadow-strong); padding:20px; animation:mdlSlideUp 0.22s ease; }
.wl-modal h3 { font-size:18px; font-weight:800; letter-spacing:-0.02em; margin-bottom:14px; }
.wl-modal-foot { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; flex-wrap:wrap; }

.wl-dsgvo-note { margin-top:18px; padding:13px 15px; background:var(--success-soft); border:1px solid var(--glass-border-soft); border-radius:12px; color:var(--success-soft-text); font-size:12.5px; line-height:1.6; }

.wl-section { margin-bottom:26px; }
.wl-section > h3 { font-size:13px; font-weight:700; letter-spacing:-0.01em; color:var(--text); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.wl-list { display:flex; flex-direction:column; gap:11px; }

.wl-export-row { display:flex; gap:8px; flex-wrap:wrap; }

/* ============================================================================
   WERKLEIH — MOBILE/PWA + MODULARES LAYOUT + FIRMEN-SKALIERUNG (additiv)
   Größer/aufgeräumter, gleiche Glass/Clay-Sprache. Surgical motion.
   ============================================================================ */

/* --- Basis-Schrift hoch (mobil ~16px), Touch-Ziele >= 44px --- */
html, body { font-size:16px; }
@media (min-width:1024px){ html, body { font-size:15px; } }

/* Touch-Komfort: zentrale Tap-Targets vergrößern */
.icon-btn { width:46px; height:46px; }
.input-btn { width:42px; height:42px; }
.send-btn { width:42px; height:42px; }
.menu-item { padding:12px 13px; min-height:46px; font-size:15px; }
.suggest-chip { padding:16px 18px; font-size:15px; }
.btn { padding:11px 16px; font-size:14px; min-height:42px; }
.wl-result-card { padding:16px 18px; }

/* --- DICHTE-UMSCHALTER: kompakt vs. komfortabel (wirkt auf Listen) --- */
html[data-density="compact"] .wl-table tbody td { padding:7px 10px; font-size:12.5px; }
html[data-density="compact"] .wl-table thead th { padding:7px 10px; }
html[data-density="compact"] .wl-card { padding:12px; }
html[data-density="compact"] .wl-list { gap:7px; }
html[data-density="compact"] .wl-result-card { padding:11px 13px; }
html[data-density="comfortable"] .wl-table tbody td { padding:15px 14px; font-size:14px; }
html[data-density="comfortable"] .wl-table thead th { padding:14px 14px; }
html[data-density="comfortable"] .wl-card { padding:20px; }
html[data-density="comfortable"] .wl-list { gap:15px; }
html[data-density="comfortable"] .wl-result-card { padding:20px 22px; }

/* --- APP-SHELL: wl-shell ist immer eine Flex-Spalte (damit chat-area flex:1 greift) --- */
.wl-shell { flex:1; min-height:0; display:flex; flex-direction:column; min-width:0; }

/* --- DESKTOP SIDEBAR / RAIL (>= 1024px), einklappbar --- */
.wl-rail { display:none; }
@media (min-width:1024px){
  .wl-rail {
    display:flex; flex-direction:column; flex-shrink:0;
    width:248px; transition:width 0.26s cubic-bezier(0.32,0.72,0,1);
    background:color-mix(in srgb, var(--bg-base) 88%, transparent);
    border-right:1px solid var(--glass-border); overflow:hidden; z-index:9;
  }
  html[data-sidebar="collapsed"] .wl-rail { width:68px; }
  .app { flex-direction:row; }
  .wl-shell { height:100vh; height:100dvh; }
}
.wl-rail-head { display:flex; align-items:center; gap:10px; padding:16px 14px 12px; min-height:64px; }
.wl-rail-brand { display:flex; align-items:center; gap:10px; min-width:0; }
.wl-rail-brand .menu-brand-mark { width:36px; height:36px; flex-shrink:0; }
.wl-rail-brand .menu-brand-name { white-space:nowrap; overflow:hidden; }
html[data-sidebar="collapsed"] .wl-rail-brand .menu-brand-name { display:none; }
.wl-rail-toggle { margin-left:auto; flex-shrink:0; }
html[data-sidebar="collapsed"] .wl-rail-toggle { margin-left:0; }
.wl-rail-scroll { flex:1; overflow-y:auto; overflow-x:hidden; padding:6px 10px 16px; }
.wl-rail-scroll::-webkit-scrollbar { width:6px; }
.wl-rail-scroll::-webkit-scrollbar-thumb { background:var(--glass-border); border-radius:3px; }
.wl-rail-sec { padding:14px 8px 5px; font-size:10px; font-weight:700; color:var(--text-faint); letter-spacing:0.14em; text-transform:uppercase; white-space:nowrap; }
html[data-sidebar="collapsed"] .wl-rail-sec { opacity:0; height:10px; padding:8px 0 0; }
.wl-rail-item { position:relative; display:flex; align-items:center; gap:12px; width:100%; padding:11px 12px; margin-bottom:3px; border:1px solid transparent; border-radius:11px; background:transparent; color:var(--text); font-size:14.5px; font-weight:500; font-family:inherit; cursor:pointer; text-align:left; letter-spacing:-0.01em; transition:background 0.14s, border-color 0.14s; }
.wl-rail-item:hover { background:var(--glass-2); border-color:var(--glass-border-soft); }
.wl-rail-item.is-active { background:var(--accent-soft); border-color:var(--accent-fg); color:var(--accent-soft-text); }
.wl-rail-item .ri-ico { flex-shrink:0; width:22px; height:22px; display:flex; align-items:center; justify-content:center; }
.wl-rail-item .ri-label { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.wl-rail-item .ri-count { font-size:10px; background:var(--glass-2); color:var(--text-muted); padding:1px 7px; border-radius:6px; flex-shrink:0; }
.wl-rail-item .ri-pin { flex-shrink:0; width:26px; height:26px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:var(--text-faint); cursor:pointer; border-radius:7px; opacity:0; transition:opacity 0.14s, color 0.14s; }
.wl-rail-item:hover .ri-pin { opacity:0.85; }
.wl-rail-item .ri-pin.is-pinned { opacity:1; color:var(--accent-fg); }
.wl-rail-item .ri-pin:hover { background:var(--glass-3); color:var(--accent-fg); }
html[data-sidebar="collapsed"] .wl-rail-item { justify-content:center; padding:11px 0; }
html[data-sidebar="collapsed"] .wl-rail-item .ri-label,
html[data-sidebar="collapsed"] .wl-rail-item .ri-count,
html[data-sidebar="collapsed"] .wl-rail-item .ri-pin { display:none; }
.wl-rail-foot { padding:10px; border-top:1px solid var(--glass-border-soft); }

/* Pin/Stern auch im Slide-Menü */
.menu-item { position:relative; }

/* ============================================================================

/* --- Attachments über der Textarea (Chips) --- */
.attachments { display:none; flex-wrap:wrap; gap:8px; padding:2px 4px 0; }
.attachments.has { display:flex; }
.attachment-chip { display:inline-flex; align-items:center; gap:8px; max-width:240px; padding:6px 8px 6px 10px; background:var(--glass-2); border:1px solid var(--glass-border); border-radius:10px; box-shadow:inset 0 1px 0 var(--glass-highlight-top); }
.attachment-chip .ac-ico { flex-shrink:0; width:26px; height:26px; border-radius:7px; background:var(--accent-soft); color:var(--accent-soft-text); display:flex; align-items:center; justify-content:center; overflow:hidden; }
.attachment-chip .ac-ico img { width:100%; height:100%; object-fit:cover; display:block; }
.attachment-chip .ac-body { min-width:0; display:flex; flex-direction:column; line-height:1.2; }
.attachment-chip .ac-name { font-size:12px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.attachment-chip .ac-size { font-size:10.5px; color:var(--text-faint); font-variant-numeric:tabular-nums; }
.attachment-chip .ac-x { flex-shrink:0; width:24px; height:24px; border:none; background:transparent; color:var(--text-faint); border-radius:7px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.14s, color 0.14s; }
.attachment-chip .ac-x:hover { background:var(--glass-3); color:var(--danger); }

/* --- Attach-Bottom-Sheet (gleiche Sprache wie .mdl-sheet) --- */
.attach-backdrop { display:none; position:fixed; inset:0; z-index:2100; background:var(--overlay); align-items:flex-end; justify-content:center; }

.attach-menu { width:100%; max-width:520px; box-sizing:border-box; padding:8px 16px calc(18px + env(safe-area-inset-bottom,0px)); background:var(--glass-3); backdrop-filter:blur(60px) saturate(220%); -webkit-backdrop-filter:blur(60px) saturate(220%); border:1px solid var(--glass-border); border-bottom:none; border-radius:16px 16px 0 0; box-shadow:var(--glass-shadow-strong); color:var(--text); font-family:var(--font-ui); animation:mdlSlideUp 0.22s ease; }
@media (prefers-reduced-motion: reduce){ .attach-menu { animation:none; } }
.attach-grip { width:40px; height:4px; margin:4px auto 12px; border-radius:2px; background:var(--glass-border-strong); }
.attach-title { font-size:14px; font-weight:700; color:var(--text); margin:0 0 8px 4px; letter-spacing:-0.01em; }
.attach-opt { display:flex; align-items:center; gap:13px; width:100%; box-sizing:border-box; padding:13px 14px; margin-bottom:7px; background:var(--glass-2); color:var(--text); border:1px solid var(--glass-border); border-radius:12px; cursor:pointer; font-family:inherit; font-size:14.5px; font-weight:500; text-align:left; transition:background 0.14s, border-color 0.14s; }
.attach-opt:hover { background:var(--glass-hover); border-color:var(--accent-fg); }
.attach-opt:active { transform:scale(0.99); }
.attach-opt .ao-ico { flex-shrink:0; width:38px; height:38px; border-radius:11px; background:var(--accent-soft); color:var(--accent-soft-text); display:flex; align-items:center; justify-content:center; }
.attach-opt .ao-txt { flex:1; min-width:0; }
.attach-opt .ao-txt small { display:block; font-size:11.5px; font-weight:400; color:var(--text-muted); margin-top:1px; }

/* --- MEDIATHEK-Panel (Apple-Files-Optik, an Glass-Tokens angepasst) --- */
.wl-media-head { display:flex; align-items:flex-start; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
.wl-media-head .mh-body { flex:1; min-width:200px; }
.wl-media-sub { color:var(--text-muted); font-size:13px; margin-top:2px; }
.wl-media-drop { position:relative; }
.wl-media-drop.dragover::after { content:"Dateien hier ablegen"; position:absolute; inset:0; z-index:30; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; color:var(--accent-soft-text); background:var(--accent-soft); border:2px dashed var(--accent); border-radius:16px; pointer-events:none; }
.wl-grid-files { display:grid; gap:14px; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); }
.wl-grid-files.is-photos { grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); }
.wl-file-tile { position:relative; display:flex; flex-direction:column; background:var(--glass-3); backdrop-filter:blur(40px) saturate(200%); border:1px solid var(--glass-border); border-radius:14px; overflow:hidden; box-shadow:var(--glass-shadow), inset 0 1px 0 var(--glass-highlight-top); cursor:pointer; transition:border-color 0.14s, transform 0.14s; }
.wl-file-tile:hover { border-color:var(--accent-fg); transform:translateY(-2px); }
.wl-file-tile:focus-visible { outline:none; border-color:var(--accent-fg); box-shadow:0 0 0 3px var(--accent-glow); }
@media (prefers-reduced-motion: reduce){ .wl-file-tile { transition:none; } }
.wl-file-thumb { position:relative; aspect-ratio:4 / 3; width:100%; background:var(--glass-2); display:flex; align-items:center; justify-content:center; overflow:hidden; }
.wl-file-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.wl-file-thumb .ft-ico { color:var(--text-faint); }
.wl-file-ext { position:absolute; left:8px; top:8px; padding:3px 7px; border-radius:7px; font-size:9.5px; font-weight:800; letter-spacing:0.05em; background:var(--glass-3); color:var(--accent-soft-text); border:1px solid var(--glass-border-soft); backdrop-filter:blur(10px); }
.wl-file-meta { padding:10px 11px 11px; }
.wl-file-name { font-size:12.5px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:-0.01em; }
.wl-file-sub { font-size:11px; color:var(--text-faint); margin-top:3px; font-variant-numeric:tabular-nums; }
.wl-file-del { position:absolute; right:8px; top:8px; z-index:4; width:30px; height:30px; border:1px solid var(--glass-border); background:var(--glass-3); color:var(--text-muted); border-radius:9px; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.14s, color 0.14s, background 0.14s; backdrop-filter:blur(10px); }
.wl-file-tile:hover .wl-file-del, .wl-file-tile:focus-within .wl-file-del { opacity:1; }
.wl-file-del:hover { color:var(--danger); background:var(--glass-hover); }
.wl-file-demo { position:absolute; right:8px; bottom:8px; z-index:3; padding:2px 7px; border-radius:7px; font-size:9px; font-weight:800; letter-spacing:0.06em; text-transform:uppercase; background:var(--warning-soft); color:var(--warning-soft-text); border:1px solid var(--glass-border-soft); }
@media (max-width:639.98px){ .wl-grid-files { grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:11px; } }

/* --- Vorschau-Lightbox --- */
.wl-lightbox { display:none; position:fixed; inset:0; z-index:2300; background:var(--overlay); align-items:center; justify-content:center; padding:24px; }
.wl-lightbox.open { display:flex; }
.wl-lightbox-inner { position:relative; max-width:min(960px, 94vw); max-height:88vh; display:flex; flex-direction:column; background:var(--glass-3); backdrop-filter:blur(60px) saturate(220%); border:1px solid var(--glass-border); border-radius:18px; box-shadow:var(--glass-shadow-strong); overflow:hidden; animation:mdlSlideUp 0.22s ease; }
@media (prefers-reduced-motion: reduce){ .wl-lightbox-inner { animation:none; } }
.wl-lightbox-bar { display:flex; align-items:center; gap:12px; padding:12px 14px; border-bottom:1px solid var(--glass-border-soft); }
.wl-lightbox-bar .lb-title { flex:1; min-width:0; font-size:14px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.wl-lightbox-body { flex:1; min-height:0; overflow:auto; display:flex; align-items:center; justify-content:center; padding:14px; background:var(--glass-1); }

.wl-lightbox-info .li-meta { font-size:12.5px; margin-top:6px; }
/* === WERKHOF-Integration Overrides === */
/* #4 Favoriten-Pins/Sterne entfernen (doppelt/verwirrend) */
.wl-rail-item .ri-pin, .menu-item .mi-pin { display:none !important; }
/* #3 Collapsed-Sidebar: Toggle nicht mehr ueber dem Brand-"W" (stapeln statt ueberlappen) */

  /* ---- Demo-Helfer: find_tool über lokalen Datensatz (für Auto-Suche + KI-Bot offline) ---- */
  window.WL_demoFindTool = function(vehicleId, lat, lng){
    var D = window.WL_DEMO;
    var wsById = {}; D.workshops.forEach(function(w){ wsById[w.id] = w; });
    var today = new Date();
    var out = [];
    D.tools.forEach(function(t){
      if (!t.shareable) return;
      if (t.status !== 'verfuegbar') return;
      if ((t.vehicles||[]).indexOf(vehicleId) < 0) return;
      var ws = wsById[t.workshop_id]; if (!ws || !ws.share_tools) return;
      var cal = new Date(t.calibrated_until + 'T00:00:00');
      if (cal <= today) return;
      var dist = null;
      if (typeof lat === 'number' && typeof lng === 'number'){ dist = window.WL_haversine(lat, lng, ws.lat, ws.lng); }
      out.push({
        tool:{ id:t.id, name:t.name, manufacturer:t.manufacturer, type_number:t.type_number, category:t.category, status:t.status },
        workshop:{ id:ws.id, name:ws.name, city:ws.city, lat:ws.lat, lng:ws.lng, phone:ws.phone, email:ws.email },
        calibrated_until:t.calibrated_until,
        distance_km: dist
      });
    });
    out.sort(function(a,b){ if (a.distance_km==null) return 1; if (b.distance_km==null) return -1; return a.distance_km - b.distance_km; });
    return out;
  };
  window.WL_haversine = function(lat1,lng1,lat2,lng2){
    function r(d){ return d*Math.PI/180; }
    var R=6371, dLat=r(lat2-lat1), dLng=r(lng2-lng1);
    var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(dLng/2)*Math.sin(dLng/2);
    return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))*10)/10;
  };

  /* ---- Toggles (Websearch / Knowledge) ---- */
  window.toggleWebSearch = function(){
    var b = document.getElementById('webSearchBtn'); if (!b) return;
    var on = !b.classList.contains('active');

  window.newChat = function(){

      '<h1>Welches Werkzeug brauchst du?</h1>'+
      '<p>Fahrzeug eingeben &rarr; kalibriertes Spezialwerkzeug bei welcher Werkstatt. Oder frag den KI-Bot direkt.</p>'+
      '<div class="welcome-suggestions">'+
        '<button class="suggest-chip" onclick="openPanel(\'autosuche\')"><strong>Auto-Suche</strong>BMW F30 320d &mdash; welches Spezialwerkzeug ist wo verfügbar?</button>'+
        '<button class="suggest-chip" onclick="pickSuggestion(\'Welche Werkstatt in meiner Nähe hat ein kalibriertes Injektor-Ausziehwerkzeug?\')"><strong>Werkstatt finden</strong>Kalibriertes Werkzeug in der Nähe</button>'+
      '</div>';
    box.appendChild(w);
    var title = document.getElementById('currentChatTitle'); if (title) title.textContent = 'KI-Bot';
    closeMenu();
  };
  window.pickSuggestion = function(txt){
    var inp = document.getElementById('chatInput'); if (!inp) return;
    inp.value = txt; inp.focus();
    if (window.sendMessage) window.sendMessage();
  };

  /* ---- Welcome ausblenden bei erster echter Nachricht ---- */
  window.WL_clearWelcome = function(){ var w = document.getElementById('wlWelcome') || document.querySelector('#chatMessages .welcome'); if (w) w.remove(); };

  /* ---- Counts in Menü pflegen ---- */
  window.WL_setCounts = function(c){
    if (!c) return;
    if (c.tools!=null){ var e=document.getElementById('cntTools'); if (e) e.textContent=c.tools; }
    if (c.vehicles!=null){ var v=document.getElementById('cntVehicles'); if (v) v.textContent=c.vehicles; }
    if (c.shops!=null){ var s=document.getElementById('cntShops'); if (s) s.textContent=c.shops; }
  };

  /* ---- Textarea Auto-Grow + Enter-to-send ---- */
  function wireInput(){
    var inp = document.getElementById('chatInput'); if (!inp || inp.__wlWired) return;
    inp.__wlWired = true;
    inp.addEventListener('input', function(){ this.style.height='auto'; this.style.height=Math.min(this.scrollHeight, 240)+'px'; });
    inp.addEventListener('keydown', function(e){
      if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); if (window.sendMessage) window.sendMessage(); }
    });
  }

  /* ---- Globales Escape: schließt Menü/Panel/Sheets ---- */
  document.addEventListener('keydown', function(e){
    if (e.key !== 'Escape') return;
    if (document.getElementById('wlModalBd') && document.getElementById('wlModalBd').classList.contains('open')){ window.WL_closeModal && window.WL_closeModal(); return; }
    if (document.querySelector('.mdl-backdrop.open')){ window.closeModelPicker && window.closeModelPicker(); return; }
    var p = document.getElementById('panel');
    if (p && p.classList.contains('open')){ window.closePanel && window.closePanel(); return; }
    var m = document.getElementById('slideMenu');
    if (m && m.classList.contains('open')){ closeMenu(); return; }
  });

  /* ---- minimaler Markdown→HTML (Fließtext) ---- */
  window.WL_md = function(raw){
    var s = esc(raw||'');
    // code-Blöcke
    s = s.replace(/```([\s\S]*?)```/g, function(_,c){ return '<pre><code>'+c.replace(/^\n/,'')+'</code></pre>'; });
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/^### (.*)$/gm, '<h3>$1</h3>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>');
    // Listen
    s = s.replace(/(?:^|\n)((?:[-•] .*(?:\n|$))+)/g, function(m){
      var items = m.trim().split('\n').map(function(l){ return '<li>'+l.replace(/^[-•]\s*/,'')+'</li>'; }).join('');
      return '\n<ul style="margin:8px 0 8px 18px">'+items+'</ul>';
    });
    s = s.replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br>');
    return '<p>'+s+'</p>';
  };

  /* ---- Boot ---- */
  function boot(){
    wireInput(); bindScroll(); applyThemeIcons();
    // Hintergrund-Authentifizierung + Status (best effort)
    if (!window.__wlAuthTried){
      window.__wlAuthTried = true;
      (async function(){
        try {
          await window.WL_api('/health', { method:'GET', timeout:6000 });
          window.WL_setOnline(true);
          if (!sessionStorage.getItem('wl_token')) { try { await window.WL_api('/auth/demo', { method:'POST', body:'{}' }); } catch(e){} }
        } catch(e){
          window.WL_OFFLINE = true; window.WL_setOnline(false);
        }
      })();
    }
    // Counts (offline=Demo)
    setTimeout(function(){
      if (window.WL_OFFLINE){ window.WL_setCounts({ tools: window.WL_DEMO.tools.length, vehicles: window.WL_DEMO.vehicles.length, shops: window.WL_DEMO.workshops.length }); }
    }, 800);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot); else boot();
  setTimeout(boot, 1500); setTimeout(boot, 4000);
})();
</script>

<script id="wl-chat">
(function(){ "use strict";
  if (window.__wlChatInit) return;
  window.__wlChatInit = true;

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function chatBox(){ return document.getElementById('chatMessages'); }
  function toast(m){ if (window.showToast) window.showToast(m); }
  function md(s){ return window.WL_md ? window.WL_md(s) : esc(s); }
  function scrollEnd(){ if (typeof window.__xdabScrollToEnd === 'function') window.__xdabScrollToEnd(); }

  function appendUser(text){
    var box = chatBox(); if (!box) return;
    if (window.WL_clearWelcome) window.WL_clearWelcome();
    var m = document.createElement('div'); m.className = 'message message-user';
    m.innerHTML = '<div class="bubble">'+esc(text)+'</div>';
    box.appendChild(m); scrollEnd();
  }

  // Assistant-Antwort als Fließtext (kein Bubble-Chrome). Liefert das .bubble zurück.
  function appendAssistant(modelLabel){
    var box = chatBox(); if (!box) return null;
    var m = document.createElement('div'); m.className = 'message message-assistant';
    var head = modelLabel ? '<div style="margin-bottom:8px"><span class="msg-model">'+esc(modelLabel)+'</span></div>' : '';
    m.innerHTML = head + '<div class="bubble"><span class="typing-dot"></span></div>';
    box.appendChild(m); scrollEnd();
    return m.querySelector('.bubble');
  }

  // Favicon-Quellpillen (§2/§7)
  function renderSources(bubble, sources){
    if (!bubble || !sources || !sources.length) return;
    var html = '<div class="proc-sources" aria-label="Quellen">';
    sources.forEach(function(s){
      var url = (typeof s === 'string') ? s : (s.url || s.link || '');
      var title = (typeof s === 'object' && (s.title||s.name)) ? (s.title||s.name) : url;
      var host = '';
      try { host = new URL(url).hostname; } catch(e){ host = String(url).replace(/^https?:\/\//,'').split('/')[0]; }
      html += '<a class="proc-src-link" href="'+esc(url)+'" target="_blank" rel="noopener noreferrer">'+
        '<span class="proc-src-ico"><img class="proc-src-favicon" src="https://'+esc(host)+'/favicon.ico" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.remove()"></span>'+
        '<span><span style="display:block;font-weight:600">'+esc(title)+'</span><span class="proc-src-meta">'+esc(host)+'</span></span></a>';
    });
    html += '</div>';
    var wrap = document.createElement('div'); wrap.innerHTML = html;
    bubble.appendChild(wrap.firstChild);
  }

  function flags(){
    var web = document.getElementById('webSearchBtn'); var kn = document.getElementById('knowledgeBtn');
    return { web_search: !!(web && web.classList.contains('active')), use_knowledge: !!(kn && kn.classList.contains('active')) };
  }

  // Offline-KI-Antwort referenziert echtes Demo-find_tool-Ergebnis.
  function offlineAnswer(message){
    var D = window.WL_DEMO || {};
    var lower = (message||'').toLowerCase();
    var veh = (D.vehicles||[]).find(function(v){
      var hay = (v.manufacturer+' '+v.model).toLowerCase();
      return hay.split(/\s+/).some(function(tok){ return tok.length>2 && lower.indexOf(tok)>=0; });
    });
    if (!veh){
      return 'Backend offline – ich antworte mit Demo-Daten.\n\nNenn mir bitte ein **Fahrzeug** (z.B. „BMW F30 320d" oder „VW Golf 7 2.0 TDI"), dann zeige ich dir, welche teilende Werkstatt das passende, **kalibrierte** Spezialwerkzeug verfügbar hat. Du kannst auch direkt die **Auto-Suche** öffnen.';
    }
    var res = window.WL_demoFindTool(veh.id, 51.16, 10.45) || [];
    if (!res.length){
      return 'Backend offline – Demo-Daten.\n\nFür den **'+veh.manufacturer+' '+veh.model+'** ist im Demo-Bestand aktuell **kein** sofort verfügbares, kalibriertes Sharing-Werkzeug frei. Probier die Auto-Suche für die volle Trefferliste.';
    }
    var top = res[0];
    var lines = res.slice(0,3).map(function(r){
      return '- **'+r.tool.name+'** ('+r.tool.manufacturer+' '+r.tool.type_number+') bei **'+r.workshop.name+'**, '+r.workshop.city+' — kalibriert bis '+r.calibrated_until + (r.distance_km!=null ? ' (~'+r.distance_km+' km)' : '');
    }).join('\n');
    return 'Backend offline – Antwort aus dem **Demo-Datensatz** (find_tool):\n\n'+
      'Für den **'+veh.manufacturer+' '+veh.model+'** habe ich '+res.length+' passende, kalibrierte Werkzeuge gefunden:\n\n'+lines+'\n\n'+
      'Empfehlung: Fahr zu **'+top.workshop.name+'** ('+top.workshop.city+') und hol das **'+top.tool.name+'**. '+
      'Im Live-Betrieb kann ich auf Wunsch einen **Kontakt-Entwurf** an die Werkstatt vorbereiten (Assist & Approve — nichts wird automatisch gesendet).';
  }

  // Basis-sendMessage (§4). Spätere IIFE wrappen via orig.apply.
  window.sendMessage = async function(){
    var inp = document.getElementById('chatInput'); if (!inp) return;
    var text = (inp.value || '').trim(); if (!text) return;
    appendUser(text);
    inp.value = ''; inp.style.height = 'auto';
    var title = document.getElementById('currentChatTitle');
    if (title && title.textContent === 'KI-Bot') title.textContent = text.slice(0,40);

    var bubble = appendAssistant('WERKLEIH EU-Gateway');
    if (!bubble) return;
    var f = flags();
    var payload = { message:text, web_search:f.web_search, use_knowledge:f.use_knowledge };
    if (window.WL_lastGeo){ payload.lat = window.WL_lastGeo.lat; payload.lng = window.WL_lastGeo.lng; }

    try {
      var data = await window.WL_api('/chat', { method:'POST', body: JSON.stringify(payload), timeout: 60000 });
      bubble.innerHTML = md(data && data.content ? data.content : '(leere Antwort)');
      if (data && data.model){
        var hdr = bubble.parentNode.querySelector('.msg-model'); if (hdr) hdr.textContent = data.model;
      }
      renderSources(bubble, data && data.sources);
    } catch(e){
      // Offline-graceful: kanned, referenziert Demo-find_tool
      bubble.innerHTML = md(offlineAnswer(text));
      var hdr2 = bubble.parentNode.querySelector('.msg-model'); if (hdr2) hdr2.textContent = 'Demo (offline)';
    }
    scrollEnd();
  };

  window.WL_appendAssistantText = function(textMd, modelLabel, sources){
    var b = appendAssistant(modelLabel||'WERKLEIH'); if (!b) return;
    b.innerHTML = md(textMd); renderSources(b, sources); scrollEnd();
  };

  /* ---- Run-/Agent-Karte (live im Chat-Stream) ---- */
  window.makeRunCard = function(headTxt){
    var box = chatBox(); if (!box) return null;
    if (window.WL_clearWelcome) window.WL_clearWelcome();
    var m = document.createElement('div'); m.className = 'message message-assistant';
    m.innerHTML = '<div class="bubble"><div class="xdab-agent-run">'+
      '<div class="xdab-agent-head"><span class="xdab-agent-spin"></span><span>'+esc(headTxt||'Agent läuft…')+'</span></div>'+
      '<div class="xdab-agent-steps"></div>'+
      '<div class="xdab-agent-answer" style="display:none"></div>'+
      '<div class="xdab-agent-note"></div></div></div>';
    box.appendChild(m); scrollEnd();
    return m.querySelector('.xdab-agent-run');
  };
  window.addStep = function(card, type, text, klasse){
    if (!card) return;
    var steps = card.querySelector('.xdab-agent-steps'); if (!steps) return;
    var badge = '';
    if (klasse === 'read') badge = '<span class="orch-badge orch-badge-read">READ</span>';
    else if (klasse === 'write') badge = '<span class="orch-badge orch-badge-write">WRITE</span>';
    else if (klasse === 'send') badge = '<span class="orch-badge orch-badge-send">SEND</span>';
    var el = document.createElement('div'); el.className = 'xdab-agent-step';
    el.innerHTML = '<div class="xdab-agent-step-label">'+esc(type||'Schritt')+' '+badge+'</div>'+
      '<div class="xdab-agent-step-text">'+esc(text||'')+'</div>';
    steps.appendChild(el); if (typeof window.__xdabAutoScroll==='function') window.__xdabAutoScroll();
  };
  window.finish = function(card, answer, err){
    if (!card) return;
    card.classList.add('xdab-agent-done');
    var ans = card.querySelector('.xdab-agent-answer');
    if (ans && answer){ ans.style.display = 'block'; ans.textContent = answer; }
    if (err){ var note = card.querySelector('.xdab-agent-note'); if (note) note.textContent = err; }
    scrollEnd();
  };

  /* ---- Assist & Approve Gate (Kontakt-Entwurf) ---- */
  window.WL_renderApprovalGate = function(card, draft, onApprove){
    if (!card) return;
    var note = card.querySelector('.xdab-agent-note'); if (!note) return;
    var box = document.createElement('div');
    box.innerHTML = '<div style="margin:10px 0 6px;padding:11px 13px;background:var(--glass-3);border:1px solid var(--glass-border);border-radius:10px;white-space:pre-wrap;font-size:13px;line-height:1.55">'+esc(draft||'')+'</div>'+
      '<div class="xdab-agent-note" style="margin:6px 0 8px">Freigabe nötig — es wird <strong>nichts</strong> automatisch gesendet (Assist &amp; Approve).</div>'+
      '<div class="xdab-orch-gate">'+
        '<button class="btn xdab-orch-ok">Freigeben &amp; senden</button>'+
        '<button class="btn btn-outline">Verwerfen</button>'+
      '</div>';
    note.parentNode.insertBefore(box, note);
    var btns = box.querySelectorAll('button');
    btns[0].addEventListener('click', function(){
      box.querySelector('.xdab-orch-gate').innerHTML = '<span class="wl-pill ok">Freigegeben &mdash; Versand simuliert</span>';
      if (typeof onApprove === 'function') onApprove();
      toast('Freigegeben');
    });
    btns[1].addEventListener('click', function(){
      box.querySelector('.xdab-orch-gate').innerHTML = '<span class="wl-pill warn">Verworfen</span>';
      toast('Entwurf verworfen');
    });
    scrollEnd();
  };
})();
</script>

(function(){ "use strict";

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function toast(m){ if (window.showToast) window.showToast(m); }

  var MODELS = [
    { id:'claude-sonnet-4-6', label:'Claude Sonnet 4.6', grp:'EU-Bedrock (Frankfurt)' },
    { id:'claude-haiku', label:'Claude Haiku 4.5', grp:'EU-Bedrock (Frankfurt)' },

    { id:'cowork', label:'Co-Work', desc:'KI-Bot beantwortet & schlägt Werkstatt vor', icon:'💬' },
    { id:'recherche', label:'Recherche', desc:'Mit EU-Websuche (SearXNG) + Wissensbasis', icon:'🔎' },

  ];

  function ssGet(k,d){ try { return sessionStorage.getItem(k) || d; } catch(e){ return d; } }
  function ssSet(k,v){ try { sessionStorage.setItem(k,v); } catch(e){} }

  function syncGlobals(){
    window.wlModel = ssGet('wl_ws_model', MODELS[0].id);
    window.wlMode = ssGet('wl_ws_mode', MODES[0].id);
    window.wlThinking = ssGet('wl_ws_thinking','0') === '1';
  }
  syncGlobals();

  function modelLabel(id){ var m = MODELS.find(function(x){return x.id===id;}); return m?m.label:id; }
  function modeLabel(id){ var m = MODES.find(function(x){return x.id===id;}); return m?m.label:id; }

  function updatePill(){
    var pill = document.getElementById('wlMdlPill'); if (!pill) return;
    pill.querySelector('.mdl-pill-model').textContent = modelLabel(window.wlModel);
    pill.querySelector('.mdl-pill-mode').textContent = '· '+modeLabel(window.wlMode);
  }

  function ensurePill(){
    if (document.getElementById('wlMdlPill')) { updatePill(); return; }
    var bar = document.querySelector('.input-toolbar'); if (!bar) return;
    var send = bar.querySelector('.send-btn');
    var pill = document.createElement('button');
    pill.id = 'wlMdlPill'; pill.className = 'mdl-pill'; pill.type = 'button';
    pill.setAttribute('aria-haspopup','dialog'); pill.setAttribute('aria-expanded','false');
    pill.setAttribute('aria-label','Modell & Modus wählen');
    pill.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>'+
      '<span class="mdl-pill-model"></span><span class="mdl-pill-mode"></span>';
    pill.addEventListener('click', openSheet);
    if (send) bar.insertBefore(pill, send); else bar.appendChild(pill);
    updatePill();
  }

  var lastFocus = null;
  function backdrop(){
    var bd = document.getElementById('wlMdlBackdrop');
    if (bd) return bd;
    bd = document.createElement('div'); bd.id = 'wlMdlBackdrop'; bd.className = 'mdl-backdrop';
    bd.innerHTML = '<div class="mdl-sheet" role="dialog" aria-modal="true" aria-label="Modell & Modus" id="wlMdlSheet"></div>';
    document.body.appendChild(bd);
    bd.addEventListener('click', function(e){ if (e.target === bd) closeSheet(); });
    return bd;
  }

  function fillSheet(){
    var sheet = document.getElementById('wlMdlSheet'); if (!sheet) return;
    var html = '<div class="mdl-grip"></div>'+
      '<div class="mdl-head"><h2 class="mdl-title">Modell &amp; Modus</h2>'+
      '<button class="mdl-close" id="wlMdlClose" aria-label="Schließen">&#10005;</button></div>'+
      '<div class="mdl-note">EU-only: alle Modelle laufen über AWS Bedrock <strong>eu-central-1</strong> (Frankfurt) via LiteLLM. DSGVO-konform, keine Drittland-Übermittlung.</div>';

    var grp = '';
    html += '<div class="mdl-grp-title">Modell</div><div class="mdl-list" role="radiogroup" aria-label="Modell">';
    MODELS.forEach(function(m){
      var on = m.id === window.wlModel;
      html += '<button class="mdl-row'+(on?' is-on':'')+'" role="radio" aria-checked="'+(on?'true':'false')+'" data-model="'+esc(m.id)+'">'+
        '<span style="flex:1"><strong>'+esc(m.label)+'</strong></span>'+
        (on?'<span class="wl-pill ok">aktiv</span>':'')+'</button>';
    });
    html += '</div>';

    html += '<div class="mdl-grp-title">Modus</div><div class="mdl-list" role="radiogroup" aria-label="Modus">';
    MODES.forEach(function(m){
      var on = m.id === window.wlMode;
      html += '<button class="mdl-mode'+(on?' is-on':'')+'" role="radio" aria-checked="'+(on?'true':'false')+'" data-mode="'+esc(m.id)+'">'+
        '<span style="font-size:17px" aria-hidden="true">'+m.icon+'</span>'+
        '<span style="flex:1"><strong>'+esc(m.label)+'</strong><span style="display:block;font-size:11.5px;color:var(--text-muted);margin-top:1px">'+esc(m.desc)+'</span></span>'+
        (on?'<span class="wl-pill ok">aktiv</span>':'')+'</button>';
    });
    html += '</div>';

    var thOn = window.wlThinking;
    html += '<div class="mdl-grp-title">Erweitert</div><div class="mdl-list">'+
      '<button class="mdl-row'+(thOn?' is-on':'')+'" role="switch" aria-checked="'+(thOn?'true':'false')+'" id="wlThinkSwitch">'+
      '<span style="flex:1"><strong>Erweitertes Denken</strong><span style="display:block;font-size:11.5px;color:var(--text-muted)">Mehr Tiefe bei komplexen Fällen</span></span>'+
      '<span class="wl-pill'+(thOn?' ok':'')+'">'+(thOn?'an':'aus')+'</span></button></div>';

    sheet.innerHTML = html;

    sheet.querySelector('#wlMdlClose').addEventListener('click', closeSheet);
    sheet.querySelectorAll('[data-model]').forEach(function(b){
      b.addEventListener('click', function(){ window.wlModel = b.getAttribute('data-model'); ssSet('wl_ws_model', window.wlModel); updatePill(); fillSheet(); toast('Modell: '+modelLabel(window.wlModel)); });
    });
    sheet.querySelectorAll('[data-mode]').forEach(function(b){
      b.addEventListener('click', function(){ window.wlMode = b.getAttribute('data-mode'); ssSet('wl_ws_mode', window.wlMode); updatePill(); fillSheet(); toast('Modus: '+modeLabel(window.wlMode)); });
    });
    var ts = sheet.querySelector('#wlThinkSwitch');
    if (ts) ts.addEventListener('click', function(){ window.wlThinking = !window.wlThinking; ssSet('wl_ws_thinking', window.wlThinking?'1':'0'); fillSheet(); });
  }

  function trapFocus(e){
    var sheet = document.getElementById('wlMdlSheet'); if (!sheet) return;
    if (e.key !== 'Tab') return;
    var f = sheet.querySelectorAll('button, [href], input, select, [tabindex]:not([tabindex="-1"])');
    if (!f.length) return;
    var first = f[0], last = f[f.length-1];
    if (e.shiftKey && document.activeElement === first){ e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last){ e.preventDefault(); first.focus(); }
  }

  window.openSheet = function(){
    lastFocus = document.activeElement;
    var bd = backdrop(); fillSheet();
    bd.classList.add('open'); document.body.classList.add('mdl-lock');
    var pill = document.getElementById('wlMdlPill'); if (pill) pill.setAttribute('aria-expanded','true');
    document.addEventListener('keydown', trapFocus);
    var c = document.getElementById('wlMdlClose'); if (c) setTimeout(function(){ c.focus(); }, 40);
  };
  window.closeSheet = function(){
    var bd = document.getElementById('wlMdlBackdrop'); if (bd) bd.classList.remove('open');
    document.body.classList.remove('mdl-lock');
    var pill = document.getElementById('wlMdlPill'); if (pill) pill.setAttribute('aria-expanded','false');
    document.removeEventListener('keydown', trapFocus);
    if (lastFocus && lastFocus.focus) lastFocus.focus();
  };

  // Der Top-Bar-Model-Picker öffnet dasselbe Sheet (eine Quelle der Wahrheit).
  window.toggleModelPicker = function(e){ if (e) e.preventDefault(); window.openSheet(); };
  window.closeModelPicker = function(){ window.closeSheet(); };

  // sendMessage spiegelt aktuelle Globals (belt-and-suspenders).
  function wrapSendForSync(){
    if (typeof window.sendMessage !== 'function' || window.sendMessage.__wlMdlSync) return;
    var orig = window.sendMessage;
    window.sendMessage = function(){ try { syncGlobals(); } catch(e){} return orig.apply(this, arguments); };
    window.sendMessage.__wlMdlSync = true;
  }

  window.addEventListener('storage', function(e){
    if (e.key && e.key.indexOf('wl_ws_') === 0){ syncGlobals(); updatePill(); }
  });

  function boot(){ ensurePill(); wrapSendForSync(); updatePill(); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot); else boot();
  setTimeout(boot, 1500); setTimeout(boot, 4000);
  // Pille-Retry, falls Toolbar später erscheint
  var tries = 0; var iv = setInterval(function(){ tries++; ensurePill(); if (document.getElementById('wlMdlPill') || tries > 20) clearInterval(iv); }, 400);
})();
</script>

<script id="wl-leaflet">
(function(){ "use strict";
  if (window.__wlLeafletInit) return;
  window.__wlLeafletInit = true;
  // Leaflet JS lokal nachladen (kein CDN). onerror → Flag → Platzhalter.
  function load(){
    if (window.L || document.getElementById('wlLeafletJs')) return;
    var s = document.createElement('script');
    s.id = 'wlLeafletJs'; s.src = 'vendor/leaflet/leaflet.js'; s.async = true;
    s.onerror = function(){ window.__wlNoLeaflet = true; };
    document.head.appendChild(s);
  }
  load();

  // Karte in einen Host rendern; bei fehlendem Leaflet → Platzhalter.
  window.WL_renderMap = function(hostId, markers, opts){
    opts = opts || {};
    var host = document.getElementById(hostId); if (!host) return;
    if (!window.L){
      host.className = 'wl-map-ph';
      host.innerHTML = '<div class="ph-mark" aria-hidden="true">🗺</div>'+
        '<div>[Karte: Leaflet nach <code>/vendor/leaflet/</code> legen]</div>'+
        '<div style="font-size:11.5px;opacity:.8">leaflet.js + leaflet.css fehlen — DSGVO: kein CDN. Marker-Liste unten bleibt nutzbar.</div>';
      return;
    }
    host.className = 'wl-map';
    try {
      if (host.__wlMap){ host.__wlMap.remove(); host.__wlMap = null; }
      var map = L.map(host, { scrollWheelZoom:true }).setView(opts.center || [51.16,10.45], opts.zoom || 6);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap', maxZoom:19 }).addTo(map);
      host.__wlMap = map;
      var group = [];
      (markers||[]).forEach(function(m){
        if (m.lat==null || m.lng==null) return;
        var mk = L.marker([m.lat, m.lng]).addTo(map);
        if (m.popup) mk.bindPopup(m.popup);
        group.push([m.lat, m.lng]);
      });
      if (group.length > 1){ try { map.fitBounds(group, { padding:[40,40], maxZoom:12 }); } catch(e){} }
      else if (group.length === 1){ map.setView(group[0], 11); }
      setTimeout(function(){ try { map.invalidateSize(); } catch(e){} }, 80);
      setTimeout(function(){ try { map.invalidateSize(); } catch(e){} }, 360);
    } catch(e){
      host.className = 'wl-map-ph';
      host.innerHTML = '<div class="ph-mark">🗺</div><div>Karte konnte nicht geladen werden.</div>';
    }
  };
})();
</script>

<script id="wl-panels">
(function(){ "use strict";
  if (window.__wlPanelsInit) return;
  window.__wlPanelsInit = true;

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function toast(m){ if (window.showToast) window.showToast(m); }
  function api(p,o){ return window.WL_api(p,o); }
  function isOffline(){ return !!window.WL_OFFLINE; }

  var PANEL_TITLES = {
    autosuche:'Auto-Suche', werkzeuge:'Werkzeuge', fahrzeuge:'Fahrzeuge',
    werkstaetten:'Werkstätten (Karte)', kunden:'Kunden', auftraege:'Aufträge', mediathek:'Mediathek', einstellungen:'Einstellungen'
  };

  function statusPill(status){
    var map = { verfuegbar:['ok','verfügbar'], verliehen:['warn','verliehen'], defekt:['danger','defekt'], wartung:['warn','Wartung'] };
    var m = map[status] || ['','' + (status||'')];
    return '<span class="wl-pill '+m[0]+'">'+esc(m[1])+'</span>';
  }
  function calPill(dateStr){
    if (!dateStr) return '<span class="wl-pill warn">keine Kalibrierung</span>';
    var d = new Date(dateStr+'T00:00:00'); var now = new Date();
    var days = Math.round((d - now)/86400000);
    var cls = days < 0 ? 'danger' : (days < 90 ? 'warn' : 'ok');
    var lbl = days < 0 ? 'kalibrierung abgelaufen' : 'kalibriert bis '+dateStr;
    return '<span class="wl-pill '+cls+'"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M20 6L9 17l-5-5"/></svg>'+esc(lbl)+'</span>';
  }
  function orderStatusPill(s){
    var map = { offen:['','offen'], in_arbeit:['warn','in Arbeit'], wartet_werkzeug:['danger','wartet auf Werkzeug'], abgeschlossen:['ok','abgeschlossen'] };
    var m = map[s] || ['', s||'']; return '<span class="wl-pill '+m[0]+'">'+esc(m[1])+'</span>';
  }

  /* ---- Panel-Host ---- */
  var lastPanelFocus = null;
  window.openPanel = async function(name){
    var panel = document.getElementById('panel'); var inner = document.getElementById('panelInner');
    var titleEl = document.getElementById('panelTitle'); var actions = document.getElementById('panelActions');
    if (!panel || !inner) return;
    lastPanelFocus = document.activeElement;
    if (window.closeMenu) window.closeMenu();
    if (titleEl) titleEl.textContent = PANEL_TITLES[name] || name;
    if (actions) actions.innerHTML = '';
    inner.innerHTML = '<div class="panel-wrap"><div class="wl-empty"><div class="spinner" style="margin:0 auto 12px"></div>Lade…</div></div>';
    panel.classList.add('open'); panel.setAttribute('aria-hidden','false');
    panel.scrollTop = 0; inner.scrollTop = 0;
    try {
      if (name === 'autosuche') await renderAutosuche(inner, actions);
      else if (name === 'werkzeuge') await renderWerkzeuge(inner, actions);
      else if (name === 'fahrzeuge') await renderFahrzeuge(inner, actions);
      else if (name === 'werkstaetten') await renderWerkstaetten(inner, actions);
      else if (name === 'kunden') await renderKunden(inner, actions);
      else if (name === 'auftraege') await renderAuftraege(inner, actions);
      else if (name === 'einstellungen') await renderEinstellungen(inner, actions);
      else inner.innerHTML = '<div class="panel-wrap"><div class="wl-empty">Unbekanntes Panel.</div></div>';
    } catch(e){
      inner.innerHTML = '<div class="panel-wrap"><div class="wl-empty"><div class="em-mark">⚠</div>Panel-Fehler: '+esc(e&&e.message||e)+'</div></div>';
    }
  };
  window.closePanel = function(){
    var panel = document.getElementById('panel'); if (!panel) return;
    panel.classList.remove('open'); panel.setAttribute('aria-hidden','true');
    if (lastPanelFocus && lastPanelFocus.focus) try { lastPanelFocus.focus(); } catch(e){}
  };

  function offlineBanner(){
    return isOffline() ? '<div style="margin-bottom:16px"><span class="wl-offline"><span class="dot"></span>Backend offline – Demo-Daten</span></div>' : '';
  }

  /* ============================ AUTO-SUCHE ============================ */
  var acTimer = null, acItems = [], acActive = -1, acSelected = null;

  async function renderAutosuche(inner){
    inner.innerHTML = '<div class="panel-wrap">'+offlineBanner()+
      '<div class="wl-search-hero">'+
        '<h3>Fahrzeug eingeben &rarr; kalibriertes Werkzeug finden</h3>'+
        '<div class="hint">Hersteller / Modell / Motorcode. Auswahl zeigt teilende Werkstätten mit verfügbarem, kalibriertem Spezialwerkzeug — sortiert nach Entfernung.</div>'+
        '<div class="wl-ac">'+
          '<input class="wl-input" id="wlVehSearch" placeholder="z.B. BMW F30 320d, VW Golf 7 2.0 TDI…" autocomplete="off" aria-label="Fahrzeug suchen" aria-expanded="false" role="combobox" aria-controls="wlVehAc">'+
          '<div class="wl-ac-list" id="wlVehAc" role="listbox"></div>'+
        '</div>'+
        '<div class="wl-toolbar-row" style="margin-top:12px;margin-bottom:0">'+
          '<button class="btn btn-outline" id="wlGeoBtn" type="button"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 10c0 6-9 12-9 12s-9-6-9-12a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Standort nutzen (Entfernung)</button>'+
          '<span id="wlGeoState" style="font-size:11.5px;color:var(--text-faint)"></span>'+
        '</div>'+
      '</div>'+
      '<div id="wlFindResults"></div>'+
    '</div>';

    var input = document.getElementById('wlVehSearch');
    var ac = document.getElementById('wlVehAc');
    input.addEventListener('input', function(){
      var q = this.value.trim();
      if (acTimer) clearTimeout(acTimer);
      if (q.length < 2){ ac.classList.remove('open'); input.setAttribute('aria-expanded','false'); return; }
      acTimer = setTimeout(function(){ doAutocomplete(q); }, 220);
    });
    input.addEventListener('keydown', function(e){
      if (!ac.classList.contains('open')) return;
      if (e.key === 'ArrowDown'){ e.preventDefault(); acActive = Math.min(acActive+1, acItems.length-1); paintAc(); }
      else if (e.key === 'ArrowUp'){ e.preventDefault(); acActive = Math.max(acActive-1, 0); paintAc(); }
      else if (e.key === 'Enter'){ if (acActive >= 0 && acItems[acActive]){ e.preventDefault(); selectVehicle(acItems[acActive]); } }
      else if (e.key === 'Escape'){ ac.classList.remove('open'); }
    });
    document.getElementById('wlGeoBtn').addEventListener('click', requestGeo);
    setTimeout(function(){ input.focus(); }, 80);
  }

  async function doAutocomplete(q){
    var ac = document.getElementById('wlVehAc'); var input = document.getElementById('wlVehSearch');
    var list = [];
    try {
      var data = await api('/vehicles/search?q=' + encodeURIComponent(q), { method:'GET', timeout:8000 });
      list = Array.isArray(data) ? data : (data && data.items) || [];
    } catch(e){
      // Offline: lokalen Katalog filtern
      var ql = q.toLowerCase();
      list = (window.WL_DEMO.vehicles||[]).filter(function(v){ return (v.manufacturer+' '+v.model+' '+(v.engine_code||'')).toLowerCase().indexOf(ql) >= 0; });
    }
    acItems = list; acActive = list.length ? 0 : -1; paintAc();
    if (input) input.setAttribute('aria-expanded', list.length ? 'true':'false');
    ac.classList.toggle('open', list.length > 0);
  }

  function paintAc(){
    var ac = document.getElementById('wlVehAc'); if (!ac) return;
    ac.innerHTML = acItems.map(function(v, i){
      var main = esc((v.manufacturer||'')+' '+(v.model||''));
      var sub = [v.year_from ? (v.year_from+(v.year_to?('–'+v.year_to):'')) : '', v.engine_code||''].filter(Boolean).join(' · ');
      return '<div class="wl-ac-item'+(i===acActive?' active':'')+'" role="option" aria-selected="'+(i===acActive?'true':'false')+'" data-i="'+i+'">'+
        '<span class="veh-main">'+main+'</span><span class="veh-sub">'+esc(sub)+'</span></div>';
    }).join('');
    Array.prototype.forEach.call(ac.querySelectorAll('.wl-ac-item'), function(el){
      el.addEventListener('mousedown', function(e){ e.preventDefault(); selectVehicle(acItems[parseInt(el.getAttribute('data-i'),10)]); });
    });
  }

  async function selectVehicle(v){
    if (!v) return;
    acSelected = v;
    var input = document.getElementById('wlVehSearch'); var ac = document.getElementById('wlVehAc');
    if (input){ input.value = (v.manufacturer||'')+' '+(v.model||''); input.setAttribute('aria-expanded','false'); }
    if (ac) ac.classList.remove('open');
    await runFind(v);
  }

  async function runFind(v){
    var box = document.getElementById('wlFindResults'); if (!box) return;
    box.innerHTML = '<div class="wl-empty"><div class="spinner" style="margin:0 auto 12px"></div>Suche teilende Werkstätten…</div>';
    var geo = window.WL_lastGeo;
    var results = [];
    try {
      var qs = '?vehicle_id=' + encodeURIComponent(v.id || '');
      if (geo){ qs += '&lat='+geo.lat+'&lng='+geo.lng; }
      var data = await api('/tools/find' + qs, { method:'GET', timeout:10000 });
      results = Array.isArray(data) ? data : (data && (data.results || data.items)) || [];
    } catch(e){
      results = window.WL_demoFindTool(v.id, geo?geo.lat:51.16, geo?geo.lng:10.45);
    }
    renderFindResults(box, v, results);
  }

  function renderFindResults(box, v, results){
    if (!results || !results.length){
      box.innerHTML = '<div class="wl-empty"><div class="em-mark">🔧</div>Kein sofort verfügbares, kalibriertes Sharing-Werkzeug für <strong>'+esc((v.manufacturer||'')+' '+(v.model||''))+'</strong> gefunden.</div>';
      return;
    }
    var html = '<div class="wl-section"><h3>'+results.length+' Treffer für '+esc((v.manufacturer||'')+' '+(v.model||''))+'</h3>';
    html += '<div id="wlFindMap" class="wl-map" style="margin-bottom:18px"></div>';
    html += '<div class="wl-list">';
    results.forEach(function(r, i){
      var t = r.tool || {}; var w = r.workshop || {};
      var dist = (r.distance_km != null) ? ('~'+r.distance_km+' km') : 'Entfernung: Standort aktivieren';
      html += '<div class="wl-result-card" data-i="'+i+'" tabindex="0" role="button" aria-label="Treffer '+esc(t.name||'')+' bei '+esc(w.name||'')+'">'+
        '<div class="rc-icon" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L3 18v3h3l6.3-6.3a4 4 0 0 0 5.4-5.4l-2.4 2.4-2-2z"/></svg></div>'+
        '<div class="rc-body">'+
          '<div class="rc-title">'+esc(t.name||'Werkzeug')+'</div>'+
          '<div class="rc-meta">'+esc([t.manufacturer, t.type_number, t.category].filter(Boolean).join(' · '))+'</div>'+
          '<div class="rc-meta" style="margin-top:4px"><strong>'+esc(w.name||'Werkstatt')+'</strong>'+(w.city?(' — '+esc(w.city)):'')+'</div>'+
          '<div class="rc-pills">'+calPill(r.calibrated_until)+'<span class="wl-pill">'+esc(dist)+'</span>'+statusPill(t.status||'verfuegbar')+'</div>'+
        '</div>'+
        '<div class="rc-action"><button class="btn" data-ask="'+i+'">Bei Werkstatt fragen</button></div>'+
      '</div>';
    });
    html += '</div></div>';
    html += '<div class="wl-dsgvo-note">Karte: Leaflet + OpenStreetMap (EU) statt Google Maps. Kontaktaufnahme erfolgt nur als Entwurf (Assist &amp; Approve) — nichts wird automatisch gesendet.</div>';
    box.innerHTML = html;

    // Karte
    var markers = results.filter(function(r){ return r.workshop && r.workshop.lat!=null; }).map(function(r){
      var w = r.workshop, t = r.tool || {};
      return { lat:w.lat, lng:w.lng, popup:'<strong>'+esc(w.name||'')+'</strong><br>'+esc(t.name||'')+'<br>kalibriert bis '+esc(r.calibrated_until||'—')+(r.distance_km!=null?('<br>~'+r.distance_km+' km'):'') };
    });
    if (window.WL_renderMap) window.WL_renderMap('wlFindMap', markers, { center:[51.16,10.45], zoom:6 });

    Array.prototype.forEach.call(box.querySelectorAll('[data-ask]'), function(btn){
      btn.addEventListener('click', function(e){ e.stopPropagation(); askWorkshop(results[parseInt(btn.getAttribute('data-ask'),10)]); });
    });
    Array.prototype.forEach.call(box.querySelectorAll('.wl-result-card'), function(card){

  /* ---- Modal-Steuerung (Fokus-Trap + Escape) ---- */
  var modalLastFocus = null;
  function openModal(){
    var bd = document.getElementById('wlModalBd'); if (!bd) return;

    bd.classList.add('open');
    bd.addEventListener('mousedown', backdropClose);
    document.addEventListener('keydown', modalTrap);
    var first = bd.querySelector('input,select,textarea,button'); if (first) setTimeout(function(){ first.focus(); }, 40);
  }
  function closeModal(){
    var bd = document.getElementById('wlModalBd'); if (!bd) return;
    bd.classList.remove('open');

    document.removeEventListener('keydown', modalTrap);

  }
  function backdropClose(e){ if (e.target && e.target.id === 'wlModalBd') closeModal(); }
  function modalTrap(e){
    if (e.key === 'Escape'){ closeModal(); return; }
    if (e.key !== 'Tab') return;
    var bd = document.getElementById('wlModalBd');
    var f = bd.querySelectorAll('button,input,select,textarea,[href],[tabindex]:not([tabindex="-1"])');
    if (!f.length) return; var first=f[0], last=f[f.length-1];
    if (e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
  }
  window.WL_closeModal = closeModal;
