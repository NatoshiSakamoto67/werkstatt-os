<script id="wl-agent">
(function(){ "use strict";
  if (window.__wlAgentInit) return;
  window.__wlAgentInit = true;

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function toast(m){ if (window.showToast) window.showToast(m); }
  function appendUserLocal(text){
    var box = document.getElementById('chatMessages'); if (!box) return;
    if (window.WL_clearWelcome) window.WL_clearWelcome();
    var m = document.createElement('div'); m.className='message message-user';
    m.innerHTML = '<div class="bubble">'+esc(text)+'</div>'; box.appendChild(m);
    if (typeof window.__xdabScrollToEnd==='function') window.__xdabScrollToEnd();
  }

  function sleep(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }

  // Dispatch: einfacher Agenten-Lauf mit Schritt-Karten (read-only DB-Tools).
  window.WL_startAgentRun = async function(task){
    appendUserLocal(task);
    var card = window.makeRunCard ? window.makeRunCard('Dispatch-Agent läuft…') : null;
    if (!card) return;
    try {
      window.addStep(card, 'Intent', 'Analysiere Anfrage und extrahiere Fahrzeug/Werkzeug.', 'read');
      var data = null;
      try { data = await window.WL_api('/agent/quick', { method:'POST', body: JSON.stringify({ task:task }), timeout: 65000 }); } catch(e){ data = null; }
      await sleep(300);
      if (data && (data.answer || data.content)){
        window.addStep(card, 'Tool', 'find_tool / nearest_workshops über Sharing-Register abgefragt.', 'read');
        window.finish(card, data.answer || data.content);
      } else {
        // Offline-Fallback: lokales find_tool
        window.addStep(card, 'Tool', 'find_tool (Demo) über lokalen Datensatz abgefragt.', 'read');
        var ans = offlineDispatch(task);
        window.finish(card, ans, isOff()?'Backend offline – Demo-Daten.':null);
      }
    } catch(e){ window.finish(card, '', 'Fehler: '+(e&&e.message||e)); }
  };
  function isOff(){ return !!window.WL_OFFLINE; }
  function offlineDispatch(task){
    var D = window.WL_DEMO || {}; var lower=(task||'').toLowerCase();
    var veh = (D.vehicles||[]).find(function(v){ return (v.manufacturer+' '+v.model).toLowerCase().split(/\s+/).some(function(t){ return t.length>2 && lower.indexOf(t)>=0; }); });
    if (!veh) return 'Bitte nenne ein Fahrzeug, dann finde ich das passende kalibrierte Werkzeug bei einer teilenden Werkstatt.';
    var res = window.WL_demoFindTool(veh.id, 51.16, 10.45) || [];
    if (!res.length) return 'Für '+veh.manufacturer+' '+veh.model+' ist aktuell kein verfügbares kalibriertes Sharing-Werkzeug frei.';
    var top = res[0];
    return 'Empfehlung für '+veh.manufacturer+' '+veh.model+':\nFahr zu '+top.workshop.name+' ('+top.workshop.city+') und hol das '+top.tool.name+' ('+top.tool.manufacturer+' '+top.tool.type_number+'), kalibriert bis '+top.calibrated_until+'.';
  }

  // Orchestra: Plan + Kontakt-Entwurf mit Assist&Approve-Gate.
  window.WL_startOrchestra = async function(task){
    appendUserLocal(task);
    var card = window.makeRunCard ? window.makeRunCard('Orchestra — Plan & Entwurf (Assist & Approve)') : null;
    if (!card) return;
    window.addStep(card, 'Plan', 'Schritt 1: Fahrzeug & Werkzeug bestimmen.', 'read');
    var draft = null, hinweis = null;
    try {
      var data = await window.WL_api('/agent/orchestra', { method:'POST', body: JSON.stringify({ task:task }), timeout: 120000 });
      if (data && data.plan && data.plan.schritte){
        data.plan.schritte.forEach(function(s){ window.addStep(card, 'Schritt '+(s.nr||''), s.beschreibung||'', s.klasse||'read'); });
      }
      draft = data && data.draft; hinweis = data && data.hinweis;
    } catch(e){ /* offline */ }
    await sleep(300);
    window.addStep(card, 'Schritt 2', 'find_tool über Sharing-Register (read-only).', 'read');
    window.addStep(card, 'Schritt 3', 'Kontakt-Entwurf an Werkstatt erstellen (freigabepflichtig).', 'send');
    if (!draft) draft = offlineDraft(task);
    var note = card.querySelector('.xdab-agent-note');
    if (note) note.textContent = hinweis || 'Entwurf bereit. Bitte prüfen und freigeben.';
    card.classList.add('xdab-agent-done');
    if (window.WL_renderApprovalGate) window.WL_renderApprovalGate(card, draft, function(){ /* Versand simuliert */ });
  };
  function offlineDraft(task){
    var D = window.WL_DEMO || {}; var lower=(task||'').toLowerCase();
    var veh = (D.vehicles||[]).find(function(v){ return (v.manufacturer+' '+v.model).toLowerCase().split(/\s+/).some(function(t){ return t.length>2 && lower.indexOf(t)>=0; }); });
    var res = veh ? (window.WL_demoFindTool(veh.id, 51.16, 10.45)||[]) : [];
    var top = res[0];
    var wsName = top ? top.workshop.name : 'Partner-Werkstatt';
    var toolName = top ? top.tool.name : 'das benötigte Spezialwerkzeug';
    return 'Betreff: Ausleih-Anfrage '+toolName+'\n\n'+
      'Sehr geehrtes Team von '+wsName+',\n\n'+
      'wir benötigen kurzfristig '+toolName+'' + (veh?(' für einen '+veh.manufacturer+' '+veh.model):'') + '. '+
      'Laut Sharing-Register ist es bei Ihnen verfügbar und kalibriert. '+
      'Wäre eine Ausleihe für 1–2 Werktage möglich? Wir holen es gerne ab und übernehmen ggf. eine Schutzgebühr.\n\n'+
      'Mit freundlichen Grüßen\nIhre Werkstatt (WERKLEIH)';
  }

  // sendMessage wrappen: dispatch → Agent-Run, orchestra → Plan+Entwurf.
  function wrapSend(){
    if (typeof window.sendMessage !== 'function' || window.sendMessage.__wlAgentHook) return;
    var orig = window.sendMessage;
    window.sendMessage = function(){
      try {
        var inp = document.getElementById('chatInput'); var t = inp ? inp.value : '';
        if (t && t.trim()){
          if (window.wlMode === 'dispatch'){ var task=t.trim(); if(inp){inp.value='';inp.style.height='auto';} window.WL_startAgentRun(task); return; }
          if (window.wlMode === 'orchestra'){ var task2=t.trim(); if(inp){inp.value='';inp.style.height='auto';} window.WL_startOrchestra(task2); return; }
        }
      } catch(e){}
      return orig.apply(this, arguments);
    };
    window.sendMessage.__wlAgentHook = true;
  }

  function boot(){ wrapSend(); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot); else boot();
  setTimeout(boot, 1500); setTimeout(boot, 4000);
})();
</script>

<script id="wl-export">
(function(){ "use strict";
  if (window.__wlExportInit) return;
  window.__wlExportInit = true;

  function toast(m){ if (window.showToast) window.showToast(m); }

  // jsPDF lokal aus /vendor/ nachladen (onerror-Flag).
  function loadJsPdf(){
    if (window.jspdf || document.getElementById('wlJsPdf')) return;
    var s = document.createElement('script');
    s.id='wlJsPdf'; s.src='vendor/jspdf-2.5.1.umd.min.js'; s.async=true;
    s.onerror = function(){ window.__wlNoJsPdf = true; };
    document.head.appendChild(s);
  }
  loadJsPdf();

  /* ---- Sanitizer (§6): Emoji/Ampel → [OK]/[Achtung]/[Kritisch], dann strippen ---- */
  window.wlExportSanitize = function(text){
    var s = String(text == null ? '' : text);
    s = s.replace(/[🟢✅]/g, '[OK]');
    s = s.replace(/[🟡🟠⚠️⚠]/g, '[Achtung]');
    s = s.replace(/[🔴❌]/g, '[Kritisch]');
    s = s.replace(/🚦/g, '');
    // Surrogat-Paare (übrige Emoji), Symbol-/Piktogramm-Ranges, ZWJ/Variation-Selectors strippen
    s = s.replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, '');
    s = s.replace(/[←-⇿⌀-➿⬀-⯿︀-️‍]/g, '');
    s = s.replace(/[ \t]{2,}/g, ' ');
    return s.trim();
  };

  // Element → sanitisierter Plaintext (klont, entfernt svg/.proc-*/.msg-actions/[aria-hidden]).
  window.wlExportPlainFromEl = function(el){
    if (!el) return '';
    var clone = el.cloneNode(true);
    Array.prototype.forEach.call(clone.querySelectorAll('svg, .proc-sources, .proc-src-link, .msg-actions, [aria-hidden="true"], .xdab-orch-gate'), function(n){ n.remove(); });
    return window.wlExportSanitize(clone.innerText || clone.textContent || '');
  };

  function collectMessages(){
    var out = [];
    Array.prototype.forEach.call(document.querySelectorAll('#chatMessages .message'), function(m){
      var role = m.classList.contains('message-user') ? 'Nutzer' : 'WERKLEIH';
      var bubble = m.querySelector('.bubble');
      var txt = window.wlExportPlainFromEl(bubble || m);
      if (txt) out.push({ role:role, text:txt });
    });
    return out;
  }

  function download(filename, content, mime){
    var blob = new Blob([content], { type: mime || 'text/plain;charset=utf-8' });
    var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); }, 200);
  }

  window.exportChat = function(format){
    var msgs = collectMessages();
    if (!msgs.length){ toast('Nichts zu exportieren'); return; }
    var stamp = new Date().toISOString().slice(0,16).replace(/[:T]/g,'-');

    if (format === 'pdf'){
      if (!window.jspdf || !window.jspdf.jsPDF){ toast('jsPDF fehlt – lege jspdf nach /vendor/ (Export als Text)'); format = 'txt'; }
      else {
        var jsPDF = window.jspdf.jsPDF; var doc = new jsPDF({ unit:'pt', format:'a4' });
        var x=48, y=60, w=500, lh=16;
        doc.setFontSize(16); doc.text('WERKLEIH — Chat-Export', x, y); y += 24;
        doc.setFontSize(9); doc.setTextColor(120); doc.text('Export läuft lokal im Browser (DSGVO). '+new Date().toLocaleString('de-DE'), x, y); y += 22;
        doc.setTextColor(20);
        msgs.forEach(function(m){
          doc.setFontSize(11); doc.setFont(undefined,'bold'); doc.text(m.role+':', x, y); y += lh;
          doc.setFont(undefined,'normal'); doc.setFontSize(10.5);
          var lines = doc.splitTextToSize(window.wlExportSanitize(m.text), w);
          lines.forEach(function(ln){ if (y > 780){ doc.addPage(); y=60; } doc.text(ln, x, y); y += lh; });
          y += 8;
        });
        doc.save('werkleih-chat-'+stamp+'.pdf'); toast('PDF exportiert'); return;
      }
    }

    if (format === 'md'){
      var md = '# WERKLEIH — Chat-Export\n\n_Export läuft lokal im Browser (DSGVO) · '+new Date().toLocaleString('de-DE')+'_\n\n';
      md += msgs.map(function(m){ return '**'+m.role+':**\n\n'+window.wlExportSanitize(m.text)+'\n'; }).join('\n---\n\n');
      download('werkleih-chat-'+stamp+'.md', md, 'text/markdown;charset=utf-8'); toast('Markdown exportiert'); return;
    }

    var txt = 'WERKLEIH — Chat-Export\nExport läuft lokal im Browser (DSGVO) · '+new Date().toLocaleString('de-DE')+'\n\n';
    txt += msgs.map(function(m){ return m.role+':\n'+window.wlExportSanitize(m.text); }).join('\n\n');
    download('werkleih-chat-'+stamp+'.txt', txt, 'text/plain;charset=utf-8'); toast('Text exportiert');
  };
})();
</script>

<script id="wl-pwa">
(function(){ "use strict";
  if (window.__wlPwaInit) return;
  window.__wlPwaInit = true;

  function toast(m){ if (window.showToast) window.showToast(m); }

  /* ---- Service Worker registrieren (defensiv, nach load) ---- */
  function registerSW(){
    if (!('serviceWorker' in navigator)) return;
    try {
      Promise.resolve().catch(function(){ /* still: kein Block */ });
    } catch(e){}
  }
  if (document.readyState === 'complete') registerSW();
  else window.addEventListener('load', registerSW);

  /* ---- Deep-Link: ?panel=<id> beim Boot öffnen (manifest-Shortcuts) ---- */
  function deepLink(){
    var id = null;
    try { id = new URLSearchParams(window.location.search).get('panel'); } catch(e){ return false; }
    if (!id) return false;
    var open = function(){
      if (id === 'kibot'){ if (window.closePanel) window.closePanel(); return; }
      if (typeof window.openPanel === 'function') window.openPanel(id);
    };
    // Panels brauchen evtl. einen Tick, bis openPanel verfügbar ist
    if (typeof window.openPanel === 'function' || id === 'kibot') setTimeout(open, 120);
    else setTimeout(open, 700);
    return true;
  }
  window.WL_deepLink = deepLink;

  /* ---- Android: beforeinstallprompt abfangen → „Installieren"-Button ---- */
  var deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    deferredPrompt = e;
    var btn = document.getElementById('wlInstallBtn'); if (btn) btn.classList.add('show');
  });
  window.WL_promptInstall = function(){
    if (!deferredPrompt){ toast('Installation über das Browser-Menü möglich'); return; }
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(){ deferredPrompt = null; var btn = document.getElementById('wlInstallBtn'); if (btn) btn.classList.remove('show'); });
  };
  window.addEventListener('appinstalled', function(){
    deferredPrompt = null;
    var btn = document.getElementById('wlInstallBtn'); if (btn) btn.classList.remove('show');
    toast('WERKLEIH installiert');
  });

  /* ---- iOS: einmaliger Hinweis „Teilen → Zum Home-Bildschirm" ---- */
  function isIos(){ return /iphone|ipad|ipod/i.test(navigator.userAgent || ''); }
  function isStandalone(){
    return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
  }
  window.WL_dismissIosHint = function(){
    var h = document.getElementById('wlIosHint'); if (h) h.classList.remove('show');
    try { localStorage.setItem('wl-ios-hint-seen','1'); } catch(e){}
  };
  function maybeIosHint(){
    if (!isIos() || isStandalone()) return;
    var seen = '0'; try { seen = localStorage.getItem('wl-ios-hint-seen') || '0'; } catch(e){}
    if (seen === '1') return;
    var h = document.getElementById('wlIosHint');
    if (h) setTimeout(function(){ h.classList.add('show'); }, 2600);
  }

  function boot(){ deepLink(); maybeIosHint(); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot); else boot();
  setTimeout(boot, 1200);
})();
</script>

    { id:'fahrzeuge',    label:'Fahrzeuge',    sec:'Werkstatt', cnt:'cntRailVeh', icon:'<path d="M5 16h14M6.5 16l1.2-5.2A2 2 0 0 1 9.6 9h4.8a2 2 0 0 1 1.9 1.3L17.5 16"/><circle cx="7.5" cy="16" r="1.6"/><circle cx="16.5" cy="16" r="1.6"/>' },
    { id:'werkstaetten', label:'Werkstätten',  sec:'Werkstatt', cnt:'cntRailShops', icon:'<path d="M21 10c0 6-9 12-9 12s-9-6-9-12a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>' },
    { id:'kunden',       label:'Kunden',       sec:'Werkstatt', icon:'<circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/>' },
    { id:'auftraege',    label:'Aufträge',     sec:'Werkstatt', icon:'<path d="M9 3h6l1 3H8z"/><rect x="4" y="6" width="16" height="15" rx="2"/><line x1="8" y1="11" x2="16" y2="11"/><line x1="8" y1="15" x2="13" y2="15"/>' },
    { id:'mediathek',    label:'Mediathek',    sec:'Werkstatt', cnt:'cntRailMedia', icon:'<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/>' },
    { id:'kibot',        label:'KI-Bot',       sec:'Assistenz', icon:'<path d="M21 15a2 2 0 0 1-2 2H8l-4 4V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2z"/>' },
    { id:'einstellungen',label:'Einstellungen',sec:'System',    icon:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 0 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 4 13.9H3.9a2 2 0 0 1 0-4H4a1.6 1.6 0 0 0 1.1-2.7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 10.6 4V3.9a2 2 0 0 1 4 0V4a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1A1.6 1.6 0 0 0 21 10.1H21a2 2 0 0 1 0 4h-.1z"/>' }
  ];
  function navById(id){ for (var i=0;i<NAV.length;i++){ if (NAV[i].id===id) return NAV[i]; } return null; }

  /* ---- LocalStorage-Stores (defensiv) ---- */
  function lsGet(k,d){ try { var v = localStorage.getItem(k); return v==null?d:v; } catch(e){ return d; } }
  function lsSet(k,v){ try { localStorage.setItem(k,v); } catch(e){} }
  function getPins(){ try { return JSON.parse(localStorage.getItem('wl-ui-pins')||'[]'); } catch(e){ return []; } }
  function setPins(arr){ lsSet('wl-ui-pins', JSON.stringify(arr||[])); }
  function isPinned(id){ return getPins().indexOf(id) >= 0; }
  function togglePin(id){
    var p = getPins(); var i = p.indexOf(id);
    if (i>=0) p.splice(i,1); else p.push(id);
    setPins(p); renderRail(); renderMenuPins();
    toast(i>=0 ? 'Aus Favoriten entfernt' : 'Zu Favoriten hinzugefügt');
  }
  window.WL_togglePin = togglePin;

  /* ---- aktiver Eintrag ---- */
  function currentActive(){
    var panel = document.getElementById('panel');
    if (panel && panel.classList.contains('open')){
      var t = document.getElementById('panelTitle');
      // Mappe Titel -> id via NAV labels
      for (var i=0;i<NAV.length;i++){ if (t && (t.textContent||'').indexOf(NAV[i].label)===0) return NAV[i].id; }
      return null;
    }
    return 'kibot';
  }

  /* ---- Pin-Icon SVG ---- */
  function starSvg(on){
    return '<svg width="15" height="15" viewBox="0 0 24 24" fill="'+(on?'currentColor':'none')+'" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2l3 6.5 7 .9-5 4.8 1.3 7L12 18.8 5.4 21.2 6.7 14.2 2 9.4l7-.9z"/></svg>';
  }

  /* ---- DESKTOP RAIL rendern ---- */
  function railItemHtml(n, active){
    var on = isPinned(n.id);
    var cnt = n.cnt ? '<span class="ri-count" id="'+n.cnt+'">0</span>' : '';
    return '<button class="wl-rail-item'+(active===n.id?' is-active':'')+'" data-nav="'+n.id+'" title="'+esc(n.label)+'">'+
      '<span class="ri-ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+n.icon+'</svg></span>'+
      '<span class="ri-label">'+esc(n.label)+'</span>'+ cnt +
      '<button class="ri-pin'+(on?' is-pinned':'')+'" data-pin="'+n.id+'" aria-label="'+(on?'Favorit entfernen':'Anheften')+'" aria-pressed="'+(on?'true':'false')+'">'+starSvg(on)+'</button>'+
    '</button>';
  }
  function renderRail(){
    var rail = document.getElementById('wlRail'); if (!rail) return;
    var active = currentActive();
    var pins = getPins();
    var html = '<div class="wl-rail-head">'+
      '<div class="wl-rail-brand"><div class="menu-brand-mark" aria-label="WERKLEIH"><svg class="brand-x" viewBox="0 0 512 512" style="width:66%;height:66%" aria-hidden="true"><path d="M64 96h62l44 210 50-210h52l50 210 44-210h62l-72 320h-66l-44-188-44 188h-66z"/></svg></div><div class="menu-brand-name">WERKLEIH</div></div>'+
      '<button class="icon-btn wl-rail-toggle" onclick="WL_toggleSidebar()" aria-label="Sidebar ein-/ausklappen" style="width:34px;height:34px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg></button>'+
    '</div><div class="wl-rail-scroll">';

    if (pins.length){
      html += '<div class="wl-rail-sec">Favoriten</div>';
      pins.forEach(function(id){ var n = navById(id); if (n) html += railItemHtml(n, active); });
    }
    var lastSec = '';
    NAV.forEach(function(n){
      if (n.sec !== lastSec){ html += '<div class="wl-rail-sec">'+esc(n.sec)+'</div>'; lastSec = n.sec; }
      html += railItemHtml(n, active);
    });
    html += '</div>';
    rail.innerHTML = html;

    Array.prototype.forEach.call(rail.querySelectorAll('[data-nav]'), function(b){
      b.addEventListener('click', function(e){
        if (e.target.closest && e.target.closest('[data-pin]')) return;
        var id = b.getAttribute('data-nav');
        if (id === 'kibot'){ if (window.closePanel) window.closePanel(); WL_rememberPanel('kibot'); setActive('kibot'); return; }
        if (window.openPanel) window.openPanel(id);
      });
    });
    Array.prototype.forEach.call(rail.querySelectorAll('[data-pin]'), function(b){
      b.addEventListener('click', function(e){ e.stopPropagation(); togglePin(b.getAttribute('data-pin')); });
    });
    syncCounts();
  }
  function setActive(id){
    var rail = document.getElementById('wlRail'); if (rail){
      Array.prototype.forEach.call(rail.querySelectorAll('[data-nav]'), function(b){ b.classList.toggle('is-active', b.getAttribute('data-nav')===id); });
    }
    syncTabbar(id);
  }
  window.WL_setActiveNav = setActive;

  /* ---- Counts in Rail spiegeln (nutzt Demo/Backend-Längen) ---- */
  function syncCounts(){
    var D = window.WL_DEMO || {};
    var map = { cntRailTools:(D.tools||[]).length, cntRailVeh:(D.vehicles||[]).length, cntRailShops:(D.workshops||[]).length };
    Object.keys(map).forEach(function(k){ var e=document.getElementById(k); if (e) e.textContent = map[k]; });
  }
  window.WL_railSyncCounts = syncCounts;

  /* ---- SIDEBAR collapse/expand ---- */
  window.WL_toggleSidebar = function(){
    var cur = document.documentElement.getAttribute('data-sidebar') === 'collapsed';
    var next = cur ? 'expanded' : 'collapsed';
    document.documentElement.setAttribute('data-sidebar', next);
    lsSet('wl-ui-sidebar', next);
  };
  (function initSidebar(){
    var saved = lsGet('wl-ui-sidebar','expanded');
    document.documentElement.setAttribute('data-sidebar', saved === 'collapsed' ? 'collapsed' : 'expanded');
  })();

  /* ---- DICHTE ---- */
  window.WL_setDensity = function(d){
    if (d !== 'compact' && d !== 'comfortable' && d !== 'normal') d = 'normal';
    if (d === 'normal') document.documentElement.removeAttribute('data-density');
    else document.documentElement.setAttribute('data-density', d);
    lsSet('wl-ui-density', d);
    // aktive Buttons in offenen Toolbars markieren
    Array.prototype.forEach.call(document.querySelectorAll('.wl-density button'), function(b){ b.classList.toggle('is-on', b.getAttribute('data-density')===d); });
  };
  window.WL_getDensity = function(){ return lsGet('wl-ui-density','normal'); };
  (function initDensity(){
    var d = lsGet('wl-ui-density','normal');
    if (d === 'compact' || d === 'comfortable') document.documentElement.setAttribute('data-density', d);
  })();

  /* ---- Zuletzt geöffnetes Panel ---- */
  window.WL_rememberPanel = function(id){ lsSet('wl-ui-last-panel', id||'kibot'); };
  window.WL_lastPanel = function(){ return lsGet('wl-ui-last-panel','kibot'); };

  /* ---- Slide-Menü: Favoriten-Gruppe + Pin-Sterne ---- */
  function renderMenuPins(){
    var scroll = document.getElementById('wlMenuScroll'); if (!scroll) return;
    // Pin-Stern an jedem Menü-Eintrag mit data-panel
    Array.prototype.forEach.call(scroll.querySelectorAll('.menu-item[data-panel]'), function(it){
      var id = it.getAttribute('data-panel');
      var pin = it.querySelector('.mi-pin');
      var on = isPinned(id);
      if (!pin){
        pin = document.createElement('button'); pin.className = 'mi-pin'; pin.setAttribute('data-pin', id);
        pin.addEventListener('click', function(e){ e.stopPropagation(); togglePin(id); });
        it.appendChild(pin);
      }
      pin.classList.toggle('is-pinned', on);
      pin.setAttribute('aria-label', on?'Favorit entfernen':'Anheften');
      pin.setAttribute('aria-pressed', on?'true':'false');
      pin.innerHTML = starSvg(on);
    });
    // Favoriten-Gruppe oben
    var favWrap = document.getElementById('wlMenuFavs');
    var pins = getPins();
    if (!pins.length){ if (favWrap) favWrap.remove(); return; }
    if (!favWrap){
      favWrap = document.createElement('div'); favWrap.id = 'wlMenuFavs';
      scroll.insertBefore(favWrap, scroll.firstChild);
    }
    var html = '<div class="menu-section-title">Favoriten</div>';
    pins.forEach(function(id){
      var n = navById(id); if (!n) return;
      var on = true;
      var click = id==='kibot' ? "closePanel(); closeMenu();" : "openPanel('"+id+"')";
      html += '<button class="menu-item" data-fav="'+id+'" onclick="'+click+'">'+
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+n.icon+'</svg>'+
        '<span>'+esc(n.label)+'</span>'+
        '<button class="mi-pin is-pinned" data-pin="'+id+'" aria-label="Favorit entfernen" aria-pressed="true">'+starSvg(true)+'</button>'+
      '</button>';
    });
    favWrap.innerHTML = html;
    Array.prototype.forEach.call(favWrap.querySelectorAll('.mi-pin[data-pin]'), function(b){
      b.addEventListener('click', function(e){ e.stopPropagation(); togglePin(b.getAttribute('data-pin')); });
    });
  }
  window.WL_renderMenuPins = renderMenuPins;

  /* ---- MOBILE TAB-BAR ---- */
  window.WL_tab = function(id){
    if (id === 'mehr'){ if (window.openMenu) window.openMenu(); return; }
    if (id === 'kibot'){ if (window.closePanel) window.closePanel(); WL_rememberPanel('kibot'); setActive('kibot'); syncTabbar('kibot'); return; }
    if (window.openPanel) window.openPanel(id);
  };
  function syncTabbar(activeId){
    var bar = document.getElementById('wlTabbar'); if (!bar) return;
    Array.prototype.forEach.call(bar.querySelectorAll('.wl-tabbtn'), function(b){
      b.classList.toggle('is-active', b.getAttribute('data-tab')===activeId);
    });
  }
  window.WL_syncTabbar = syncTabbar;

  /* ---- openPanel/closePanel wrappen: aktiver Zustand + last-panel + Toggles für Sidebar-Btn ---- */
  function wrapPanels(){
    if (typeof window.openPanel === 'function' && !window.openPanel.__wlNavHook){
      var origOpen = window.openPanel;
      window.openPanel = function(name){
        var r = origOpen.apply(this, arguments);
        try {
          if (name && name !== 'einstellungen') window.WL_rememberPanel(name);
          else if (name) window.WL_rememberPanel(name);
          setActive(name); syncTabbar(name);
        } catch(e){}
        return r;
      };
      window.openPanel.__wlNavHook = true;
    }
    if (typeof window.closePanel === 'function' && !window.closePanel.__wlNavHook){
      var origClose = window.closePanel;
      window.closePanel = function(){
        var r = origClose.apply(this, arguments);
        try { setActive('kibot'); syncTabbar('kibot'); } catch(e){}
        return r;
      };
      window.closePanel.__wlNavHook = true;
    }
  }

  /* ---- Sidebar-Toggle-Button im Header nur Desktop zeigen ---- */
  function syncHeaderButtons(){
    var isDesktop = window.matchMedia && window.matchMedia('(min-width:1024px)').matches;
    var sb = document.getElementById('wlSidebarToggle');
    var mb = document.getElementById('wlMenuBtn');
    if (sb) sb.style.display = isDesktop ? '' : 'none';
    // Hamburger auf Desktop ausblenden (Rail ersetzt Slide-Menü), mobil/Tablet sichtbar
    if (mb) mb.style.display = isDesktop ? 'none' : '';
  }

  function boot(){
    renderRail(); renderMenuPins(); wrapPanels(); syncHeaderButtons();
    syncTabbar(currentActive());
    if (window.matchMedia){
      try { window.matchMedia('(min-width:1024px)').addEventListener('change', syncHeaderButtons); }
      catch(e){ try { window.matchMedia('(min-width:1024px)').addListener(syncHeaderButtons); } catch(e2){} }
    }
    // Counts später nochmal (Demo-Seed/Backend)
    setTimeout(syncCounts, 900);
    // Start-Panel: ?panel= hat Vorrang (wl-pwa), sonst zuletzt geöffnetes
    setTimeout(function(){
      var hasDeep = false; try { hasDeep = !!new URLSearchParams(window.location.search).get('panel'); } catch(e){}
      if (hasDeep) return;
      var last = window.WL_lastPanel();
      if (last && last !== 'kibot' && typeof window.openPanel === 'function'){ window.openPanel(last); }
    }, 350);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot); else boot();
  setTimeout(boot, 1500); setTimeout(boot, 4000);
})();
</script>

<script id="wl-listtools">
(function(){ "use strict";
  if (window.__wlListToolsInit) return;
  window.__wlListToolsInit = true;

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  var PAGE = 50; // initiale Zeilen + „Mehr laden"-Schrittweite

  function densityBar(){
    var d = (window.WL_getDensity ? window.WL_getDensity() : 'normal');
    return '<div class="wl-density" role="group" aria-label="Dichte">'+
      '<button data-density="compact"'+(d==='compact'?' class="is-on"':'')+' onclick="WL_setDensity(\'compact\')" title="Kompakt">Kompakt</button>'+
      '<button data-density="normal"'+(d==='normal'?' class="is-on"':'')+' onclick="WL_setDensity(\'normal\')" title="Normal">Normal</button>'+
      '<button data-density="comfortable"'+(d==='comfortable'?' class="is-on"':'')+' onclick="WL_setDensity(\'comfortable\')" title="Komfortabel">Komfort</button>'+
    '</div>';
  }

  // Generischer, scannbarer Listen-Renderer mit Sticky-Toolbar, Filter, Chips, Sort, „Mehr laden".
  // cfg: { host, items, columns:[{key,label,sort}], filterText(item), chips:[{id,label,match(item)}],
  //        sorts:[{id,label,cmp}], rowHtml(item), mobCardHtml(item), asCards:bool, onAfter(filtered) }
  window.WL_renderList = function(cfg){
    var host = cfg.host; if (!host) return;
    var state = { q:'', chips:{}, sort:(cfg.sorts && cfg.sorts[0] ? cfg.sorts[0].id : null), limit:PAGE };
    var debTimer = null;

    function chipOn(id){ return !!state.chips[id]; }
    function activeChips(){ return Object.keys(state.chips).filter(function(k){ return state.chips[k]; }); }

    function filtered(){
      var q = state.q.toLowerCase().trim();
      var act = activeChips();
      var out = cfg.items.filter(function(it){
        if (q){ var hay = (cfg.filterText ? cfg.filterText(it) : '').toLowerCase(); if (hay.indexOf(q) < 0) return false; }
        if (act.length && cfg.chips){
          // Chips sind ODER innerhalb gleicher Gruppe? Hier: UND über aktive (einfach + vorhersehbar)
          for (var i=0;i<act.length;i++){
            var ch = cfg.chips.filter(function(c){ return c.id===act[i]; })[0];
            if (ch && ch.match && !ch.match(it)) return false;
          }
        }
        return true;
      });
      if (state.sort && cfg.sorts){
        var s = cfg.sorts.filter(function(x){ return x.id===state.sort; })[0];
        if (s && s.cmp) out = out.slice().sort(s.cmp);
      }
      return out;
    }

    function paint(){
      var all = filtered();
      var total = cfg.items.length;
      var shown = Math.min(state.limit, all.length);
      var slice = all.slice(0, shown);

      var chipsHtml = '';
      if (cfg.chips && cfg.chips.length){
        chipsHtml = '<div class="wl-chips" role="group" aria-label="Filter">'+
          cfg.chips.map(function(c){
            return '<button class="wl-chip'+(chipOn(c.id)?' is-on':'')+'" data-chip="'+esc(c.id)+'" aria-pressed="'+(chipOn(c.id)?'true':'false')+'">'+esc(c.label)+'</button>';
          }).join('')+'</div>';
      }
      var sortHtml = '';
      if (cfg.sorts && cfg.sorts.length > 1){
        sortHtml = '<select class="wl-psort" aria-label="Sortierung">'+
          cfg.sorts.map(function(s){ return '<option value="'+esc(s.id)+'"'+(s.id===state.sort?' selected':'')+'>'+esc(s.label)+'</option>'; }).join('')+'</select>';
      }

      var bodyHtml;
      if (!slice.length){
        bodyHtml = '<div class="wl-empty"><div class="em-mark">🔍</div>Keine Treffer für die aktuellen Filter.</div>';
      } else if (cfg.asCards && cfg.mobCardHtml){
        var tableRows = slice.map(cfg.rowHtml).join('');
        var cards = slice.map(cfg.mobCardHtml).join('');
        bodyHtml = '<div class="wl-table-wrap wl-as-cards">'+
          '<table class="wl-table"><thead><tr>'+cfg.columns.map(function(c){ return '<th>'+esc(c.label)+'</th>'; }).join('')+'</tr></thead><tbody>'+tableRows+'</tbody></table>'+
          '<div class="wl-mobcards is-on">'+cards+'</div></div>';
      } else {
        var rows = slice.map(cfg.rowHtml).join('');
        bodyHtml = '<div class="wl-table-wrap"><table class="wl-table"><thead><tr>'+cfg.columns.map(function(c){ return '<th>'+esc(c.label)+'</th>'; }).join('')+'</tr></thead><tbody>'+rows+'</tbody></table></div>';
      }

      var moreHtml = (shown < all.length) ?
        '<div class="wl-loadmore"><button class="btn btn-outline" id="wlMore">Mehr laden ('+(all.length - shown)+' weitere)</button></div>' : '';

      host.innerHTML =
        '<div class="wl-ptools">'+
          '<div class="wl-ptools-row">'+
            '<input class="wl-psearch" id="wlListSearch" placeholder="'+esc(cfg.searchPlaceholder||'Suchen…')+'" autocomplete="off" aria-label="Liste durchsuchen" value="'+esc(state.q)+'">'+
            sortHtml + densityBar() +
            '<span class="wl-pcount">'+all.length+' von '+total+'</span>'+
          '</div>'+
          (chipsHtml ? '<div class="wl-ptools-row">'+chipsHtml+'</div>' : '')+
        '</div>'+ bodyHtml + moreHtml;

      // Events
      var search = host.querySelector('#wlListSearch');
      if (search){
        search.addEventListener('input', function(){
          if (debTimer) clearTimeout(debTimer);
          var v = this.value;
          debTimer = setTimeout(function(){ state.q = v; state.limit = PAGE; paint(); restoreFocus(); }, 200);
        });
      }
      Array.prototype.forEach.call(host.querySelectorAll('[data-chip]'), function(b){
        b.addEventListener('click', function(){ var id = b.getAttribute('data-chip'); state.chips[id] = !state.chips[id]; state.limit = PAGE; paint(); });
      });
      var sortSel = host.querySelector('.wl-psort');
      if (sortSel) sortSel.addEventListener('change', function(){ state.sort = this.value; paint(); });
      var more = host.querySelector('#wlMore');
      if (more) more.addEventListener('click', function(){ state.limit += PAGE; paint(); });

      if (cfg.onAfter) cfg.onAfter(slice, all);
    }

    function restoreFocus(){
      var s = host.querySelector('#wlListSearch'); if (s){ s.focus(); var v=s.value; s.value=''; s.value=v; }
    }

    paint();
  };
})();
</script>

<script id="wl-paneltools">
(function(){ "use strict";
  if (window.__wlPanelToolsInit) return;
  window.__wlPanelToolsInit = true;

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function api(p,o){ return window.WL_api(p,o); }
  function isOffline(){ return !!window.WL_OFFLINE; }
  function offlineBanner(){ return isOffline() ? '<div style="margin-bottom:16px"><span class="wl-offline"><span class="dot"></span>Backend offline – Demo-Daten</span></div>' : ''; }

  /* Pills (gespiegelt aus wl-panels, lokal redeklariert) */
  function statusPill(status){
    var map = { verfuegbar:['ok','verfügbar'], verliehen:['warn','verliehen'], defekt:['danger','defekt'], wartung:['warn','Wartung'] };
    var m = map[status] || ['','' + (status||'')];
    return '<span class="wl-pill '+m[0]+'">'+esc(m[1])+'</span>';
  }
  function calPill(dateStr){
    if (!dateStr) return '<span class="wl-pill warn">keine Kalibrierung</span>';
    var d = new Date(dateStr+'T00:00:00'); var now = new Date();
    var days = Math.round((d - now)/86400000);
    var cls = days < 0 ? 'danger' : (days < 90 ? 'warn' : 'ok');
    var lbl = days < 0 ? 'kalibrierung abgelaufen' : 'kalibriert bis '+dateStr;
    return '<span class="wl-pill '+cls+'">'+esc(lbl)+'</span>';
  }
  function orderStatusPill(s){
    var map = { offen:['','offen'], in_arbeit:['warn','in Arbeit'], wartet_werkzeug:['danger','wartet auf Werkzeug'], abgeschlossen:['ok','abgeschlossen'] };
    var m = map[s] || ['', s||'']; return '<span class="wl-pill '+m[0]+'">'+esc(m[1])+'</span>';
  }
  function calMs(dateStr){ var d = dateStr ? new Date(dateStr+'T00:00:00').getTime() : 0; return isNaN(d)?0:d; }

  /* ---------- WERKZEUGE (skaliert) ---------- */
  async function buildWerkzeuge(inner, actions){
    if (actions) actions.innerHTML = '<button class="btn" id="wlAddTool2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Werkzeug</button>';
    var tools = [];
    try { var data = await api('/tools', { method:'GET', timeout:8000 }); tools = Array.isArray(data)?data:(data&&data.items)||[]; }
    catch(e){ tools = (window.WL_DEMO.tools||[]).slice(); }
    if (window.WL_setCounts) window.WL_setCounts({ tools: tools.length });
    if (window.WL_railSyncCounts) window.WL_railSyncCounts();

    var cats = {}; tools.forEach(function(t){ if (t.category) cats[t.category]=1; });
    var catChips = Object.keys(cats).sort().slice(0,8).map(function(c){ return { id:'cat:'+c, label:c, match:function(t){ return t.category===c; } }; });

    inner.innerHTML = '<div class="panel-wrap">'+offlineBanner()+
      '<div class="panel-sub">Eigene Werkzeuge der Werkstatt. <strong>Teilbare</strong>, kalibrierte und verfügbare Werkzeuge erscheinen im tenant-übergreifenden Sharing-Register.</div>'+
      '<div id="wlListHost"></div></div>';

    window.WL_renderList({
      host: document.getElementById('wlListHost'),
      items: tools,
      searchPlaceholder:'Werkzeug, Hersteller, Typ-Nr., Kategorie…',
      columns:[{label:'Werkzeug'},{label:'Kategorie'},{label:'Status'},{label:'Kalibrierung'},{label:'Sharing'},{label:''}],
      filterText:function(t){ return [t.name,t.manufacturer,t.type_number,t.category,t.status].filter(Boolean).join(' '); },
      chips: [
        { id:'st:verfuegbar', label:'verfügbar', match:function(t){ return (t.status||'verfuegbar')==='verfuegbar'; } },
        { id:'st:verliehen', label:'verliehen', match:function(t){ return t.status==='verliehen'; } },
        { id:'st:defekt', label:'defekt', match:function(t){ return t.status==='defekt'; } },
        { id:'st:wartung', label:'Wartung', match:function(t){ return t.status==='wartung'; } },
        { id:'sh', label:'teilbar', match:function(t){ return t.shareable!==false; } }
      ].concat(catChips),
      sorts:[
        { id:'name', label:'Name (A–Z)', cmp:function(a,b){ return (a.name||'').localeCompare(b.name||''); } },
        { id:'cal', label:'Kalibrierung (früh zuerst)', cmp:function(a,b){ return calMs(a.calibrated_until)-calMs(b.calibrated_until); } },
        { id:'status', label:'Status', cmp:function(a,b){ return (a.status||'').localeCompare(b.status||''); } }
      ],
      asCards:true,
      rowHtml:function(t){
        return '<tr>'+
          '<td><strong>'+esc(t.name||'')+'</strong><div style="font-size:11.5px;color:var(--text-faint)">'+esc([t.manufacturer,t.type_number].filter(Boolean).join(' · '))+'</div></td>'+
          '<td>'+esc(t.category||'—')+'</td>'+
          '<td>'+statusPill(t.status||'verfuegbar')+'</td>'+
          '<td>'+calPill(t.calibrated_until)+'</td>'+
          '<td>'+(t.shareable===false?'<span class="wl-pill warn">privat</span>':'<span class="wl-pill ok">teilbar</span>')+'</td>'+
          '<td style="text-align:right"><button class="btn btn-outline" data-edit2="'+esc(t.id||'')+'" style="padding:6px 10px">Bearbeiten</button></td>'+
        '</tr>';
      },
      mobCardHtml:function(t){
        return '<div class="wl-mobcard"><div class="mc-title">'+esc(t.name||'')+'</div>'+
          '<div class="mc-sub">'+esc([t.manufacturer,t.type_number,t.category].filter(Boolean).join(' · '))+'</div>'+
          '<div class="mc-pills">'+statusPill(t.status||'verfuegbar')+calPill(t.calibrated_until)+(t.shareable===false?'<span class="wl-pill warn">privat</span>':'<span class="wl-pill ok">teilbar</span>')+'</div>'+
          '<div class="mc-foot"><button class="btn btn-outline" data-edit2="'+esc(t.id||'')+'" style="padding:7px 12px">Bearbeiten</button></div></div>';
      },
      onAfter:function(){
        Array.prototype.forEach.call(document.querySelectorAll('[data-edit2]'), function(b){
          if (b.__wired) return; b.__wired = true;
          b.addEventListener('click', function(){ var id=b.getAttribute('data-edit2'); if (window.WL_openToolModal) window.WL_openToolModal(tools.filter(function(x){return String(x.id)===String(id);})[0]); });

  /* ---------- FAHRZEUGE (skaliert, als Karten-Grid mit Filter) ---------- */
  async function buildFahrzeuge(inner){
    var vehicles = [];
    try { var data = await api('/vehicles', { method:'GET', timeout:8000 }); vehicles = Array.isArray(data)?data:(data&&data.items)||[]; }
    catch(e){ vehicles = (window.WL_DEMO.vehicles||[]).slice(); }
    if (window.WL_setCounts) window.WL_setCounts({ vehicles: vehicles.length });
    if (window.WL_railSyncCounts) window.WL_railSyncCounts();
    var mans = {}; vehicles.forEach(function(v){ if (v.manufacturer) mans[v.manufacturer]=1; });
    var manChips = Object.keys(mans).sort().slice(0,10).map(function(m){ return { id:'man:'+m, label:m, match:function(v){ return v.manufacturer===m; } }; });

    inner.innerHTML = '<div class="panel-wrap">'+offlineBanner()+
      '<div class="panel-sub">Globaler Fahrzeug-Katalog (Referenzdaten, tenant-übergreifend). Kompatibilität verknüpft Fahrzeuge mit Spezialwerkzeugen (n:m).</div>'+
      '<div id="wlVehTools"></div><div id="wlVehGrid" class="wl-grid"></div></div>';

    var host = document.getElementById('wlVehTools'); var grid = document.getElementById('wlVehGrid');
    // eigener leichter Toolbar+Render (Grid statt Tabelle), nutzt WL_renderList nur für Toolbar wäre unpassend → eigener Loop
    var state = { q:'', chips:{}, limit:50 };
    function vehCard(v){
      var compat = (window.WL_DEMO.tools||[]).filter(function(t){ return (t.vehicles||[]).indexOf(v.id) >= 0; });
      return '<div class="wl-card"><div class="c-head"><div class="c-title">'+esc((v.manufacturer||'')+' '+(v.model||''))+'</div></div>'+
        '<div class="c-meta">Baujahr '+esc((v.year_from||'?')+(v.year_to?('–'+v.year_to):''))+'<br>Motor: '+esc(v.engine_code||'—')+(v.type_key?(' · HSN/TSN '+esc(v.type_key)):'')+'</div>'+
        '<div class="c-foot">'+ (compat.length ? '<span class="wl-pill ok">'+compat.length+' kompatible Werkzeuge</span>' : '<span class="wl-pill warn">keine Werkzeuge gemappt</span>') +'</div></div>';
    }
    function paint(){
      var q = state.q.toLowerCase().trim();
      var act = Object.keys(state.chips).filter(function(k){ return state.chips[k]; });
      var all = vehicles.filter(function(v){
        if (q){ var hay=((v.manufacturer||'')+' '+(v.model||'')+' '+(v.engine_code||'')+' '+(v.type_key||'')).toLowerCase(); if (hay.indexOf(q)<0) return false; }
        if (act.length){ for (var i=0;i<act.length;i++){ var ch=manChips.filter(function(c){return c.id===act[i];})[0]; if (ch && !ch.match(v)) return false; } }
        return true;
      });
      var shown = Math.min(state.limit, all.length);
      host.innerHTML = '<div class="wl-ptools"><div class="wl-ptools-row">'+
        '<input class="wl-psearch" id="wlVehSearch2" placeholder="Hersteller, Modell, Motorcode…" autocomplete="off" aria-label="Fahrzeuge durchsuchen" value="'+esc(state.q)+'">'+
        '<span class="wl-pcount">'+all.length+' von '+vehicles.length+'</span></div>'+
        '<div class="wl-ptools-row"><div class="wl-chips">'+manChips.map(function(c){ return '<button class="wl-chip'+(state.chips[c.id]?' is-on':'')+'" data-vchip="'+esc(c.id)+'" aria-pressed="'+(state.chips[c.id]?'true':'false')+'">'+esc(c.label)+'</button>'; }).join('')+'</div></div></div>';
      grid.innerHTML = all.slice(0,shown).map(vehCard).join('') + (shown<all.length ? '' : '');
      // „Mehr laden" unter dem Grid
      var existing = document.getElementById('wlVehMoreWrap'); if (existing) existing.remove();
      if (shown < all.length){
        var mw = document.createElement('div'); mw.id='wlVehMoreWrap'; mw.className='wl-loadmore';
        mw.innerHTML = '<button class="btn btn-outline" id="wlVehMore">Mehr laden ('+(all.length-shown)+' weitere)</button>';
        grid.parentNode.appendChild(mw);
        document.getElementById('wlVehMore').addEventListener('click', function(){ state.limit += 50; paint(); });
      }
      var s = document.getElementById('wlVehSearch2');
      if (s){ var t=null; s.addEventListener('input', function(){ if(t)clearTimeout(t); var v=this.value; t=setTimeout(function(){ state.q=v; state.limit=50; paint(); var ss=document.getElementById('wlVehSearch2'); if(ss){ss.focus(); var vv=ss.value; ss.value=''; ss.value=vv;} }, 200); }); }
      Array.prototype.forEach.call(host.querySelectorAll('[data-vchip]'), function(b){ b.addEventListener('click', function(){ var id=b.getAttribute('data-vchip'); state.chips[id]=!state.chips[id]; state.limit=50; paint(); }); });
    }
    paint();
  }

  /* ---------- KUNDEN (skaliert) ---------- */
  async function buildKunden(inner){

      filterText:function(c){ return [c.name,c.contact,c.notes].filter(Boolean).join(' '); },

      rowHtml:function(c){ return '<tr><td><strong>'+esc(c.name||'')+'</strong></td><td>'+esc(c.contact||'—')+'</td><td>'+esc(c.notes||'')+'</td></tr>'; },

  /* ---------- AUFTRÄGE (skaliert) ---------- */

    try { var data = await api('/orders', { method:'GET', timeout:8000 }); orders = Array.isArray(data)?data:(data&&data.items)||[]; }
    catch(e){ orders = (window.WL_DEMO.orders||[]).slice(); }
    inner.innerHTML = '<div class="panel-wrap">'+offlineBanner()+
      '<div class="panel-sub">Werkstattaufträge mit benötigten Werkzeugen. Status <em>„wartet auf Werkzeug"</em> ist der Sharing-Trigger.</div>'+

      chips:[
        { id:'o:offen', label:'offen', match:function(o){ return o.status==='offen'; } },
        { id:'o:in_arbeit', label:'in Arbeit', match:function(o){ return o.status==='in_arbeit'; } },
        { id:'o:wartet_werkzeug', label:'wartet auf Werkzeug', match:function(o){ return o.status==='wartet_werkzeug'; } },
        { id:'o:abgeschlossen', label:'abgeschlossen', match:function(o){ return o.status==='abgeschlossen'; } }
      ],
      sorts:[
        { id:'cust', label:'Kunde (A–Z)', cmp:function(a,b){ return (a.customer||a.customer_name||'').localeCompare(b.customer||b.customer_name||''); } },
        { id:'status', label:'Status', cmp:function(a,b){ return (a.status||'').localeCompare(b.status||''); } }
      ],
      asCards:true,
      rowHtml:function(o){
        var tools = (o.required_tools||[]).map(function(t){ return '<span class="wl-pill">'+esc(t)+'</span>'; }).join(' ');
        return '<tr><td><strong>'+esc(o.customer||o.customer_name||'')+'</strong><div style="font-size:11.5px;color:var(--text-faint)">'+esc(o.notes||'')+'</div></td>'+
          '<td>'+esc(o.vehicle||o.vehicle_name||'')+'</td>'+
          '<td>'+(tools||'<span style="color:var(--text-faint)">—</span>')+'</td>'+
          '<td>'+orderStatusPill(o.status)+'</td></tr>';
      },
      mobCardHtml:function(o){
        var tools = (o.required_tools||[]).map(function(t){ return '<span class="wl-pill">'+esc(t)+'</span>'; }).join(' ');
        return '<div class="wl-mobcard"><div class="mc-title">'+esc(o.customer||o.customer_name||'')+'</div>'+
          '<div class="mc-sub">'+esc(o.vehicle||o.vehicle_name||'')+(o.notes?(' · '+esc(o.notes)):'')+'</div>'+
          '<div class="mc-pills">'+orderStatusPill(o.status)+tools+'</div></div>';

  /* ---------- WERKSTÄTTEN: Karte + skalierte, filterbare Karten-Liste ---------- */
  async function buildWerkstaetten(inner){
    var shops = [];
    try { var data = await api('/workshops', { method:'GET', timeout:8000 }); shops = Array.isArray(data)?data:(data&&data.items)||[]; }
    catch(e){ shops = (window.WL_DEMO.workshops||[]).slice(); }
    if (window.WL_setCounts) window.WL_setCounts({ shops: shops.length });
    if (window.WL_railSyncCounts) window.WL_railSyncCounts();

    var cities = {}; shops.forEach(function(w){ if (w.city) cities[w.city]=1; });
    var cityChips = Object.keys(cities).sort().slice(0,10).map(function(c){ return { id:'city:'+c, label:c, match:function(w){ return w.city===c; } }; });

    inner.innerHTML = '<div class="panel-wrap">'+offlineBanner()+
      '<div class="panel-sub">Alle teilenden Werkstätten im Sharing-Netzwerk. Karte: Leaflet + OpenStreetMap (EU, DSGVO — kein Google Maps).</div>'+
      '<div id="wlShopsMap" class="wl-map" style="margin-bottom:18px"></div>'+
      '<div id="wlShopTools"></div><div id="wlShopGrid" class="wl-grid"></div></div>';

    var markers = shops.filter(function(w){ return w.lat!=null; }).map(function(w){
      return { lat:w.lat, lng:w.lng, popup:'<strong>'+esc(w.name||'')+'</strong><br>'+esc((w.plz||'')+' '+(w.city||''))+(w.phone?('<br>'+esc(w.phone)):'') };
    });
    if (window.WL_renderMap) window.WL_renderMap('wlShopsMap', markers, { center:[51.16,10.45], zoom:6 });

    var host = document.getElementById('wlShopTools'); var grid = document.getElementById('wlShopGrid');
    var state = { q:'', chips:{}, limit:50 };
    function shopCard(w){
      var tcount = (window.WL_DEMO.tools||[]).filter(function(t){ return t.workshop_id===w.id; }).length;
      return '<div class="wl-card"><div class="c-head"><div class="c-title">'+esc(w.name||'')+'</div>'+(w.share_tools!==false?'<span class="wl-pill ok">teilt</span>':'<span class="wl-pill warn">teilt nicht</span>')+'</div>'+
        '<div class="c-meta">'+esc([w.street, (w.plz||'')+' '+(w.city||'')].filter(function(s){return s&&s.trim();}).join(', '))+
        (w.phone?('<br>'+esc(w.phone)):'')+(w.opening_hours?('<br>'+esc(typeof w.opening_hours==='string'?w.opening_hours:JSON.stringify(w.opening_hours))):'')+'</div>'+
        '<div class="c-foot"><span class="wl-pill">'+tcount+' Werkzeuge</span></div></div>';
    }
    function paint(){
      var q = state.q.toLowerCase().trim();
      var act = Object.keys(state.chips).filter(function(k){ return state.chips[k]; });
      var all = shops.filter(function(w){
        if (q){ var hay=((w.name||'')+' '+(w.city||'')+' '+(w.plz||'')+' '+(w.street||'')).toLowerCase(); if (hay.indexOf(q)<0) return false; }
        if (act.length){ for (var i=0;i<act.length;i++){ var ch=cityChips.filter(function(c){return c.id===act[i];})[0]; if (ch && !ch.match(w)) return false; } }
        return true;
      });
      var shown = Math.min(state.limit, all.length);
      host.innerHTML = '<div class="wl-ptools"><div class="wl-ptools-row">'+
        '<input class="wl-psearch" id="wlShopSearch" placeholder="Name, Stadt, PLZ…" autocomplete="off" aria-label="Werkstätten durchsuchen" value="'+esc(state.q)+'">'+
        '<span class="wl-pcount">'+all.length+' von '+shops.length+'</span></div>'+
        '<div class="wl-ptools-row"><div class="wl-chips">'+cityChips.map(function(c){ return '<button class="wl-chip'+(state.chips[c.id]?' is-on':'')+'" data-schip="'+esc(c.id)+'" aria-pressed="'+(state.chips[c.id]?'true':'false')+'">'+esc(c.label)+'</button>'; }).join('')+'</div></div></div>';
      grid.innerHTML = all.slice(0,shown).map(shopCard).join('');
      var existing = document.getElementById('wlShopMoreWrap'); if (existing) existing.remove();
      if (shown < all.length){
        var mw = document.createElement('div'); mw.id='wlShopMoreWrap'; mw.className='wl-loadmore';
        mw.innerHTML = '<button class="btn btn-outline" id="wlShopMore">Mehr laden ('+(all.length-shown)+' weitere)</button>';
        grid.parentNode.appendChild(mw);
        document.getElementById('wlShopMore').addEventListener('click', function(){ state.limit += 50; paint(); });
      }
      var s = document.getElementById('wlShopSearch');
      if (s){ var t=null; s.addEventListener('input', function(){ if(t)clearTimeout(t); var v=this.value; t=setTimeout(function(){ state.q=v; state.limit=50; paint(); var ss=document.getElementById('wlShopSearch'); if(ss){ss.focus(); var vv=ss.value; ss.value=''; ss.value=vv;} }, 200); }); }
      Array.prototype.forEach.call(host.querySelectorAll('[data-schip]'), function(b){ b.addEventListener('click', function(){ var id=b.getAttribute('data-schip'); state.chips[id]=!state.chips[id]; state.limit=50; paint(); }); });
    }
    paint();
  }

  /* ---- openPanel wrappen: für die Listen-Panels die skalierten Renderer einsetzen ---- */
  var SCALED = { werkzeuge:buildWerkzeuge, fahrzeuge:buildFahrzeuge, kunden:buildKunden, auftraege:buildAuftraege, werkstaetten:buildWerkstaetten };
  function wrapOpen(){
    if (typeof window.openPanel !== 'function' || window.openPanel.__wlScaledHook) return;
    var orig = window.openPanel;
    window.openPanel = function(name){
      if (SCALED[name]){
        var panel = document.getElementById('panel'); var inner = document.getElementById('panelInner');
        var titleEl = document.getElementById('panelTitle'); var actions = document.getElementById('panelActions');
        if (!panel || !inner) return orig.apply(this, arguments);
        if (window.closeMenu) window.closeMenu();
        var TITLES = { werkzeuge:'Werkzeuge', fahrzeuge:'Fahrzeuge', werkstaetten:'Werkstätten (Karte)', kunden:'Kunden', auftraege:'Aufträge' };
        if (titleEl) titleEl.textContent = TITLES[name] || name;
        if (actions) actions.innerHTML = '';
        inner.innerHTML = '<div class="panel-wrap"><div class="wl-empty"><div class="spinner" style="margin:0 auto 12px"></div>Lade…</div></div>';
        panel.classList.add('open'); panel.setAttribute('aria-hidden','false');
        panel.scrollTop = 0; inner.scrollTop = 0;
        if (window.WL_rememberPanel) window.WL_rememberPanel(name);
        if (window.WL_setActiveNav) window.WL_setActiveNav(name);
        if (window.WL_syncTabbar) window.WL_syncTabbar(name);
        (async function(){
          try { await SCALED[name](inner, actions); }
          catch(e){ inner.innerHTML = '<div class="panel-wrap"><div class="wl-empty"><div class="em-mark">⚠</div>Panel-Fehler: '+esc(e&&e.message||e)+'</div></div>'; }
        })();
        return;
      }
      return orig.apply(this, arguments);
    };
    // Flags vom wl-nav-Wrapper mitführen, falls vorhanden
    window.openPanel.__wlScaledHook = true;
    if (orig.__wlNavHook) window.openPanel.__wlNavHook = true;
  }

  function boot(){ wrapOpen(); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot); else boot();
  setTimeout(boot, 1500); setTimeout(boot, 4000);
})();
</script>
