<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WERKHOF – Das Betriebssystem für die Werkstatt</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0B0D10">
<link rel="manifest" href="manifest.json">
<script>try{if(localStorage.getItem('wh_theme')==='dark')document.documentElement.classList.add('dark')}catch(e){}</script>
<style>
@font-face{font-family:'Hanken Grotesk';src:url('fonts/HankenGrotesk.woff2') format('woff2');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'Bebas Neue';src:url('fonts/BebasNeue.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
/* =========================================================
   WERKHOF · Werkstatt-OS  ·  Single-File-Prototyp (Demo, localStorage)
   Baut auf XDAB-Architektur (FastAPI + LiteLLM->Bedrock-EU + agent-core
   + Postgres/pgvector + PII) und der WERKLEIH-Werkzeug-Sharing-App auf.
   CI: Blau #146DAB (primär) + Gelb-Orange #FBAF3A (sekundär), Dunkelmodus.
   ========================================================= */
:root{
  --ink:#0B0D10;--ink-2:#14171C;
  --paper:#FFFFFF;--paper-2:#F4F7FA;--paper-3:#ECEEF2;
  --line:#E3E7EC;--line-2:#D3D8E0;
  --grau:#565C66;--grau-2:#838B97;--grau-3:#AEB4BE;
  --accent:#146DAB;--accent-2:#FBAF3A;--accent-deep:#0F5688;--orange-deep:#9A6410;
  --gruen:#2E9E5B;--rot:#C2453B;--wa:#25D366;
  --radius:15px;--topbar-h:60px;
  --bg:var(--paper-2);--surface:var(--paper);--text:var(--ink);--muted:var(--grau);
}
html.dark{
  --paper:#1a1e25;--paper-2:#0d1015;--paper-3:#262b34;--ink-2:#14171c;
  --line:#2a2f39;--line-2:#39404b;--grau:#b0b6c0;--grau-2:#9298a2;--grau-3:#7c828c;
  --orange-deep:#e0a23a;--accent-deep:#3e87c0;
  --bg:#0d1015;--surface:#1a1e25;--text:#e7e9ee;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:'Hanken Grotesk',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden;font-variant-numeric:tabular-nums}
.topbar .brand{flex:0 1 auto;min-width:0;overflow:hidden}
.tenant-pill{min-width:0}.tenant-pill .tn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.svg-defs{position:absolute;width:0;height:0;overflow:hidden}
a{color:var(--accent);text-decoration:none}
button{font-family:inherit;color:inherit}
.bebas{font-family:'Bebas Neue',sans-serif;letter-spacing:.5px}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:6px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;font-weight:700;font-size:14px;padding:10px 16px;border-radius:11px;transition:.15s;white-space:nowrap;background:var(--surface);color:var(--text);border:1.5px solid var(--line)}
.btn:hover{border-color:var(--line-2)}
.btn svg{width:17px;height:17px}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 8px 22px -12px rgba(20,109,171,.7)}
.btn-primary:hover{transform:translateY(-1px);border-color:var(--accent)}
.btn-wa{background:var(--wa);color:#08130b;border-color:var(--wa)}
.btn-sm{padding:8px 12px;font-size:13px;border-radius:9px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

.badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:30px;white-space:nowrap}
.badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.badge.warn{background:rgba(251,175,58,.16);color:var(--orange-deep)}
.badge.info{background:rgba(20,109,171,.13);color:var(--accent-deep)}
.badge.ok{background:rgba(46,158,91,.14);color:#1f7a44}
.badge.done{background:var(--ink);color:#fff}
.badge.muted{background:var(--paper-3);color:var(--grau)}
html.dark .badge.done{background:#39404b}

/* Topbar */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);z-index:100;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:12px}
.topbar .brand{display:flex;align-items:center;gap:11px;min-width:0}
.topbar .logo{height:27px;width:auto;display:block;flex-shrink:0}
.ptag{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--accent-2)}
.tenant-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);border-radius:30px;padding:6px 13px;cursor:pointer;font-size:13px;font-weight:700;color:#fff;white-space:nowrap}
.tenant-pill .tm{width:20px;height:20px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;font-size:11px;font-weight:800;color:#fff}
.tenant-pill svg{width:14px;height:14px;color:var(--grau-3)}
.t-search{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:8px 13px;width:230px}
.t-search svg{width:16px;height:16px;color:var(--grau-3);flex-shrink:0}
.t-search input{background:none;border:none;outline:none;color:#fff;font:inherit;font-size:14px;width:100%}
.t-search input::placeholder{color:var(--grau-3)}
.topbar .right{display:flex;align-items:center;gap:10px}
.role-pill{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);border-radius:30px;padding:6px 12px;font-size:12px;font-weight:700;color:#cfd3d8;cursor:pointer}
.role-pill svg{width:14px;height:14px}
.iconbtn{position:relative;width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.10);border:none;color:#fff;cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:.15s}
.iconbtn:hover{background:rgba(255,255,255,.18)}
.iconbtn svg{width:19px;height:19px}
.iconbtn .dot{position:absolute;top:7px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--accent-2);border:2px solid var(--ink)}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(140deg,var(--accent),#0a3a63);display:grid;place-items:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0}
.hamb{display:none}

.shell{display:grid;grid-template-columns:244px 1fr;min-height:100vh;padding-top:var(--topbar-h)}
.sidebar{background:var(--surface);border-right:1px solid var(--line);padding:16px 12px;position:sticky;top:var(--topbar-h);height:calc(100vh - var(--topbar-h));overflow:auto}
.nav-group{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent-2);margin:14px 12px 8px}
.nav-group:first-child{margin-top:2px}
.navitem{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:9px 12px;border-radius:10px;font-weight:600;font-size:14px;color:var(--grau);transition:.13s;margin-bottom:1px}
.navitem:hover{background:var(--paper-2);color:var(--text)}
.navitem.active{background:var(--ink);color:#fff}
html.dark .navitem.active{background:#2a313c}
.navitem svg{width:18px;height:18px;flex-shrink:0}
.navitem .count{margin-left:auto;font-size:10.5px;font-weight:800;background:var(--accent-2);color:#231700;padding:1px 7px;border-radius:20px;min-width:18px;text-align:center}
.navitem .count:empty{display:none}
.navitem .count.b{background:var(--accent);color:#fff}

.content{padding:24px 28px 80px;max-width:1180px}
.panel{display:none;animation:fade .22s ease}
.panel.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.ph{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.ph h2{font-size:25px;font-weight:800;letter-spacing:-.7px}
.ph p{color:var(--grau);font-size:14px;margin-top:3px;max-width:640px}
.demo-banner{display:flex;align-items:center;gap:9px;background:rgba(251,175,58,.12);border:1px solid rgba(251,175,58,.3);color:var(--orange-deep);border-radius:11px;padding:9px 14px;font-size:12.5px;font-weight:600;margin-bottom:16px}
.demo-banner svg{width:16px;height:16px;flex-shrink:0}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px}
.card-h h3{font-size:16px;font-weight:700;letter-spacing:-.2px}
.grid{display:grid;gap:15px}
.g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1.3fr .7fr}

.kpi{display:flex;flex-direction:column;gap:3px}
.kpi .ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;margin-bottom:6px}
.kpi .ic svg{width:20px;height:20px}
.kpi .ic.b{background:rgba(20,109,171,.10);color:var(--accent)}
.kpi .ic.o{background:rgba(251,175,58,.16);color:var(--orange-deep)}
.kpi .ic.g{background:rgba(46,158,91,.14);color:#1f7a44}
.kpi .ic.d{background:var(--paper-3);color:var(--text)}
.kpi .v{font-size:26px;font-weight:800;line-height:1;letter-spacing:-1px}
.kpi .l{color:var(--grau);font-size:12.5px;font-weight:500}

.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--grau-2);padding:0 12px 10px;border-bottom:1px solid var(--line)}
.tbl td{padding:12px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{cursor:pointer;transition:.1s}
.tbl tbody tr:hover{background:var(--paper-2)}
.tbl .muted{color:var(--grau)}
.kav{width:32px;height:32px;border-radius:50%;background:var(--paper-3);display:inline-grid;place-items:center;font-weight:800;font-size:12px;color:var(--text);margin-right:9px;vertical-align:middle}

.rowitem{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.rowitem:last-child{border-bottom:none}
.rowitem .ic{width:36px;height:36px;border-radius:9px;background:var(--paper-2);display:grid;place-items:center;flex-shrink:0}
.rowitem .ic svg{width:18px;height:18px;color:var(--text)}
.rowitem .body{flex:1;min-width:0}
.rowitem .body b{font-size:14px;display:block}
.rowitem .body small{color:var(--grau);font-size:12.5px}

/* KI-Bot chat */
.chat{display:flex;flex-direction:column;height:calc(100vh - var(--topbar-h) - 104px);max-width:880px;margin:0 auto}
.chat-scroll{flex:1;overflow:auto;padding:6px 2px 14px}
.welcome{text-align:center;padding:36px 16px}
.welcome .wm{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;margin:0 auto 16px;font-family:'Bebas Neue';font-size:30px;color:#fff}
.welcome h1{font-size:26px;font-weight:800;letter-spacing:-.8px;margin-bottom:8px}
.welcome p{color:var(--grau);max-width:460px;margin:0 auto 22px}
.chips{display:flex;flex-direction:column;gap:9px;max-width:520px;margin:0 auto}
.chip{text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 15px;cursor:pointer;font-size:14px;transition:.15s;display:flex;gap:11px;align-items:center}
.chip:hover{border-color:var(--accent);transform:translateY(-1px)}
.chip svg{width:18px;height:18px;color:var(--accent);flex-shrink:0}
.bub{max-width:80%;padding:11px 15px;border-radius:16px;font-size:14.5px;line-height:1.55;margin-bottom:12px}
.bub.me{align-self:flex-end;margin-left:auto;background:var(--accent);color:#fff;border-bottom-right-radius:5px}
.bub.ai{background:var(--surface);border:1px solid var(--line);border-bottom-left-radius:5px}
.bub.ai .src{margin-top:9px;display:flex;gap:7px;flex-wrap:wrap}
.bub.ai .src span{font-size:11px;background:var(--paper-2);border:1px solid var(--line);border-radius:20px;padding:3px 9px;color:var(--grau);font-weight:600}
.chat-input{display:flex;gap:9px;padding:12px 0 0;border-top:1px solid var(--line);margin-top:4px}
.chat-input .iw{flex:1;display:flex;align-items:flex-end;gap:8px;background:var(--surface);border:1.5px solid var(--line);border-radius:14px;padding:9px 9px 9px 15px}
.chat-input .iw:focus-within{border-color:var(--accent)}
.chat-input textarea{flex:1;border:none;outline:none;background:none;resize:none;font:inherit;font-size:16px;max-height:120px;color:inherit}
.chat-input .send{width:40px;height:40px;border-radius:11px;background:var(--accent);color:#fff;border:none;cursor:pointer;display:grid;place-items:center;flex-shrink:0}
.gw-bar{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--grau-2);padding:8px 2px 0;font-weight:600}
.gw-bar .pdot{width:8px;height:8px;border-radius:50%;background:var(--accent-2);box-shadow:0 0 0 0 rgba(251,175,58,.5);animation:pulse 2.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(251,175,58,.5)}70%{box-shadow:0 0 0 7px rgba(251,175,58,0)}100%{box-shadow:0 0 0 0 rgba(251,175,58,0)}}

/* WhatsApp inbox */
.inbox{display:grid;grid-template-columns:320px 1fr;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--surface);min-height:520px}
.inbox-list{border-right:1px solid var(--line);overflow:auto;max-height:600px}
.conv{display:flex;gap:11px;padding:13px 15px;border-bottom:1px solid var(--line);cursor:pointer;align-items:center}
.conv:hover{background:var(--paper-2)}
.conv.active{background:var(--paper-2);box-shadow:inset 3px 0 0 var(--accent)}
.conv .av{width:38px;height:38px;border-radius:50%;background:var(--paper-3);display:grid;place-items:center;font-weight:800;font-size:13px;flex-shrink:0}
.conv .cb{flex:1;min-width:0}
.conv .cb .tp{display:flex;justify-content:space-between;gap:8px}
.conv .cb b{font-size:14px}.conv .cb .wn{font-size:11px;color:var(--grau-2);flex-shrink:0}
.conv .cb small{color:var(--grau);font-size:12.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv .unr{width:8px;height:8px;border-radius:50%;background:var(--accent-2);flex-shrink:0}
.cpane{display:flex;flex-direction:column;background:var(--paper-2)}
.chd{display:flex;align-items:center;gap:11px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--line)}
.chd .av{width:36px;height:36px;border-radius:50%;background:var(--paper-3);display:grid;place-items:center;font-weight:800;font-size:13px}
.chd b{font-size:14px;display:block}.chd small{color:var(--grau);font-size:12px}
.chd .wa{width:18px;height:18px;color:var(--wa);margin-left:auto}
.cscroll{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:9px;max-height:400px}
.wb{max-width:74%;padding:9px 13px;border-radius:13px;font-size:13.5px;line-height:1.45}
.wb .t{display:block;font-size:10px;margin-top:4px;opacity:.65}
.wb.in{align-self:flex-start;background:var(--surface);border:1px solid var(--line);border-bottom-left-radius:4px}
.wb.out{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.cin{display:flex;gap:8px;padding:12px 14px;background:var(--surface);border-top:1px solid var(--line)}
.cin input{flex:1;font:inherit;font-size:14px;padding:10px 13px;border:1.5px solid var(--line);border-radius:10px;outline:none;background:var(--surface);color:inherit}

/* Orchestra / approvals */
.task{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:17px;margin-bottom:13px;border-left:3px solid var(--accent-2)}
.task.done{border-left-color:var(--gruen);opacity:.72}
.task-top{display:flex;align-items:flex-start;gap:11px;margin-bottom:11px}
.task-top .s{width:36px;height:36px;border-radius:9px;background:var(--paper-2);display:grid;place-items:center;flex-shrink:0}
.task-top .s svg{width:19px;height:19px;color:var(--wa)}
.task-top .m{flex:1;min-width:0}.task-top .m b{font-size:14.5px}.task-top .m small{color:var(--grau);font-size:12.5px;display:block}
.kibox{background:var(--paper-2);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:11px;font-size:13.5px}
.kibox .lbl{font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--accent);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.kibox .lbl svg{width:14px;height:14px}
.kirow{display:flex;justify-content:space-between;gap:12px;padding:4px 0}
.kirow .k{color:var(--grau)}.kirow .v{font-weight:600;text-align:right}
.task-act{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.task-act .sp{flex:1}
.hil{font-size:11.5px;color:var(--grau);display:inline-flex;align-items:center;gap:6px}
.hil svg{width:14px;height:14px;color:var(--orange-deep)}
.act-badge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.3px}
.act-badge.read{background:rgba(46,158,91,.15);color:#1f7a44}
.act-badge.write{background:rgba(251,175,58,.18);color:var(--orange-deep)}
.act-badge.send{background:rgba(194,69,59,.15);color:#a3382f}

/* Werkzeug-Sharing + map */
.share-search{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.share-search select,.share-search input{font:inherit;font-size:14px;padding:11px 14px;border:1.5px solid var(--line);border-radius:11px;background:var(--surface);color:inherit;outline:none}
.share-search select:focus,.share-search input:focus{border-color:var(--accent)}
.tool-card{display:flex;gap:14px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:15px 17px;margin-bottom:11px}
.tool-card .ti{width:46px;height:46px;border-radius:11px;background:var(--ink);color:#fff;display:grid;place-items:center;flex-shrink:0}
.tool-card .ti svg{width:23px;height:23px}
.tool-card .tb{flex:1;min-width:0}.tool-card .tb b{font-size:15px;display:block}.tool-card .tb small{color:var(--grau);font-size:12.5px}
.tool-card .meta{text-align:right;flex-shrink:0}
.map{position:relative;height:330px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:linear-gradient(160deg,#e8eef3,#dde6ed)}
html.dark .map{background:linear-gradient(160deg,#1a2129,#11161c)}
.map svg{position:absolute;inset:0;width:100%;height:100%}
.mk{position:absolute;transform:translate(-50%,-100%);cursor:pointer;z-index:2}
.mk .pin{width:30px;height:30px;border-radius:50% 50% 50% 2px;background:var(--accent);transform:rotate(45deg);border:2px solid #fff;box-shadow:0 4px 10px -3px rgba(0,0,0,.5)}
.mk.has .pin{background:var(--gruen)}
.mk .pin span{transform:rotate(-45deg);display:block;text-align:center;line-height:26px;color:#fff;font-weight:800;font-size:11px}
.mk .lbl{position:absolute;top:34px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:11px;font-weight:700;background:var(--surface);border:1px solid var(--line);padding:2px 7px;border-radius:6px}
.map-legend{position:absolute;bottom:12px;left:12px;z-index:3;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:8px 11px;font-size:11.5px;display:flex;gap:14px}
.map-legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px}

/* Werkzeuge inventory */
.cal-pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.cal-pill.ok{background:rgba(46,158,91,.14);color:#1f7a44}
.cal-pill.soon{background:rgba(251,175,58,.16);color:var(--orange-deep)}
.cal-pill.due{background:rgba(194,69,59,.14);color:#a3382f}

/* Rules / automation */
.rule{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:15px 17px;margin-bottom:11px}
.rule .ri{width:40px;height:40px;border-radius:10px;background:var(--paper-2);display:grid;place-items:center;flex-shrink:0}
.rule .ri svg{width:20px;height:20px;color:var(--accent)}
.rule .rb{flex:1;min-width:0}.rule .rb b{font-size:14.5px;display:block}.rule .rb small{color:var(--grau);font-size:12.5px}
.sw{width:44px;height:26px;border-radius:30px;background:var(--line-2);position:relative;cursor:pointer;flex-shrink:0;transition:.2s}
.sw::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
.sw.on{background:var(--accent)}.sw.on::after{transform:translateX(18px)}

/* launcher / docs / kb */
.launch{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
.lnk{display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:15px;cursor:pointer;color:var(--text);transition:.15s}
.lnk:hover{border-color:var(--line-2);transform:translateY(-2px)}
.lnk .li{width:42px;height:42px;border-radius:10px;background:var(--ink);color:#fff;display:grid;place-items:center;font-family:'Bebas Neue';font-size:17px;flex-shrink:0}
.lnk b{font-size:14.5px;display:block}.lnk small{color:var(--grau);font-size:12px}
.lnk .ext{margin-left:auto;color:var(--grau-3)}
.kb-item{padding:14px 16px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;background:var(--surface);cursor:pointer}
.kb-item b{font-size:14.5px}.kb-item small{color:var(--grau);font-size:12.5px;display:block;margin-top:2px}
.kb-item .kt{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--accent);margin-bottom:5px}

.kv{display:grid;grid-template-columns:auto 1fr;gap:7px 18px;font-size:14px}
.kv dt{color:var(--grau);font-weight:600}.kv dd{font-weight:600;text-align:right}
.tag{display:inline-flex;align-items:center;gap:6px;background:var(--paper-2);border:1px solid var(--line);border-radius:20px;padding:5px 12px;font-size:12.5px;font-weight:600;margin:0 6px 6px 0}
.audit{font-family:ui-monospace,Menlo,monospace;font-size:12.5px;border-bottom:1px solid var(--line);padding:9px 0;display:flex;gap:14px;color:var(--grau)}
.audit b{color:var(--text);font-family:inherit;font-weight:700}
.empty{text-align:center;color:var(--grau);padding:36px 18px;font-size:14px}

/* Drawer + sheet + toast */
.overlay{position:fixed;inset:0;z-index:150;background:rgba(11,13,16,.5);opacity:0;pointer-events:none;transition:.25s}
.overlay.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(540px,100%);background:var(--bg);z-index:160;transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.7,.2,1);display:flex;flex-direction:column;box-shadow:-30px 0 80px -40px rgba(0,0,0,.5)}
.drawer.on{transform:none}
.drawer-h{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:17px 20px;background:var(--surface);border-bottom:1px solid var(--line)}
.drawer-h h3{font-size:17px;font-weight:800}
.dc{width:36px;height:36px;border-radius:10px;background:var(--paper-2);border:1px solid var(--line);cursor:pointer;display:grid;place-items:center;color:var(--grau)}
.drawer-b{padding:20px;overflow:auto;flex:1}
.drawer-f{padding:14px 20px;background:var(--surface);border-top:1px solid var(--line);display:flex;gap:10px;flex-wrap:wrap}
.sec{margin-bottom:18px}.sec h4{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--grau-2);margin-bottom:9px}
.sheet-ov{position:fixed;inset:0;z-index:170;background:rgba(11,13,16,.5);opacity:0;pointer-events:none;transition:.25s}
.sheet-ov.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:171;background:var(--surface);border-radius:20px 20px 0 0;padding:8px 16px calc(20px + env(safe-area-inset-bottom));transform:translateY(105%);transition:transform .3s cubic-bezier(.2,.7,.2,1);max-height:80vh;overflow:auto}
.sheet.on{transform:none}
.grip{width:40px;height:5px;border-radius:3px;background:var(--line-2);margin:8px auto 14px}
.sheet-item{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--line);cursor:pointer;padding:14px 6px;font-size:15px;font-weight:600;color:var(--text)}
.sheet-item:last-child{border-bottom:none}
.sheet-item svg{width:20px;height:20px;color:var(--grau)}.sheet-item .cv{margin-left:auto;color:var(--grau-3)}
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);z-index:200;background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;box-shadow:0 14px 40px -10px rgba(0,0,0,.5)}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* mobile bottom tabbar */
.tabbar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:95;background:var(--surface);border-top:1px solid var(--line);padding:7px 6px calc(7px + env(safe-area-inset-bottom));justify-content:space-around}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--grau-2);font-size:10.5px;font-weight:600;padding:5px 2px;border-radius:10px;position:relative}
.tab svg{width:22px;height:22px}.tab.active{color:var(--accent)}
.tab .tb{position:absolute;top:1px;left:calc(50% + 6px);background:var(--accent-2);color:#231700;font-size:9px;font-weight:800;min-width:14px;height:14px;border-radius:9px;display:grid;place-items:center;padding:0 3px}
.tab .tb:empty{display:none}

@media(max-width:1024px){.g4{grid-template-columns:1fr 1fr}.g2,.g3{grid-template-columns:1fr}.inbox{grid-template-columns:1fr}.inbox-list{max-height:none;border-right:none;border-bottom:1px solid var(--line)}.launch{grid-template-columns:1fr 1fr}}
@media(max-width:820px){
  .shell{grid-template-columns:1fr}
  .sidebar{position:fixed;top:var(--topbar-h);left:0;bottom:0;width:250px;z-index:90;transform:translateX(-100%);transition:.25s;box-shadow:20px 0 60px -30px rgba(0,0,0,.4)}
  .sidebar.open{transform:none}
  .hamb{display:grid}.t-search,.role-pill{display:none}
  .content{padding:18px 14px 96px}
  .g4,.g3,.launch{grid-template-columns:1fr}
  .tabbar{display:flex}
  .ptag{display:none}
  .topbar{padding:0 10px;gap:8px}
  .tenant-pill{padding:6px 11px;font-size:12.5px}.tenant-pill .tn{max-width:120px}
  .ph h2{font-size:21px}
  .chat{height:calc(100vh - var(--topbar-h) - 150px)}
}
@media(max-width:560px){.topbar .logo{height:24px}.tenant-pill .tn{max-width:88px}.ph .btn-primary{font-size:13px;padding:9px 13px}}
@media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important;animation-duration:.01ms!important}}
</style>
</head>

const TABS=["hermes","inbox","auftraege","sharing","__more"];

/* ---------- shell render ---------- */
let CUR="dashboard";
function svg(p,sw){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="'+(sw||1.8)+'" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';}
function buildSidebar(){
  let groups={},order=[];
  PANELS.forEach(p=>{if(!groups[p.grp]){groups[p.grp]=[];order.push(p.grp);}groups[p.grp].push(p);});
  let h="";
  order.forEach(g=>{
    h+='<div class="nav-group">'+esc(g)+'</div>';
    groups[g].forEach(p=>{
      const c=p.count?p.count():0;
      h+='<button class="navitem'+(p.id===CUR?' active':'')+'" data-p="'+p.id+'">'+svg(p.icon)+esc(p.label)+'<span class="count'+(p.cb?' b':'')+'">'+(c||"")+'</span></button>';
    });
  });
  h+='<div style="margin-top:18px;padding:0 4px"><button class="btn btn-sm" style="width:100%" onclick="window.open(\'../../Downloads/kfz-gorski-extracted/kfz-gorski/index.html\')||toast(\'Website-Vorschau\')">↗ Zur Website</button></div>';
  $("#sidebar").innerHTML=h;
  $$("#sidebar .navitem").forEach(b=>b.addEventListener("click",()=>nav(b.dataset.p)));
}
function buildTabs(){
  const labels={hermes:["KI-Bot",PANELS.find(p=>p.id==="hermes").icon],inbox:["Posteingang",PANELS.find(p=>p.id==="inbox").icon],auftraege:["Aufträge",PANELS.find(p=>p.id==="auftraege").icon],sharing:["Sharing",PANELS.find(p=>p.id==="sharing").icon],__more:["Mehr",'<circle cx="5" cy="12" r="1.6" fill="currentColor"/><circle cx="12" cy="12" r="1.6" fill="currentColor"/><circle cx="19" cy="12" r="1.6" fill="currentColor"/>']};
  let h="";TABS.forEach(id=>{const[l,ic]=labels[id];const cnt=(id!=="__more"&&PANELS.find(p=>p.id===id).count)?PANELS.find(p=>p.id===id).count():0;h+='<button class="tab'+((id===CUR)?' active':'')+'" data-t="'+id+'">'+svg(ic)+'<span>'+l+'</span><span class="tb">'+(cnt||"")+'</span></button>';});
  $("#tabbar").innerHTML=h;
  $$("#tabbar .tab").forEach(b=>b.addEventListener("click",()=>{b.dataset.t==="__more"?openMore():nav(b.dataset.t);}));
}
function nav(id){
  const p=PANELS.find(x=>x.id===id);if(p&&p.link){toast("Kundenportal-Ansicht (Demo)");}
  CUR=id;try{if(location.hash.slice(1)!==id)history.replaceState(null,"","#"+id);}catch(e){}
  closeSheet();$("#sidebar").classList.remove("open");$("#overlay").classList.remove("on");
  $$("#sidebar .navitem").forEach(b=>b.classList.toggle("active",b.dataset.p===id));
  $$("#tabbar .tab").forEach(b=>b.classList.toggle("active",b.dataset.t===id));
  RENDER[id]?RENDER[id]():($("#content").innerHTML='<div class="ph"><h2>'+esc(p?p.label:id)+'</h2></div><div class="empty">Modul folgt.</div>');
  window.scrollTo(0,0);$("#content").scrollTop=0;
}
function openMore(){
  let h='<div style="font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--grau-2);padding:0 6px 8px">Alle Module</div>';
  PANELS.filter(p=>TABS.indexOf(p.id)<0).forEach(p=>{const c=p.count?p.count():0;h+='<button class="sheet-item" data-p="'+p.id+'">'+svg(p.icon)+esc(p.label)+(c?'<span class="badge warn" style="margin-left:auto">'+c+'</span>':'<svg class="cv" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>')+'</button>';});
  openSheet(h);$$("#sheetC .sheet-item").forEach(b=>b.addEventListener("click",()=>{closeSheet();nav(b.dataset.p);}));
}

/* ---------- generic UI ---------- */
function ph(title,sub,actions){return '<div class="ph"><div><h2>'+esc(title)+'</h2>'+(sub?'<p>'+sub+'</p>':'')+'</div>'+(actions||'')+'</div>';}
function demoBanner(txt){return '<div class="demo-banner">'+svg('<circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/>',1.8)+esc(txt)+'</div>';}
const drawer=$("#drawer"),overlay=$("#overlay");
function openD(t,b,f){$("#dT").textContent=t;$("#dB").innerHTML=b;$("#dF").innerHTML=f||"";overlay.classList.add("on");drawer.classList.add("on");document.body.style.overflow="hidden";}
function closeD(){overlay.classList.remove("on");drawer.classList.remove("on");document.body.style.overflow="";}
$("#dClose").addEventListener("click",closeD);
const sheet=$("#sheet"),sheetOv=$("#sheetOv");
function openSheet(h){$("#sheetC").innerHTML=h;sheet.classList.add("on");sheetOv.classList.add("on");}

sheetOv.addEventListener("click",closeSheet);
overlay.addEventListener("click",()=>{closeD();$("#sidebar").classList.remove("open");overlay.classList.remove("on");});
document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeD();closeSheet();$("#sidebar").classList.remove("open");overlay.classList.remove("on");}});
$("#hamb").addEventListener("click",()=>{$("#sidebar").classList.toggle("open");overlay.classList.toggle("on");});
$("#themeBtn").addEventListener("click",()=>{const on=!document.documentElement.classList.contains("dark");document.documentElement.classList.toggle("dark",on);try{localStorage.setItem("wh_theme",on?"dark":"light");}catch(e){}});

function hermesAnswer(q){
  q=q.toLowerCase();
  if(/n57|arretier|spezialwerk|werkzeug/.test(q))return{a:"Das Arretierwerkzeug N57 ist <b>verfügbar bei KFZ Gorski (Braunschweig)</b> – kalibriert bis 11/2026. Soll ich es für den Audi-A6-Auftrag reservieren? Ich lege dann eine Sharing-Anfrage an (Freigabe nötig).",s:["Werkzeug-Register","Sharing"]};
  if(/nacht|bedarf|auswert|nachricht/.test(q))return{a:"In den 4 Nachrichten der Nacht erkenne ich: <b>Bremsbeläge+Scheiben (Müller)</b>, <b>Klimaservice (Köhler)</b> und einen <b>Rechnungsentwurf (Wagner)</b>. Drei Vorschläge liegen unter <b>Freigaben</b> – schreibende Aktionen führe ich erst nach Ihrer Bestätigung aus.",s:["Orchestra","Freigaben"]};
  if(/injektor|leitfaden|n47|reparatur/.test(q))return{a:"<b>Injektor-Ausbau BMW N47:</b> Motorabdeckung ab, Hochdruckleitungen lösen, Injektor mit Auszieher ziehen, Kupferring tauschen, Anzugsmomente beachten. Vollständiger Leitfaden unter <b>Wissen & Leitfäden</b>.",s:["Wissensbasis (RAG)"]};
  if(/termin/.test(q))return{a:"Heute: 08:00 Bremsen-Check (Mustermann), 09:30 Klimaservice (Köhler, <b>angefragt</b>), 11:00 HU/AU (Bauer), 13:30 Reifen (Wagner). Soll ich 09:30 bestätigen?",s:["Termine"]};
  return{a:"Ich bin Hermes, Ihr Werkstatt-Assistent. Ich kann Werkzeug-Verfügbarkeit prüfen, Nachrichten auswerten, Reparaturleitfäden zeigen und Aufträge vorbereiten – schreibende Aktionen immer mit Ihrer Freigabe. <i>(Demo: Antworten lokal. Im Vollausbau über das EU-KI-Gateway.)</i>",s:[]};
}
function askHermes(q){
  q=(q||"").trim();if(!q)return;
  const sc=$("#hScroll");if(sc.querySelector(".welcome"))sc.innerHTML="";
  sc.innerHTML+='<div class="bub me">'+esc(q)+'</div>';$("#hIn").value="";$("#hIn").style.height="auto";
  sc.scrollTop=sc.scrollHeight;audit("Hermes-Anfrage",q.slice(0,40));
  setTimeout(()=>{const r=hermesAnswer(q);sc.innerHTML+='<div class="bub ai">'+r.a+(r.s.length?'<div class="src">'+r.s.map(x=>'<span>'+esc(x)+'</span>').join("")+'</div>':'')+'</div>';sc.scrollTop=sc.scrollHeight;},420);
}

RENDER.einstellungen=function(){
  let h=ph("Einstellungen & DSGVO","Mandant, Rollen, Datenschutz und Audit-Trail.");
  h+='<div class="grid g2"><div class="card"><div class="card-h"><h3>Mandant & Rolle</h3></div><dl class="kv"><dt>Mandant</dt><dd>'+esc(TENANTS.find(t=>t.id===TENANT).name)+'</dd><dt>Aktive Rolle</dt><dd>'+esc(ROLES[ROLE])+'</dd></dl><div style="margin-top:14px;display:flex;gap:9px;flex-wrap:wrap"><button class="btn btn-sm" id="esRole">Rolle wechseln</button><button class="btn btn-sm" id="esTenant">Mandant wechseln</button></div><div class="sec" style="margin-top:16px"><h4>DSGVO-Konzept</h4><div style="font-size:13.5px;color:var(--grau);line-height:1.6">• KI über <b>EU-Gateway</b> (LiteLLM → Bedrock Frankfurt), kein Drittland-Training.<br>• Karten via <b>OpenStreetMap</b> (kein Google).<br>• <b>PII-Service</b> maskiert E-Mail/Telefon/IBAN vor KI-Aufrufen.<br>• Audit-Log speichert <b>nur Metadaten</b>, nie Inhalte.<br>• Mandanten-Isolation (Row-Level-Security), Self-Hosting EU-VPS.</div></div></div>';
  h+='<div class="card"><div class="card-h"><h3>Audit-Trail</h3><span class="badge ok">nur Metadaten</span></div><div style="max-height:360px;overflow:auto">';
  if(!store.audit.length)h+='<div class="empty">Noch keine Aktionen protokolliert.</div>';
  store.audit.slice(0,30).forEach(a=>{h+='<div class="audit"><span style="color:var(--grau-2);min-width:120px">'+esc(a.t)+'</span><span><b>'+esc(a.action)+'</b> · '+esc(a.obj)+' <span style="color:var(--grau-3)">('+esc(a.role)+'@'+esc(a.tenant)+')</span></span></div>';});
  h+='</div></div></div>';$("#content").innerHTML=h;
  $("#esRole").addEventListener("click",()=>$("#rolePill").click());$("#esTenant").addEventListener("click",()=>$("#tenantPill").click());
};
RENDER.kundenportal=function(){
  $("#content").innerHTML=ph("Kundenportal-Ansicht","So sieht der Kunde sein Portal – Read-Only auf eigene Rechnungen, Termine, Fahrzeuge.")+demoBanner("Das vollständige Kundenportal ist separat gebaut (kundenportal.html).")+'<div class="card"><div class="empty">Rolle „Kundenportal" über die Rollen-Pille oben rechts wählen, um die reduzierte Kundensicht zu testen.<br><br><button class="btn btn-primary" id="kpRole">Als Kunde ansehen</button></div></div>';
  $("#kpRole").addEventListener("click",()=>setRole("kunde"));
};

/* ---------- search ---------- */
$("#search").addEventListener("input",e=>{const q=e.target.value;if(q&&CUR!=="kunden")nav("kunden");if(CUR==="kunden"){const b=$("#content tbody");if(b){$$("#content tbody tr").forEach(tr=>{tr.style.display=tr.textContent.toLowerCase().includes(q.toLowerCase())?"":"none";});}}});

/* ---------- boot ---------- */
(function boot(){
  const tn=TENANTS.find(t=>t.id===TENANT)||TENANTS[0];$("#tn").textContent=tn.name;$("#tm").textContent=tn.mark;
  buildSidebar();buildTabs();
  const start=(location.hash||"").slice(1);
  nav(PANELS.some(p=>p.id===start)?start:"dashboard");
  window.addEventListener("hashchange",()=>{const id=(location.hash||"").slice(1);if(id&&id!==CUR&&PANELS.some(p=>p.id===id))nav(id);});
  if("serviceWorker"in navigator&&location.protocol!=="file:"){navigator.serviceWorker.register("sw.js").catch(()=>{});}
})();
</script>
